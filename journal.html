<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Morstrix Journal</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Tiny5&family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="journal.css">

<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TOP -->
<div class="top-panel glass">
    <div class="logo">MORSTRIX</div>
    <div class="nav">
        <button onclick="scrollToPage(0)">HOME</button>
        <button onclick="scrollToPage(2)">FONTS</button>
        <button onclick="scrollToPage(5)">FORUM</button>
    </div>
</div>

<!-- MAIN -->
<div class="wrapper">
<div class="horizontal" id="horizontal">

<!-- PAGE 1 -->
<section class="page">
<div class="content">

<div class="headline accent1">CYBER JOURNAL</div>

<div class="card glow">
    <img src="assets/1.jpg">
</div>

<div class="btn primary">ENTER</div>

</div>
</section>

<!-- PAGE 2 -->
<section class="page">
<div class="content">

<div class="headline accent2">GALLERY</div>

<div class="carousel" id="carousel">
<img src="assets/1.jpg" class="active">
<img src="assets/2.jpg">
<img src="assets/3.jpg">
</div>

</div>
</section>

<!-- PAGE 3 -->
<section class="page">
<div class="content">

<div class="headline accent3">FONT LAB</div>

<input id="input" placeholder="TYPE TEXT">

<div id="preview"></div>

</div>
</section>

<!-- PAGE 4 -->
<section class="page">
<div class="content">

<div class="headline accent1">SOUND</div>

<button class="btn neon" id="play">PLAY</button>

</div>
</section>

<!-- PAGE 5 -->
<section class="page">
<div class="content">

<div class="headline accent2">TOP</div>

<div class="list">
<div>01 — USER_X</div>
<div>02 — CYBER_02</div>
</div>

</div>
</section>

<!-- PAGE 6 -->
<section class="page">
<div class="content">

<div class="headline accent3">FORUM</div>

<div class="tabs">
<div class="tab active">DESIGN</div>
<div class="tab">AI</div>
<div class="tab">MONEY</div>
</div>

<div class="card glass">
DISCUSSION AREA
</div>

</div>
</section>

</div>
</div>

<script src="journal.js"></script>
</body>
</html>
