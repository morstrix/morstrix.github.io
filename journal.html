<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | DIGITAL JOURNAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/journal.css">
</head>
<body>

<canvas id="neuro-bg"></canvas>

<div class="top-panel">
    <div></div>
    <button class="panel-btn" id="contentsBtn"><span>ЗМІСТ</span></button>
    <a href="index.html" class="panel-close"><img src="assets/close.png" alt="Close"></a>
</div>

<div class="journal-wrapper">
  <div class="journal-horizontal" id="journalHorizontal">

       <!-- СТРАНИЦА 1: ART (НОВЫЙ ДИЗАЙН) -->
    <div class="journal-page" data-page="1">
        <div class="page-content page1-layout">
            <div class="ticker-wrapper">
                <div class="ticker" id="rssTicker">✦ APARTAMENTO ✦ 032C ✦ PURPLE ✦ SSENSE ✦</div>
            </div>
            <div class="art-archive-row">
                <div class="art-block">
                    <img id="currentArtPreview" src="assets/art.jpg" alt="Art">
                </div>
                <div class="archive-block" id="archiveBtn">
                    <span>АРХИВ</span>
                </div>
            </div>
            <div class="paint-btn-wrapper">
                <img src="assets/paint.png" alt="Paint" id="paintJournalBtn" class="paint-trigger-img">
            </div>
            <div class="pinterest-panel-wrapper">
                <div class="pinterest-panel" id="pinterestPanel">
                    <img src="assets/a.png" alt="mood" class="mood-img">
                    <span>mood</span>
                </div>
                <div class="pinterest-menu" id="pinterestMenu">
                    <div class="pinterest-widget-container">
                        <a data-pin-do="embedBoard" 
                           href="https://www.pinterest.com/morstrix/re-f-erences/" 
                           data-pin-scale-width="300" 
                           data-pin-scale-height="300"
                           data-pin-board-width="300"></a>
                    </div>
                </div>
            </div>
        </div><!-- конец page-content -->
    </div><!-- конец journal-page -->

    <!-- СТРАНИЦА 2: TWITTER -->
    <div class="journal-page" data-page="2">
        <div class="page-content">
            <div class="carousel-section">
                <div class="carousel" id="mainCarousel">
                    <img src="assets/mx1.jpg" class="active">
                    <img src="assets/mx2.jpg">
                </div>
                <div class="hashtag-row"><span class="hashtag">#layoutporn</span></div>
            </div>
            <div class="twitter-section">
                <img src="assets/twit.png" class="x-btn-img" id="twitterBtn">
            </div>
        </div>
    </div>

    <!-- СТРАНИЦА 3: FONTS -->
    <div class="journal-page" data-page="3">
        <div class="page-content fonts-layout">
            <div class="mx-narrow-image"><img src="assets/f1.jpg" alt="MX Print"></div>
            <div class="mx-description">FONT<br>(to do)</div>
            <button class="universal-btn" id="downloadArchiveBtnEmbedded">
                <span class="btn-inner"><span>DOWNLOAD</span></span>
            </button>
            <div class="styler-embedded">
                <input type="text" id="fontInputEmbedded" class="styler-input" placeholder="TYPE TEXT">
                <div class="styler-preview" id="stylerPreviewEmbedded"></div>
            </div>
        </div>
    </div>

    <!-- СТРАНИЦА 4: SOUND -->
    <div class="journal-page" data-page="4">
        <div class="page-content sound-layout">
            <div class="text-synth-embedded">
                <h4>TEXT SYNTH</h4>
                <input type="text" id="ttsTextInput" class="styler-input" placeholder="TYPE TEXT">
                <select id="ttsVoiceSelect" class="styler-input"></select>
                <button class="universal-btn" id="ttsSpeakBtn"><span class="btn-inner"><span>SPEAK</span></span></button>
                <div id="ttsStatus"></div>
            </div>
            <div class="spotify-icon" id="spotifyIcon"><span>🎵 SPOTIFY</span></div>
        </div>
    </div>

    <!-- СТРАНИЦА 5: TOP + TETRIS -->
    <div class="journal-page" data-page="5">
        <div class="page-content top-tetris-layout">
            <h4 class="top-title">TOP</h4>
            <div class="top-players-framed"><div class="top-players-list"></div></div>
            <a href="tetris.html" target="_blank" class="tetris-big"><img src="assets/tetris.png" alt="TETRIS"><span>PLAY TETRIS</span></a>
        </div>
    </div>

    <!-- СТРАНИЦА 6: FORUM + SUPPORT -->
    <div class="journal-page" data-page="6">
        <div class="page-content forum-support-layout">
            <div class="forum-embedded">
                <div class="forum-tabs-panel-embedded">
                    <div class="forum-tab active" data-tab="wellness">🌿</div>
                    <div class="forum-tab" data-tab="interior">🛋️</div>
                    <div class="forum-tab" data-tab="radio">📻</div>
                    <div class="forum-tab" data-tab="itai">🤖</div>
                    <div class="forum-tab" data-tab="english">🔝</div>
                    <div class="forum-tab" data-tab="design">🎨</div>
                    <div class="forum-tab" data-tab="tattoo">💘</div>
                    <div class="forum-tab" data-tab="money">💸</div>
                    <div class="forum-tab" data-tab="barbering">✂️</div>
                </div>
                <div class="forum-content-embedded">
                    <h3 id="forumTitleEmbedded">🌿 ВЕЛНЕС</h3>
                    <p id="forumTextEmbedded">Йога, медитации...</p>
                </div>
            </div>
            <div class="forum-actions">
                <button class="universal-btn" id="forumFullBtn"><span class="btn-inner"><span>FULL</span></span></button>
                <button class="universal-btn" id="supportBtn"><span class="btn-inner"><span>SUPPORT</span></span></button>
            </div>
        </div>
    </div>
  </div>
</div>

<div class="bottom-panel">
    <div class="page-indicator" id="pageIndicator">
        <!-- Точки создадутся в JS -->
    </div>
</div>

<!-- Модалки (оставлены без изменений) -->
<div id="contentsModal" class="modal-overlay">...</div>
<div id="disclaimerModal" class="modal-overlay">...</div>
<div id="paintEntryModal" class="modal-overlay">...</div>
<div id="stubModal" class="modal-overlay">...</div>
<div id="spotifyModal" class="modal-overlay">...</div>
<div id="supportModal" class="modal-overlay">...</div>
<div id="pinterestModalDiliger" class="modal-overlay">...</div>
<div id="pinterestModalTattoo" class="modal-overlay">...</div>
<div id="pinterestModalBarbering" class="modal-overlay">...</div>

<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script src="js/journal.js"></script>
</body>
</html>
