<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morstrix Journal</title>

<link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Tiny5&family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="journal.css">

<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
</head>

<body>

<canvas id="neuro-bg"></canvas>

<!-- TOP -->
<div class="top-panel">
    <button class="panel-btn" id="contentsBtn">CONTENTS</button>
    <button class="panel-btn">MORSTRIX</button>
    <button class="panel-btn" id="supportBtn">SUPPORT</button>
</div>

<!-- WRAPPER -->
<div class="journal-wrapper">
<div class="journal-horizontal" id="journalHorizontal">

<!-- PAGE 1 -->
<section class="journal-page">
<div class="page-content page1-layout">

<div class="ticker-wrapper">
<div class="ticker" id="rssTicker"></div>
</div>

<div class="art-archive-row">
<div class="art-block">
<img id="currentArtPreview" src="assets/default.png">
</div>

<div class="archive-block" id="archiveBtn">ARCHIVE</div>
</div>

<div class="paint-btn-wrapper">
<div class="universal-btn" id="paintJournalBtn">
<div class="btn-inner"><span>PAINT</span></div>
</div>
</div>

<div class="pinterest-panel" id="pinterestPanel">PINTEREST</div>

<div class="pinterest-menu" id="pinterestMenu">
<div class="pinterest-category" data-cat="art">ART</div>
<div class="pinterest-category" data-cat="design">DESIGN</div>
<div class="pinterest-category" data-cat="fashion">FASHION</div>
</div>

</div>
</section>

<!-- PAGE 2 -->
<section class="journal-page">
<div class="page-content">

<div class="carousel" id="mainCarousel">
<img src="assets/1.jpg" class="active">
<img src="assets/2.jpg">
<img src="assets/3.jpg">
</div>

</div>
</section>

<!-- PAGE 3 -->
<section class="journal-page">
<div class="page-content fonts-layout">

<input id="fontInputEmbedded" class="styler-input" placeholder="TYPE TEXT">
<div id="stylerPreviewEmbedded" class="styler-preview"></div>

</div>
</section>

<!-- PAGE 4 -->
<section class="journal-page">
<div class="page-content sound-layout">

<div class="spotify-icon" id="spotifyIcon">SPOTIFY</div>

<input id="ttsTextInput" placeholder="TYPE TEXT">
<button id="ttsSpeakBtn">PLAY</button>
<div id="ttsStatus"></div>

</div>
</section>

<!-- PAGE 5 -->
<section class="journal-page">
<div class="page-content top-tetris-layout">

<div class="top-title">TOP PLAYERS</div>
<div class="top-players-list"></div>

</div>
</section>

<!-- PAGE 6 -->
<section class="journal-page">
<div class="page-content forum-support-layout">

<div class="forum-embedded">

<div class="forum-tabs-panel-embedded">
<div class="forum-tab active" data-tab="design">🎨</div>
<div class="forum-tab" data-tab="itai">🤖</div>
<div class="forum-tab" data-tab="money">💰</div>
</div>

<div class="forum-content-embedded">
<h3 id="forumTitleEmbedded">DESIGN</h3>
<p id="forumTextEmbedded">Графический дизайн...</p>
</div>

</div>

<div class="forum-actions">
<div class="universal-btn" id="supportBtn">
<div class="btn-inner"><span>SUPPORT</span></div>
</div>
</div>

</div>
</section>

</div>
</div>

<div class="bottom-panel">
<div class="page-indicator">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>

<script src="journal.js"></script>
</body>
</html>
