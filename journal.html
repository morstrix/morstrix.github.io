<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | JOURNAL & PAINT</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="journal.css">
</head>
<body>

    <a href="index.html" class="close-site">
        <img src="assets/close.png" alt="Close">
    </a>

    <div class="container">
        
        <div class="section">
            <div class="carousel" id="mainCarousel">
                <img src="assets/mx1.jpeg" class="active">
                <img src="assets/mx2.jpg">
            </div>
            <img src="assets/twit.png" class="x-btn-img" onclick="openModal('disclaimerModal')">
        </div>

        <div class="ticker-wrapper">
            <div class="ticker" id="rssTicker">✦ LOADING... ✦</div>
        </div>

        <div class="section nav-grid">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <img src="assets/forum.png" class="nav-btn-img" onclick="openModal('forumModal')">
                <div class="paint-label">FORUM</div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <img src="assets/support.png" class="nav-btn-img" onclick="openModal('supportModal')">
                <div class="paint-label">SUPPORT</div>
            </div>
        </div>

        <div class="section">
            <div class="pin-wrapper">
                <a data-pin-do="embedBoard" 
                   data-pin-board-width="400" 
                   data-pin-scale-height="240" 
                   href="https://ru.pinterest.com/morstrix/re-f-erences/">
                </a>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #111;">

        <div class="section">
            <div class="art-square-frame">
                <img src="assets/art.jpg" alt="Preview">
            </div>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <img src="assets/paint.png" class="nav-btn-img" style="width: 80px;" onclick="openModal('artModal')">
                <div class="paint-label">PAINT</div>
            </div>
        </div>

        <div class="section">
            <div class="styler-label">FONT STYLER</div>
            <div class="styler-container">
                <button class="styler-icon-btn" onclick="copyStylerText()">
                    <img src="assets/st1.png" id="stylerIcon1">
                </button>
                <input type="text" id="fontInput" class="styler-input" placeholder="INPUT TEXT..." autocomplete="off">
                <button class="styler-icon-btn" onclick="handleAction()">
                    <img src="assets/st2.png" id="stylerIcon2">
                </button>
            </div>
        </div>

        <div class="section" style="padding-bottom: 60px;">
            <h4 style="font-size: 8px; color: #a84d6b; margin-bottom: 20px;">TOP PLAYERS:</h4>
            <div style="font-size: 8px; color: #444; line-height: 2.5;">
                MORPH — 12450<br>
                GWITCH — 9820<br>
                REVOST — 7650
            </div>
            <div style="margin-top: 40px; display: flex; flex-direction: column; align-items: center;">
                <a href="tetris.html">
                    <img src="assets/tetris.png" class="nav-btn-img" alt="Play Tetris">
                </a>
                <div class="paint-label">TETRIS</div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА DISCLAIMER -->
    <div id="disclaimerModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title-text">MARKETING CREATIVE</span>
                <button class="modal-close-btn" onclick="closeModalDirect('disclaimerModal')">✜</button>
            </div>
            <div class="modal-inner" style="text-align: center;">
                <p style="font-size: 8px; line-height: 1.8; margin-bottom: 30px;">OPEN?</p>
                <button class="retro-btn" onclick="closeModalDirect('disclaimerModal')">ENTER</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА FORUM -->
    <div id="forumModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title-text">ARCHIVE</span>
                <button class="modal-close-btn" onclick="closeModalDirect('forumModal')">✜</button>
            </div>
            <div class="modal-inner" style="text-align: center;">
                <p style="font-size: 8px; margin-bottom: 20px;">OPEN TELEGRAM?</p>
                <a href="https://t.me/morstrix" target="_blank" class="retro-btn">YES</a>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА SUPPORT (КОММЕНТАРИИ) -->
    <div id="supportModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title-text">COMMENTS</span>
                <button class="modal-close-btn" onclick="closeModalDirect('supportModal')">✜</button>
            </div>
            <div class="modal-inner">
                <div class="telegram-wrapper">
                    <script async src="https://telegram.org/js/telegram-widget.js?22"
                        data-telegram-discussion="morstrixxx/71"
                        data-comments-limit="10"
                        data-colorful="1"
                        data-dark="1">
                    </script>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА PAINT -->
    <div id="artModal" class="modal-overlay">
        <div class="modal-content" style="padding:0;">
            <div class="paint-window">
                <div class="paint-header-bar">
                    <span>PAINT.EXE</span>
                    <button onclick="closeModalDirect('artModal')" style="background:none; border:none; color:#444; cursor:pointer; font-family:'Press Start 2P'; font-size:10px;">✜</button>
                </div>
                <div class="paint-tools-panel" style="border-bottom: 1px solid #1a1a1a;">
                    <div style="display:flex; gap:5px;">
                        <button class="retro-btn" id="pUndo" style="padding:5px 8px;" disabled>&lt;</button>
                        <button class="retro-btn" id="pRedo" style="padding:5px 8px;" disabled>&gt;</button>
                    </div>
                    <button class="retro-btn" id="btnLayersOpen" style="font-size:7px;">CHANNELS</button>
                </div>
                <div class="canvas-container" id="paintArea">
                    <canvas id="layer1"></canvas>
                    <canvas id="layer2"></canvas>
                </div>
                <div class="paint-tools-panel">
                    <input type="color" id="pColor" value="#ffb7c7" style="width:35px; height:25px; border:1px solid #1a1a1a; background:none;">
                    <button class="retro-btn" id="pClear" style="font-size:7px;">CLEAR</button>
                </div>
            </div>
            <div id="layersPopup" class="layers-sub-modal">
                <div style="background:#ffb7c7; color:#000; padding:8px; font-size:7px; display:flex; justify-content:space-between;">
                    <span>LAYERS</span>
                    <span onclick="document.getElementById('layersPopup').classList.remove('active')" style="cursor:pointer;">X</span>
                </div>
                <div id="layerList">
                    <div class="layer-row active" data-id="2">LAYER 02 (TOP)</div>
                    <div class="layer-row" data-id="1">LAYER 01 (BACK)</div>
                </div>
            </div>
        </div>
    </div>

    <script async defer src="https://assets.pinterest.com/js/pinit.js"></script>
    <script src="journal.js"></script>
</body>
</html>
