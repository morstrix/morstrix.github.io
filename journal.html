<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Morstrix Journal</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Tiny5&family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="journal.css">

<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TOP -->
<div class="top-panel glass">
    <button class="nav-btn" id="contentsBtn">CONTENTS</button>
    <div class="logo accent1">MORSTRIX</div>
    <button class="nav-btn" id="supportBtn">SUPPORT</button>
</div>

<!-- MAIN -->
<div class="journal-wrapper">
<div class="journal-horizontal" id="journalHorizontal">

<!-- PAGE 1 -->
<section class="journal-page">
<div class="page-content">

<div class="ticker" id="rssTicker"></div>

<div class="card glow">
<img id="currentArtPreview" src="assets/default.png">
</div>

<div class="btn primary" id="paintJournalBtn">PAINT</div>

</div>
</section>

<!-- PAGE 2 -->
<section class="journal-page">
<div class="page-content">

<div class="carousel" id="mainCarousel">
<img src="assets/1.jpg" class="active">
<img src="assets/2.jpg">
<img src="assets/3.jpg">
</div>

</div>
</section>

<!-- PAGE 3 (СТАЙЛЕР ВОЗВРАЩЁН) -->
<section class="journal-page">
<div class="page-content">

<input id="fontInputEmbedded" placeholder="TYPE TEXT">
<div id="stylerPreviewEmbedded"></div>

</div>
</section>

<!-- PAGE 4 (TTS ВОЗВРАЩЁН) -->
<section class="journal-page">
<div class="page-content">

<input id="ttsTextInput" placeholder="TYPE TEXT">
<button id="ttsSpeakBtn" class="btn neon">PLAY</button>
<div id="ttsStatus"></div>

</div>
</section>

<!-- PAGE 5 (FIREBASE) -->
<section class="journal-page">
<div class="page-content">

<div class="title accent2">TOP PLAYERS</div>
<div class="top-players-list"></div>

</div>
</section>

<!-- PAGE 6 -->
<section class="journal-page">
<div class="page-content">

<div class="tabs">
<div class="tab active" data-tab="design">🎨</div>
<div class="tab" data-tab="itai">🤖</div>
<div class="tab" data-tab="money">💰</div>
</div>

<h3 id="forumTitleEmbedded">DESIGN</h3>
<p id="forumTextEmbedded">Графический дизайн...</p>

</div>
</section>

</div>
</div>

<script src="journal.js"></script>
</body>
</html>
