<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PAINT</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/paint.css">
</head>
<body>
    <div class="paint-container">
        <div class="paint-header">
            <a href="index.html" class="close-link"><img src="assets/close.png" alt="Close"></a>
            <h1>PAINT</h1>
        </div>
        <canvas id="paintCanvas" width="600" height="600"></canvas>
        <div class="paint-controls">
            <input type="color" id="colorPicker" value="#a84d6b">
            <button class="universal-btn" id="clearCanvasBtn"><span class="btn-inner"><span>CLEAR</span></span></button>
            <label class="universal-btn">
                <span class="btn-inner"><span>LOAD</span></span>
                <input type="file" id="imageLoader" accept="image/*" style="display:none;">
            </label>
            <button class="universal-btn" id="saveCanvasBtn"><span class="btn-inner"><span>SAVE</span></span></button>
        </div>
        <div id="saveMessage" class="save-message"></div>
    </div>
    <script src="js/paint.js"></script>
</body>
</html>
