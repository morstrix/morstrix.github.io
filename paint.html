<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PAINT</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/paint.css">
</head>
<body>

<!-- Верхняя панель -->
<div class="paint-top-panel">
    <span class="paint-title">ПЕИНТ</span>
    <button class="paint-close-btn" id="paintCloseBtn" title="Вернуться в журнал">✕</button>
</div>

<!-- Основной контейнер -->
<div class="paint-main">
    
    <!-- Панель над холстом: undo/redo и слои -->
    <div class="canvas-toolbar">
        <div class="toolbar-left">
            <button class="tool-btn" id="undoBtn" title="Отменить">↩</button>
            <button class="tool-btn" id="redoBtn" title="Повторить">↪</button>
        </div>
        <div class="toolbar-right">
            <button class="tool-btn" id="layersBtn" title="Слои">СЛОИ</button>
        </div>
    </div>

    <!-- Холст -->
    <div class="canvas-wrapper">
        <canvas id="paintCanvas" width="600" height="600"></canvas>
    </div>

    <!-- Панель инструментов -->
    <div class="tools-panel">
        <div class="color-row">
            <label for="colorPicker">ЦВЕТ:</label>
            <input type="color" id="colorPicker" value="#444444">
            <span class="color-value" id="colorValue">#444444</span>
        </div>
        <div class="brush-row">
            <label for="brushSize">КИСТЬ:</label>
            <input type="range" id="brushSize" min="1" max="30" value="5">
            <span id="brushSizeValue">5</span>
        </div>
        <div class="action-buttons">
            <button class="paint-action-btn" id="clearBtn">CLEAR</button>
            <button class="paint-action-btn" id="loadBtn">LOAD</button>
            <button class="paint-action-btn" id="saveBtn">SAVE</button>
        </div>
        <!-- Свободное место для будущих элементов -->
        <div class="extra-space"></div>
    </div>
</div>

<!-- Мини-модалка слоёв (Top / Background) -->
<div id="layersModal" class="mini-modal">
    <div class="mini-modal-content">
        <button class="layer-option" id="layerTop">TOP</button>
        <button class="layer-option" id="layerBackground">BACK</button>
    </div>
</div>

<!-- Скрытый input для загрузки изображений -->
<input type="file" id="imageLoader" accept="image/*" style="display: none;">

<script src="js/paint.js"></script>
</body>
</html>
