<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ФОРУМ | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .forum-container {
            max-width: 750px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            width: 100%;
        }
        
        /* РЕТРО-ВІКНО */
        .retro-window {
            margin-bottom: 30px;
        }
        
        .window-border {
            background: #0a0a0a;
            border: 2px solid #a84d6b;
            padding: 22px;
            position: relative;
        }
        
        .corner-tl {
            top: -1px;
            left: -1px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-tr {
            top: -1px;
            right: -1px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-bl {
            bottom: -1px;
            left: -1px;
            border-right: none;
            border-top: none;
        }
        
        .corner-br {
            bottom: -1px;
            right: -1px;
            border-left: none;
            border-top: none;
        }
        
        .static-line {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #a84d6b, transparent);
            opacity: 0.4;
            pointer-events: none;
        }
        
        .window-title {
            font-size: 11px;
            color: #a84d6b;
            letter-spacing: 2px;
            margin-bottom: 18px;
            display: inline-block;
            background: rgba(168,77,107,0.1);
            padding: 4px 10px;
        }
        
        .description-text {
            color: #a1a1a1;
            font-size: 10px;
            line-height: 1.8;
            margin: 15px 0;
        }
        
        .description-text .highlight {
            color: #a84d6b;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
            padding-top: 15px;
            border-top: 1px solid #2a2a2a;
        }
        
        .tag {
            font-size: 7px;
            color: #a1a1a1;
            background: #111;
            padding: 5px 10px;
            letter-spacing: 1px;
            border: 1px solid #2a2a2a;
        }
        
        /* Віджет коментарів */
        .comments-wrapper {
            background: transparent;
            border: none;
            overflow: hidden;
            margin-bottom: 25px;
        }
        
        /* Кнопка */
        .tg-button {
            text-align: center;
            margin-top: 15px;
        }
        
        .tg-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #0a0a0a;
            color: #a84d6b;
            text-decoration: none;
            padding: 12px 28px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            border: 2px solid #a84d6b;
            transition: all 0.15s;
        }
        
        .tg-link:active {
            background: #a84d6b;
            color: #000;
            transform: scale(0.95);
        }
        
        /* Адаптація */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            .window-title {
                font-size: 9px;
            }
            .description-text {
                font-size: 9px;
                line-height: 1.6;
            }
            .tag {
                font-size: 6px;
                padding: 4px 8px;
            }
            .tg-link {
                font-size: 8px;
                padding: 10px 20px;
            }
            .window-border {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- НОВЫЙ КРЕСТИК -->
    <a href="index.html" class="back-button">
        <span>×</span>
    </a>
    
    <div class="forum-container">
        <!-- РЕТРО-ВІКНО -->
        <div class="retro-window">
            <div class="window-border">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <div class="static-line"></div>
                
                <div class="window-title">
                    ГОСТЬОВА КНИГА
                </div>
                
                <div class="description-text">
                    <span class="highlight">> СТАТУС:</span> ВІДКРИТО<br>
                    <span class="highlight">> ТЕМА:</span> ОБГОВОРЕННЯ ПРОЄКТУ<br>
                    <span class="highlight">> ПРАВИЛА:</span> БЕЗ СПАМУ, ПОВАГА<br><br>
                    залишайте свої коментарі нижче
                </div>
                
                <div class="tags">
                    <span class="tag">#MORSTRIX</span>
                    <span class="tag">#Y2K</span>
                    <span class="tag">#FUTURISM</span>
                    <span class="tag">#PIXELART</span>
                </div>
            </div>
        </div>
        
        <!-- ВІДЖЕТ КОМЕНТАРІВ (БЕЗ РАМКИ) -->
        <div class="comments-wrapper">
            <script async 
                src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-discussion="morstrix/56"
                data-width="100%"
                data-dark="1"
                data-color="a84d6b"
                data-comments-limit="50">
            </script>
        </div>
        
        <!-- КНОПКА -->
        <div class="tg-button">
            <a href="https://t.me/+n5Qg8d2h9qliMmRi" target="_blank" class="tg-link">
                ПРИЄДНАТИСЯ
            </a>
        </div>
    </div>
</body>
</html>
