name: Update Diary Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Добавляем явные права на запись
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Threads Data
        run: |
          python3 -c "
          import requests, json, datetime
          try:
              # Используем другой открытый прокси, если первый лежал
              url = 'https://threads-api.vercel.app/api/profile?username=grimexframe'
              res = requests.get(url, timeout=20).json()
              threads = res.get('threads', [])
              
              posts_data = []
              for t in threads[:5]:
                  items = t.get('thread_items', [])
                  if items:
                      post = items[0].get('post', {})
                      text = post.get('caption', {}).get('text', '')
                      ts = post.get('taken_at', 0)
                      if text:
                          d = datetime.datetime.fromtimestamp(ts).strftime('%d.%m.%Y')
                          posts_data.append({'date': d, 'text': text.upper()})
              
              if not posts_data:
                  posts_data = [{'date': 'SYSTEM', 'text': 'EMPTY_FEED_OR_PRIVATE_PROFILE'}]
                  
              with open('diary.json', 'w', encoding='utf-8') as f:
                  json.dump(posts_data, f, ensure_ascii=False, indent=2)
          except Exception as e:
              print(f'Error: {e}')
              with open('diary.json', 'w') as f:
                  json.dump([{'date': 'ERROR', 'text': 'PROX_CONNECTION_FAILED'}], f)
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add diary.json
          git commit -m 'System: Auto-update diary' || exit 0
          git push
