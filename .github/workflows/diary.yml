name: Update Diary Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Fetch Threads Data
        run: |
          python3 - << 'EOF'
          import requests, json, datetime, time

          def fetch_posts():
              user = 'grimexframe'
              # Попытка №1: Основной API
              try:
                  url = f'https://threads-api.vercel.app/api/profile?username={user}'
                  res = requests.get(url, timeout=20)
                  data = res.json().get('threads', [])
                  if data:
                      return parse_data(data)
              except: pass

              # Попытка №2: Резервный API
              try:
                  url = f'https://threads-photofeed.vercel.app/api/feed?username={user}'
                  res = requests.get(url, timeout=20)
                  data = res.json().get('data', {}).get('threads', [])
                  if data:
                      return parse_data(data, is_alt=True)
              except: pass
              
              return []

          def parse_data(threads, is_alt=False):
              posts = []
              for t in threads[:6]:
                  # У разных API разная структура, пробуем обе
                  item = t if is_alt else t.get('thread_items', [{}])[0]
                  post = item.get('post', item)
                  text = post.get('caption', {}).get('text', '')
                  ts = post.get('taken_at', 0)
                  if text:
                      d = datetime.datetime.fromtimestamp(ts).strftime('%d.%m.%Y')
                      posts.append({'date': d, 'text': text.upper()})
              return posts

          results = fetch_posts()
          
          # Если совсем глухо, пишем время последней проверки, чтобы видеть прогресс
          current_time = datetime.datetime.now().strftime('%H:%M:%S')
          if not results:
              results = [{"date": "STATUS", "text": f"SYNCING_WITH_THREADS_AT_{current_time}..."}]
          
          with open('diary.json', 'w', encoding='utf-8') as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add diary.json
          git commit -m 'System: Auto-sync diary' || exit 0
          git pull --rebase origin main
          git push