name: Update Diary Posts
on:
  schedule:
    - cron: '0 * * * *' # Раз в час
  workflow_dispatch: # Кнопка в GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Threads Posts
        run: |
          python3 -c "
          import requests, json, datetime

          USERNAME = 'grimexframe'
          # Используем стабильный прокси для Threads
          URL = f'https://threads-api.vercel.app/api/profile?username={USERNAME}'
          
          try:
              res = requests.get(URL, timeout=15).json()
              threads = res.get('threads', [])
              
              posts_list = []
              for t in threads[:5]:
                  # Достаем текст поста
                  thread_items = t.get('thread_items', [])
                  if not thread_items: continue
                  
                  post = thread_items[0].get('post', {})
                  text = post.get('caption', {}).get('text', '')
                  timestamp = post.get('taken_at', 0)
                  
                  if text:
                      date_str = datetime.datetime.fromtimestamp(timestamp).strftime('%d.%m.%Y')
                      posts_list.append({
                          'date': date_str,
                          'text': text.upper() # В твоем стиле (капс)
                      })

              if not posts_list:
                  posts_list = [{'date': 'SYSTEM', 'text': 'NO_NEW_DATA_RECEIVED'}]
              
              with open('diary.json', 'w', encoding='utf-8') as f:
                  json.dump(posts_list, f, ensure_ascii=False, indent=2)
                  
          except Exception as e:
              print(f'Error: {e}')
              # Если ошибка, создаем файл-заглушку, чтобы сайт не падал
              with open('diary.json', 'w') as f:
                  json.dump([{'date': 'ERROR', 'text': 'SYNC_FAILED_RETrying_LATER'}], f)
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add diary.json
          git commit -m 'System: Diary live sync' || exit 0
          git push