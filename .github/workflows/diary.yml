name: Update Diary Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Threads Data
        run: |
          python3 -c "
          import requests, json, datetime
          
          def fetch_posts():
              user = 'grimexframe'
              # Используем проверенный прокси-шлюз
              url = f'https://threads-api.vercel.app/api/profile?username={user}'
              try:
                  res = requests.get(url, timeout=30)
                  data = res.json()
                  threads = data.get('threads', [])
                  
                  final_posts = []
                  for t in threads[:8]:
                      items = t.get('thread_items', [])
                      if not items: continue
                      
                      post = items[0].get('post', {})
                      text = post.get('caption', {}).get('text', '')
                      ts = post.get('taken_at', 0)
                      
                      if text:
                          # Сохраняем текст как есть (с эмодзи), но в верхнем регистре
                          date_str = datetime.datetime.fromtimestamp(ts).strftime('%d.%m.%Y')
                          final_posts.append({
                              'date': date_str,
                              'text': text.upper()
                          })
                  return final_posts
              except Exception as e:
                  print(f'Error: {e}')
                  return []

          posts = fetch_posts()
          
          # Если постов нет, создаем системное уведомление
          if not posts:
              posts = [{'date': 'SYSTEM', 'text': 'IDLE_MODE: WAITING_FOR_NEW_THREADS'}]
          
          with open('diary.json', 'w', encoding='utf-8') as f:
              json.dump(posts, f, ensure_ascii=False, indent=2)
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add diary.json
          git commit -m 'System: Diary sync' || exit 0
          git push
