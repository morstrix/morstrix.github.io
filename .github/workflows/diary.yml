name: Update Diary Posts
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Fetch Threads via RSS
        run: |
          python3 - << 'EOF'
          import feedparser, json, datetime, re, sys
          
          # Пробуем разные источники
          sources = [
              f"https://rss.app/feeds/_threads_grimexframe.xml",
              f"https://api.rss2json.com/v1/api.json?rss_url=https://www.threads.net/@{username}"
          ]
          
          username = "grimexframe"
          posts = []
          
          # Способ 1: Через rss.app (если есть кастомный фид)
          try:
              feed = feedparser.parse(f"https://rss.app/feeds/_threads_{username}.xml")
              if feed.entries:
                  for entry in feed.entries[:5]:
                      posts.append({
                          'date': datetime.datetime.strptime(entry.published, '%a, %d %b %Y %H:%M:%S %Z').strftime('%d.%m.%Y %H:%M'),
                          'text': re.sub(r'<[^>]+>', '', entry.description)[:200].upper()
                      })
          except Exception as e:
              print(f"RSS.app error: {e}")
          
          # Способ 2: Заглушка с реальным временем (пока нет API)
          if not posts:
              now = datetime.datetime.now().strftime('%d.%m.%Y %H:%M:%S')
              posts = [
                  {'date': now, 'text': f"LAST_SCAN: {now}"},
                  {'date': 'STATUS', 'text': 'AWAITING_THREADS_API'}
              ]
          
          with open('diary.json', 'w', encoding='utf-8') as f:
              json.dump(posts, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add diary.json
          git commit -m "Threads sync: $(date '+%Y-%m-%d %H:%M')" || exit 0
          git pull --rebase origin main
          git push
