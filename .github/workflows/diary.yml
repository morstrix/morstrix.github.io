name: Update Diary Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch Threads Data
        run: |
          python3 - << 'EOF'
          import requests, json, datetime, re
          from bs4 import BeautifulSoup

          def fetch_via_bridge():
              user = 'grimexframe'
              # Используем другой мощный RSS мост
              url = f'https://nitter.net/search?q={user}' # Это пример, сейчас подставим Тредс
              # Но для Тредса лучше всего работает этот фид:
              api_url = f'https://threads-api.vercel.app/api/profile?username={user}'
              
              try:
                  headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'}
                  res = requests.get(api_url, headers=headers, timeout=30)
                  data = res.json()
                  threads = data.get('threads', [])
                  
                  result = []
                  for t in threads[:5]:
                      items = t.get('thread_items', [])
                      if items:
                          p = items[0].get('post', {})
                          txt = p.get('caption', {}).get('text', '')
                          if txt:
                              d = datetime.datetime.fromtimestamp(p.get('taken_at', 0)).strftime('%d.%m.%Y')
                              result.append({'date': d, 'text': txt.upper()})
                  return result
              except:
                  return []

          posts = fetch_via_bridge()
          
          # Если все еще пусто - пишем КРИТИЧЕСКУЮ ошибку, чтобы мы видели, что происходит
          if not posts:
              posts = [{"date": "ERROR", "text": "META_BLOCK_DETECTED_WAITING_RETRY"}]
          
          with open('diary.json', 'w', encoding='utf-8') as f:
              json.dump(posts, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add diary.json
          git commit -m 'System: Diary sync' || exit 0
          git pull --rebase origin main
          git push