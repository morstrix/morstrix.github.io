name: Update Diary Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Fetch Threads Data
        run: |
          python3 << 'EOF'
          import requests, json, datetime
          def fetch():
              user = 'grimexframe'
              url = f'https://threads-api.vercel.app/api/profile?username={user}'
              try:
                  res = requests.get(url, timeout=30)
                  res.raise_for_status()
                  threads = res.json().get('threads', [])
                  result = []
                  for t in threads[:8]:
                      items = t.get('thread_items', [])
                      if items:
                          post = items[0].get('post', {})
                          text = post.get('caption', {}).get('text', '')
                          ts = post.get('taken_at', 0)
                          if text:
                              d = datetime.datetime.fromtimestamp(ts).strftime('%d.%m.%Y')
                              result.append({'date': d, 'text': text.upper()})
                  return result
              except Exception as e:
                  print(f"Error: {e}")
                  return []

          data = fetch() or [{'date': 'SYSTEM', 'text': 'IDLE_MODE: WAITING_FOR_DATA'}]
          with open('diary.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: git pull --rebase
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add diary.json
          git commit -m 'System: Diary sync' || exit 0
          git push
