name: Sync Threads to Diary

on:
  schedule:
    - cron: '0 */3 * * *' # Запуск каждые 3 часа
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run update script
        run: python .github/scripts/update_threads.py

      - name: Commit and Push
        run: |
          git config --global user.name "ThreadsBot"
          git config --global user.email "bot@github.com"
          git add diary.json
          git commit -m "Update threads diary" || exit 0
          git push
