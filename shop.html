<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | ДОСКА</title>
    <script async defer src="https://assets.pinterest.com/js/pinit.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: #000000;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* контейнер занимает всю доступную ширину, но с отступами */
        .center-wrapper {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* убираем возможные отступы у виджета */
        .pinterest-widget {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .pinterest-widget a {
            display: block;
            width: 100%;
        }

        /* принудительно растягиваем iframe на всю ширину */
        .pinterest-widget iframe {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 auto !important;
            display: block !important;
        }

        /* кнопка назад */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            text-decoration: none;
        }
        .custom-back-icon {
            width: 32px;
            filter: brightness(0.7) sepia(1) hue-rotate(290deg);
            transition: filter 0.2s;
        }
        .custom-back-icon:hover {
            filter: brightness(1) sepia(1) hue-rotate(280deg);
        }
    </style>
</head>
<body>

<a href="index.html" class="back-button">
    <img src="close.jpg" alt="X" class="custom-back-icon">
</a>

<div class="center-wrapper">
    <div class="pinterest-widget">
        <a data-pin-do="embedBoard" 
           data-pin-board-width="100%" 
           data-pin-scale-height="800" 
           data-pin-scale-width="120" 
           href="https://www.pinterest.com/morstrix/шоп/">
        </a>
    </div>
</div>

<script>
    // Ждём загрузки виджета и принудительно центрируем iframe
    function centerPinterestWidget() {
        setTimeout(() => {
            const iframes = document.querySelectorAll('.pinterest-widget iframe');
            iframes.forEach(iframe => {
                iframe.style.width = '100%';
                iframe.style.margin = '0 auto';
                iframe.style.display = 'block';
            });
        }, 500);
    }

    if (window.PinUtils) {
        window.PinUtils.build();
        centerPinterestWidget();
    } else {
        const checkInterval = setInterval(() => {
            if (window.PinUtils) {
                window.PinUtils.build();
                centerPinterestWidget();
                clearInterval(checkInterval);
            }
        }, 200);
    }
    
    // дополнительно после полной загрузки
    window.addEventListener('load', centerPinterestWidget);
</script>
</body>
</html>
