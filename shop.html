<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --shop-glow: #a84d6b; --card-bg: #0f0f0f; }
        body {
            background: #000;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 90px;
            font-family: 'Press Start 2P', monospace;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(168,77,107,0.04) 0px, rgba(168,77,107,0.04) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        
        .shop-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(0,0,0,0.65);
            border: 2px solid var(--shop-glow);
        }
        .shop-title { font-size: 1.3rem; color: var(--shop-glow); }
        .shop-subtitle { font-size: 0.6rem; color: #7a8278; margin-top: 12px; }
        
        /* КРЕСТИК - СВЕРХУ, ВЫШЕ ВСЕГО */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            text-decoration: none;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--shop-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .back-button:hover {
            background: rgba(168,77,107,0.3);
            transform: scale(1.02);
        }
        .back-button:active {
            transform: scale(0.95);
        }
        .custom-back-icon {
            width: 28px;
            height: 28px;
            filter: brightness(0.7) sepia(1) hue-rotate(290deg);
            display: block;
        }
        
        /* КАТЕГОРИИ СЕТКОЙ 2x3 */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .cat-card {
            background: var(--card-bg);
            border: 1px solid var(--shop-glow);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .cat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(168,77,107,0.3);
            border-color: #cf6f8f;
        }
        .cat-card:active {
            transform: scale(0.98);
        }
        .cat-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            margin-bottom: 12px;
            border: 1px solid #333;
            pointer-events: none;
        }
        .cat-name {
            font-size: 0.75rem;
            color: var(--shop-glow);
            letter-spacing: 2px;
            pointer-events: none;
        }
        .price-tag {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(168,77,107,0.9);
            color: #000;
            padding: 4px 8px;
            font-size: 0.6rem;
            font-family: 'Press Start 2P', monospace;
            border-radius: 4px;
            pointer-events: none;
        }
        
        /* КОРЗИНА СНИЗУ (FIXED) */
        .cart-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            border-top: 2px solid var(--shop-glow);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(10,10,10,0.95);
        }
        .cart-bottom-btn {
            background: transparent;
            border: 1px solid var(--shop-glow);
            color: var(--shop-glow);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-bottom-count {
            background: var(--shop-glow);
            color: #000;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .cart-bottom-total {
            color: var(--shop-glow);
            font-size: 0.7rem;
        }
        
        /* МОДАЛЬНОЕ ОКНО КОРЗИНЫ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0a0a0a;
            border: 2px solid var(--shop-glow);
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; font-size: 0.7rem; }
        .cart-total { margin-top: 20px; padding-top: 10px; border-top: 2px solid var(--shop-glow); text-align: right; font-size: 0.8rem; }
        .checkout-btn { background: var(--shop-glow); color: #000; border: none; padding: 12px; width: 100%; margin-top: 15px; cursor: pointer; font-family: 'Press Start 2P', monospace; }
        .remove-item { background: none; border: none; color: #a84d6b; cursor: pointer; margin-left: 10px; font-size: 0.8rem; }
        .close-modal { background: none; border: none; color: var(--shop-glow); float: right; font-size: 1.5rem; cursor: pointer; }
        
        @media (max-width: 680px) {
            .categories-grid { gap: 15px; }
            .shop-title { font-size: 1rem; }
            .cat-name { font-size: 0.65rem; }
            .price-tag { font-size: 0.5rem; padding: 3px 6px; }
            .cart-bottom-btn { font-size: 0.55rem; padding: 8px 12px; }
            .cart-bottom-total { font-size: 0.55rem; }
            .back-button { top: 12px; right: 12px; padding: 6px; }
            .custom-back-icon { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-button">
    <img src="close.jpg" alt="X" class="custom-back-icon">
</a>

<div class="container">
    <div class="shop-header">
        <div class="shop-title">SHOP</div>
        <div class="shop-subtitle">індивідуальні замовлення</div>
    </div>

    <!-- КАТЕГОРИИ СЕТКОЙ 2x3 -->
    <div class="categories-grid" id="categoriesGrid"></div>
</div>

<!-- КОРЗИНА СНИЗУ -->
<div class="cart-bottom" id="cartBottom">
    <button class="cart-bottom-btn" id="cartBtn">
        🛒 ПАКЕТ
        <span id="cartCount" class="cart-bottom-count">0</span>
    </button>
    <div class="cart-bottom-total" id="cartTotalBottom">$0</div>
</div>

<!-- МОДАЛЬНОЕ ОКНО КОРЗИНЫ -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <button class="close-modal">✕</button>
        <h3 style="margin-bottom: 20px; font-size: 0.8rem;">ПАКЕТ</h3>
        <div id="cartItems"></div>
        <div class="cart-total" id="cartTotalModal"></div>
        <button id="checkoutBtn" class="checkout-btn">ENTER</button>
        <div style="font-size: 0.5rem; color: #666; margin-top: 12px; text-align: center;">
            * деталі в Telegram
        </div>
    </div>
</div>

<script>
    // ========== КАТЕГОРИИ С ЦЕНАМИ ==========
    const categories = [
        { id: 1, name: "PRINT", price: 15, image: "https://i.pinimg.com/736x/99/da/55/99da554066b71319b89effdf0866a332.jpg" },
        { id: 2, name: "DESIGN", price: 25, image: "https://i.pinimg.com/1200x/bb/15/67/bb15672d7aa14685cc00931db281b1a8.jpg" },
        { id: 3, name: "TATTOO", price: 20, image: "https://i.pinimg.com/736x/b0/31/ea/b031ea07ec8e4f208360ae4c7b69b0de.jpg" },
        { id: 4, name: "BARBERING", price: 18, image: "https://i.pinimg.com/736x/6b/02/8a/6b028ac4910258859105342388d0bf00.jpg" },
        { id: 5, name: "DIY GEAR", price: 30, image: "https://i.pinimg.com/736x/fc/6e/c2/fc6ec274ace15a74b58f263ec8299ced.jpg" },
        { id: 6, name: "SHMOT", price: 35, image: "https://i.pinimg.com/1200x/5b/50/2e/5b502ebe3d34a5d207c49a7602374414.jpg" }
    ];
    
    let cart = JSON.parse(localStorage.getItem('morstrix_cart')) || [];
    
    function renderCategories() {
        const container = document.getElementById('categoriesGrid');
        container.innerHTML = categories.map(cat => `
            <div class="cat-card" data-id="${cat.id}" data-name="${cat.name}" data-price="${cat.price}">
                <img src="${cat.image}" class="cat-image" onerror="this.src='https://via.placeholder.com/300x300?text=${cat.name}'">
                <div class="cat-name">${cat.name}</div>
                <div class="price-tag">$${cat.price}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('.cat-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = parseInt(card.dataset.id);
                const name = card.dataset.name;
                const price = parseFloat(card.dataset.price);
                addToCart({ id, name, price });
                
                const priceTag = card.querySelector('.price-tag');
                const originalText = priceTag.innerHTML;
                priceTag.innerHTML = 'додано';
                setTimeout(() => {
                    if (card.querySelector('.price-tag')) {
                        card.querySelector('.price-tag').innerHTML = originalText;
                    }
                }, 800);
                
                if (navigator.vibrate) navigator.vibrate(50);
            });
        });
    }
    
    function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        updateCartUI();
    }
    
    function removeFromCart(id) {
        const index = cart.findIndex(item => item.id === id);
        if (index !== -1) {
            if (cart[index].quantity > 1) {
                cart[index].quantity--;
            } else {
                cart.splice(index, 1);
            }
        }
        updateCartUI();
    }
    
    function updateCartUI() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        document.getElementById('cartCount').textContent = totalItems;
        document.getElementById('cartTotalBottom').textContent = `$${totalPrice.toFixed(2)}`;
        
        const cartItemsDiv = document.getElementById('cartItems');
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<div style="text-align:center; padding:20px;">пусто</div>';
        } else {
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <span>${item.name} x${item.quantity}</span>
                    <span>
                        $${(item.price * item.quantity).toFixed(2)}
                        <button class="remove-item" data-id="${item.id}">✕</button>
                    </span>
                </div>
            `).join('');
            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.addEventListener('click', () => removeFromCart(parseInt(btn.dataset.id)));
            });
        }
        document.getElementById('cartTotalModal').innerHTML = `ТОТАЛ: $${totalPrice.toFixed(2)}`;
        
        localStorage.setItem('morstrix_cart', JSON.stringify(cart));
    }
    
    const modal = document.getElementById('cartModal');
    document.getElementById('cartBtn').onclick = () => { updateCartUI(); modal.classList.add('active'); };
    document.querySelector('.close-modal').onclick = () => modal.classList.remove('active');
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
    
    document.getElementById('checkoutBtn').onclick = () => {
        if (cart.length === 0) { alert('пусто'); return; }
        const items = cart.map(item => `${item.name} x${item.quantity} — $${(item.price * item.quantity).toFixed(2)}`).join('\n');
        const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
        const msg = `НОВЫЙ ЗАКАЗ!\n\n${items}\n\nИТОГО: $${total.toFixed(2)}`;
        window.open(`https://t.me/share/url?url=${encodeURIComponent('Заказ Morstrix')}&text=${encodeURIComponent(msg)}`, '_blank');
        cart = [];
        updateCartUI();
        modal.classList.remove('active');
        alert('Заказ отправлен! Я свяжусь с вами в Telegram.');
    };
    
    renderCategories();
    updateCartUI();
</script>
</body>
</html>
