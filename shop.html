<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX SHOP | GUMROAD</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --shop-glow: #a84d6b;
            --card-bg: #0f0f0f;
        }

        body {
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Press Start 2P', monospace;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(168, 77, 107, 0.04) 0px, rgba(168, 77, 107, 0.04) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .shop-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 25px 20px;
            background: rgba(0, 0, 0, 0.65);
            border: 2px solid var(--shop-glow);
            backdrop-filter: blur(3px);
            position: relative;
        }

        .shop-header::before,
        .shop-header::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--shop-glow);
        }
        .shop-header::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .shop-header::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .shop-title {
            font-size: 1.3rem;
            color: var(--shop-glow);
            letter-spacing: 3px;
            text-shadow: 0 0 6px var(--shop-glow);
        }

        .shop-subtitle {
            font-size: 0.6rem;
            color: #7a8278;
            margin-top: 12px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            text-decoration: none;
        }
        .custom-back-icon {
            width: 32px;
            filter: brightness(0.7) sepia(1) hue-rotate(290deg);
        }

        .products-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--shop-glow);
            padding: 20px;
            min-height: 500px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--shop-glow);
            padding: 15px;
            transition: all 0.2s ease;
            width: 280px;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(168, 77, 107, 0.3);
            border-color: #cf6f8f;
        }

        .product-image {
            width: 100%;
            height: auto;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 0.75rem;
            color: var(--shop-glow);
            margin-bottom: 10px;
            word-break: break-word;
        }

        .product-price {
            font-size: 0.7rem;
            color: #7a8278;
            margin-bottom: 15px;
        }

        .buy-button {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--shop-glow);
            color: var(--shop-glow);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            padding: 8px 16px;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .buy-button:hover {
            background: var(--shop-glow);
            color: #000;
        }

        .loading {
            color: var(--shop-glow);
            text-align: center;
            padding: 50px;
            width: 100%;
        }

        .led-indicator {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }
        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2a2a2a;
        }
        .led.active {
            background: var(--shop-glow);
            box-shadow: 0 0 8px var(--shop-glow);
        }

        .static-line {
            position: absolute;
            bottom: 12px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--shop-glow), transparent);
            opacity: 0.4;
        }

        @media (max-width: 680px) {
            .shop-title { font-size: 1rem; }
            .products-grid { padding: 12px; gap: 15px; }
            .product-card { width: 100%; max-width: 280px; }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-button">
    <img src="close.jpg" alt="X" class="custom-back-icon">
</a>

<div class="container">
    <div class="shop-header">
        <div class="shop-title">◈ MORSTRIX SHOP ◈</div>
        <div class="shop-subtitle">[ DIY GEAR / DIGITAL GOODS ]</div>
        <div class="static-line"></div>
    </div>

    <div class="products-grid" id="productsGrid">
        <div class="loading">⏳ ЗАГРУЗКА ТОВАРОВ...</div>
    </div>

    <div class="led-indicator">
        <div class="led active"></div><div class="led"></div><div class="led"></div>
        <div class="led"></div><div class="led"></div><div class="led"></div>
    </div>
</div>

<script>
    // ========== ВСТАВЬ СВОЙ ТОКЕН СЮДА ==========
    const GUMROAD_TOKEN = "GMBXH6KQKmMcjwNqH_Hm9Q7Qlczup5CoVINn2pGzzgw";
    // ============================================
    
    async function loadProducts() {
        const container = document.getElementById('productsGrid');
        
        try {
            const response = await fetch(`https://api.gumroad.com/v2/products?access_token=${GUMROAD_TOKEN}`);
            const data = await response.json();
            
            if (!data.success || !data.products) {
                throw new Error('Не удалось загрузить товары');
            }
            
            container.innerHTML = '';
            
            data.products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                // Картинка (первая из превью)
                const previewUrl = product.preview_url || '';
                
                card.innerHTML = `
                    ${previewUrl ? `<img src="${previewUrl}" class="product-image" alt="${product.name}">` : ''}
                    <div class="product-title">${product.name}</div>
                    <div class="product-price">${product.formatted_price || product.price}</div>
                    <a href="${product.short_url}" target="_blank" class="buy-button">КУПИТЬ →</a>
                `;
                
                container.appendChild(card);
            });
            
            if (data.products.length === 0) {
                container.innerHTML = '<div class="loading">📦 ТОВАРОВ ПОКА НЕТ</div>';
            }
            
        } catch (error) {
            console.error('Ошибка:', error);
            container.innerHTML = `
                <div class="loading">
                    ⚠️ НЕ УДАЛОСЬ ЗАГРУЗИТЬ ТОВАРЫ<br>
                    <small style="font-size:0.55rem;">Проверь токен или настройки Gumroad</small>
                </div>
            `;
        }
    }
    
    // LED анимация
    let ledIndex = 0;
    function animateLED() {
        const leds = document.querySelectorAll('.led');
        if (!leds.length) return;
        setInterval(() => {
            leds.forEach((led, i) => {
                led.classList.toggle('active', i === ledIndex);
            });
            ledIndex = (ledIndex + 1) % leds.length;
        }, 1000);
    }
    
    loadProducts();
    animateLED();
</script>
</body>
</html>
