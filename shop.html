<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ᴅɪʏ ɢᴇᴀʀ ꜱʜᴏᴘ</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Специфічні стилі для електронного екрана */
        :root {
            --screen-green: #001a00; /* Дуже темний зелений для фону слотів */
            --pixel-green: #00ff41;  
            --border-green: #004400; /* Темно-зелена рамка */
        }

        .shop-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        /* Контейнер екрана */
        .pixel-screen {
            background: #000;
            border: 6px double var(--border-green);
            padding: 10px;
            box-shadow: 0 0 15px rgba(0, 50, 0, 0.5);
            position: relative;
            margin-bottom: 20px;
        }

        /* Сітка 3х3 */
        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 85px);
            grid-template-rows: repeat(3, 85px);
            gap: 8px;
        }

        /* Слот (квадрат) */
        .grid-slot {
            width: 85px;
            height: 85px;
            background-color: var(--screen-green);
            border: 2px solid var(--border-green);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            overflow: hidden;
            transition: transform 0.1s ease;
            position: relative;
        }

        .grid-slot:active {
            transform: scale(0.95);
            background-color: #003300;
        }

        /* Зображення (ТЕПЕР БЕЗ ЗЕЛЕНОГО ФІЛЬТРА) */
        .grid-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Залишаємо пікселізацію для стилю, але прибираємо зміну кольору */
            image-rendering: pixelated; 
        }

        /* Знак питання (темно-зелений) */
        .placeholder-question {
            font-family: 'Press Start 2P', cursive;
            color: var(--border-green);
            font-size: 30px;
            user-select: none;
        }

        /* Ефект ліній сканування поверх екрана */
        .pixel-screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(0, 255, 0, 0.02), rgba(0, 0, 0, 0), rgba(0, 255, 0, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .carousel-wrapper { display: none; }
    </style>
</head>
<body>
    <canvas id="neuro-bg"></canvas>

    <a href="index.html" class="back-button">

    <section class="site-section shop-container">

            <div class="grid-3x3">

                </a>

                <a href="https://twitter.com/morstrix" class="grid-slot">

                </a>
                <a href="https://twitter.com/morstrix" class="grid-slot">
                    <div class="placeholder-question">?</div>
                </a>
                <a href="https://twitter.com/morstrix" class="grid-slot">
                    <div class="placeholder-question">?</div>
                </a>

                <a href="https://twitter.com/morstrix" class="grid-slot">
                    <div class="placeholder-question">?</div>
                </a>
                <a href="https://twitter.com/morstrix" class="grid-slot">

                </a>
                <a href="https://twitter.com/morstrix" class="grid-slot">

        </div>


    <script src="script-bg.js"></script>

</html>
