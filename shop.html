<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX SHOP | PAYHIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --shop-glow: #a84d6b;
            --card-bg: #0f0f0f;
        }

        body {
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Press Start 2P', monospace;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(168, 77, 107, 0.04) 0px, rgba(168, 77, 107, 0.04) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* header */
        .shop-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 25px 20px;
            background: rgba(0, 0, 0, 0.65);
            border: 2px solid var(--shop-glow);
            backdrop-filter: blur(3px);
            position: relative;
        }

        .shop-header::before,
        .shop-header::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--shop-glow);
        }
        .shop-header::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .shop-header::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .shop-title {
            font-size: 1.3rem;
            color: var(--shop-glow);
            letter-spacing: 3px;
            text-shadow: 0 0 6px var(--shop-glow);
        }

        .shop-subtitle {
            font-size: 0.6rem;
            color: #7a8278;
            margin-top: 12px;
        }

        /* кнопка назад */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            text-decoration: none;
        }
        .custom-back-icon {
            width: 32px;
            filter: brightness(0.7) sepia(1) hue-rotate(290deg);
        }

        /* виджет Payhip */
        .payhip-widget {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--shop-glow);
            padding: 20px;
            min-height: 500px;
        }

        /* если используешь iframe от Payhip */
        .payhip-widget iframe {
            width: 100%;
            min-height: 600px;
            border: none;
            background: transparent;
        }

        /* LED индикатор */
        .led-indicator {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }
        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2a2a2a;
        }
        .led.active {
            background: var(--shop-glow);
            box-shadow: 0 0 8px var(--shop-glow);
        }

        .static-line {
            position: absolute;
            bottom: 12px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--shop-glow), transparent);
            opacity: 0.4;
        }

        @media (max-width: 680px) {
            .shop-title { font-size: 1rem; }
            .payhip-widget { padding: 12px; }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-button">
    <img src="close.jpg" alt="X" class="custom-back-icon">
</a>

<div class="container">
    <div class="shop-header">
        <div class="shop-title">◈ MORSTRIX SHOP ◈</div>
        <div class="shop-subtitle">[ DIY GEAR / DIGITAL GOODS ]</div>
        <div class="static-line"></div>
    </div>

    <!-- ВСТАВЬ СЮДА СВОЙ КОД ОТ PAYHIP -->
    <div class="payhip-widget">
        <!-- 
            👇 ЗАМЕНИ ЭТОТ КОД НА ТВОЙ ИЗ PAYHIP
            В Payhip зайди в "Settings" → "Embed" → скопируй код виджета
        -->
        <iframe src="https://payhip.com/morstrix" style="width:100%; height:600px; border:none;"></iframe>
        <!-- 
            ИЛИ если используешь JavaScript виджет:
            <script async src="https://payhip.com/payhip.js"></script>
            <div data-payhip-store="твой-id"></div>
        -->
    </div>

    <div class="led-indicator">
        <div class="led active"></div><div class="led"></div><div class="led"></div>
        <div class="led"></div><div class="led"></div><div class="led"></div>
    </div>
</div>

<script>
    // LED анимация
    let ledIndex = 0;
    function animateLED() {
        const leds = document.querySelectorAll('.led');
        if (!leds.length) return;
        setInterval(() => {
            leds.forEach((led, i) => {
                led.classList.toggle('active', i === ledIndex);
            });
            ledIndex = (ledIndex + 1) % leds.length;
        }, 1000);
    }
    animateLED();
</script>
</body>
</html>
