<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/store.css">
</head>
<body class="page-shop">

<a href="index.html" class="back-button">
    <img src="assets/close.png" alt="Back">
</a>

<div class="container">
    <div class="shop-header">
        <div class="shop-title">DIY GEAR</div>
        <div class="shop-subtitle">індивідуальні замовлення</div>
    </div>

    <!-- КАРУСЕЛЬ -->
    <div class="carousel-section">
        <div class="carousel-container">
            <div class="carousel-arrow arrow-left" id="carouselPrev">‹</div>
            <div class="carousel-track" id="carouselTrack"></div>
            <div class="carousel-arrow arrow-right" id="carouselNext">›</div>
        </div>
    </div>

    <!-- 4 КАТЕГОРІЇ -->
    <div class="categories-grid" id="categoriesGrid"></div>

    <!-- MERCH CONSTRUCTOR -->
    <div class="merch-section">
        <div class="shop-title" style="font-size: 0.9rem; margin: 30px 0 20px;">MERCH CONSTRUCTOR</div>
        <div class="merch-constructor">
            <div class="tshirt-preview">
                <img src="assets/tshirt.jpeg" alt="T-shirt" class="tshirt-img">
                <canvas id="printCanvas" class="print-canvas"></canvas>
            </div>
            <div class="upload-area" id="uploadArea">
                <div class="dashed-box">
                    <span class="upload-text">UPLOAD PRINT</span>
                    <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/gif">
                </div>
            </div>
            <button class="reset-btn" id="resetPrint">CLEAR</button>
        </div>
    </div>

    <!-- CONVERTER -->
    <div class="converter-section">
        <div class="shop-title" style="font-size: 0.9rem; margin: 30px 0 20px;">CONVERTER</div>
        <div class="converter-container">
            <input type="text" id="pxInput" class="converter-input" placeholder="Pixels" autocomplete="off" inputmode="numeric">
            <span class="converter-arrow">⇄</span>
            <input type="text" id="cmInput" class="converter-input" placeholder="cm" autocomplete="off" inputmode="decimal">
        </div>
    </div>
</div>

<!-- КОРЗИНА -->
<div class="cart-bottom">
    <button class="cart-bottom-btn" id="cartBtn">
        ПАКЕТ
        <span id="cartCount" class="cart-bottom-count">0</span>
    </button>
    <div class="cart-bottom-total" id="cartTotalBottom">0 ₴</div>
</div>

<!-- МОДАЛЬНЕ ВІКНО КОРЗИНИ -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <button class="close-modal">✜</button>
        <h3 style="margin-bottom:20px;font-size:0.8rem;color:#ffffff;">ПАКЕТ</h3>
        <div id="cartItems"></div>
        <div class="cart-total" id="cartTotalModal"></div>
        <button id="checkoutBtn" class="checkout-btn">ENTER</button>
        <div style="font-size:0.5rem;color:#a1a1a1;margin-top:12px;text-align:center;">* узгодити питання</div>
    </div>
</div>

<script src="js/store.js"></script>
</body>
</html>
