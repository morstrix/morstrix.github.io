<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="store.css">
    <link rel="stylesheet" href="theme.css">
</head>
<body class="page-shop">

<a href="index.html" class="back-button">
    <img src="assets/close.png" alt="Back" style="width: 30px; height: 30px;">
</a>
<div class="container">
    <div class="shop-header">
        <div class="shop-title">DIY GEAR</div>
        <div class="shop-subtitle">індивідуальні замовлення</div>
    </div>
    <div class="categories-grid" id="categoriesGrid"></div>
</div>

<div class="cart-bottom">
    <button class="cart-bottom-btn" id="cartBtn">
        ПАКЕТ
        <span id="cartCount" class="cart-bottom-count">0</span>
    </button>
    <div class="cart-bottom-total" id="cartTotalBottom">$0</div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <button class="close-modal">✜</button>
        <h3 style="margin-bottom:20px;font-size:0.8rem;color:var(--shop-text-white);">ПАКЕТ</h3>
        <div id="cartItems"></div>
        <div class="cart-total" id="cartTotalModal"></div>
        <button id="checkoutBtn" class="checkout-btn">ENTER</button>
        <div style="font-size:0.5rem;color:var(--shop-text-gray);margin-top:12px;text-align:center;">* узгодити питання</div>
    </div>
</div>

<script src="store.js"></script>
<script src="background.js"></script>
</body>
</html>
