<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/store.css">
</head>
<body class="page-shop">
    <div class="top-panel">
        <span class="panel-title">DIY GEAR</span>
        <div class="panel-icons">
            <button class="icon-btn" id="constructorIcon" title="Конструктор">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4L20 4L20 20L4 20L4 4Z"/><path d="M12 4L12 20"/><path d="M4 12L20 12"/></svg>
            </button>
            <button class="icon-btn" id="converterIcon" title="Конвертер px↔cm">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10L12 5L17 10"/><path d="M7 14L12 19L17 14"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
            </button>
        </div>
        <a href="index.html" class="panel-close"><img src="assets/close.png" alt="Close"></a>
    </div>

    <div class="shop-content">
        <div class="categories-grid" id="categoriesGrid"></div>
    </div>

    <div class="cart-bottom">
        <button class="cart-bottom-btn" id="cartBtn">ПАКЕТ <span id="cartCount" class="cart-bottom-count">0</span></button>
        <div class="cart-bottom-total" id="cartTotalBottom">0 ₴</div>
    </div>

    <!-- Модалки -->
    <div id="cartModal" class="modal-overlay"><!-- как раньше --></div>
    <div id="productModal" class="modal-overlay"><!-- как раньше --></div>

    <div id="constructorModal" class="modal-overlay">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header"><span class="modal-title-text">CONSTRUCTOR</span><button class="modal-close-btn" data-modal="constructorModal">✜</button></div>
            <div class="modal-inner">
                <div class="merch-constructor">
                    <div class="tshirt-preview">
                        <img src="assets/tshirt.jpeg" class="tshirt-img" alt="T-shirt">
                        <canvas id="printCanvasEmbedded" class="print-canvas"></canvas>
                    </div>
                    <div class="upload-area">
                        <label for="imageUploadEmbedded" class="file-upload-label"><span class="file-upload-text">choose file</span></label>
                        <input type="file" id="imageUploadEmbedded" accept="image/*" style="display:none;">
                        <button class="universal-btn" id="resetPrintEmbedded"><span class="btn-inner"><span>CLEAR</span></span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="converterModal" class="modal-overlay">
        <div class="modal-content" style="max-width:350px;">
            <div class="modal-header"><span class="modal-title-text">CONVERTER</span><button class="modal-close-btn" data-modal="converterModal">✜</button></div>
            <div class="modal-inner">
                <div class="converter-container">
                    <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                        <div><div style="font-size:8px;color:#888;">pixels</div><input type="text" id="pxInputEmbedded" class="converter-input" placeholder="0" inputmode="numeric"></div>
                        <span class="converter-arrow">⇄</span>
                        <div><div style="font-size:8px;color:#888;">cm</div><input type="text" id="cmInputEmbedded" class="converter-input" placeholder="0.0" inputmode="decimal"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/store.js"></script>
</body>
</html>
