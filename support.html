<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>MORSTRIX | TETRIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tetris.css">
</head>
<body>

<a href="index.html" class="back-button"><span>✜</span></a>

<div class="game-container">
    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label">SCORE</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="right-stats">
            <div class="next-box">
                <div class="stat-label">NEXT</div>
                <canvas id="next-piece-canvas" width="50" height="50"></canvas>
            </div>
            <button id="pause-btn" class="pause-btn">
                ⏸<span class="pause-label">PAUSE</span>
            </button>
        </div>
    </div>

    <div class="game-area">
        <canvas id="tetris-canvas"></canvas>
    </div>

    <div class="control-bar">
        <button id="left-btn" class="control-btn">
            <div class="arrow-left"><i class="pixel-arrow"></i></div>
        </button>
        <button id="rotate-btn" class="control-btn">
            <div class="rotate-icon"></div>
        </button>
        <button id="right-btn" class="control-btn">
            <div class="arrow-right"><i class="pixel-arrow"></i></div>
        </button>
        <button id="down-btn" class="control-btn">
            <div class="arrow-down"><i class="pixel-arrow"></i></div>
        </button>
    </div>
</div>

<script src="tetris.js"></script>
</body>
</html>
