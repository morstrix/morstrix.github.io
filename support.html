<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a2a">
    <title>MORSTRIX | TETRIS · DARK FANTASY</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050510;
            --bg-darker: #020208;
            --grid-color: #2a1a3a;
            --glow-purple: #8a4fff;
            --glow-cyan: #2affb6;
            --glow-red: #ff3a6f;
            --text-glow: #b87cff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: radial-gradient(ellipse at center, #0a0a2a 0%, #020208 100%);
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Press Start 2P', monospace;
        }
        
        /* Анимированный фон с частицами */
        .pixel-dust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(138, 79, 255, 0.3), transparent),
                radial-gradient(3px 3px at 80% 70%, rgba(42, 255, 182, 0.2), transparent),
                radial-gradient(1px 1px at 45% 85%, rgba(255, 58, 111, 0.25), transparent);
            background-size: 200px 200px, 300px 300px, 150px 150px;
            background-repeat: no-repeat;
            animation: dustDrift 20s linear infinite;
        }
        
        @keyframes dustDrift {
            0% { background-position: 0% 0%, 0% 0%, 0% 0%; }
            100% { background-position: 200% 100%, 300% 200%, 150% 150%; }
        }
        
        /* CRT + scanlines эффект */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.3) 0px,
                rgba(0, 0, 0, 0.3) 2px,
                transparent 2px,
                transparent 6px
            );
            animation: scanlines 8s linear infinite;
        }
        
        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(100%); }
        }
        
        /* Кнопка назад - готический стиль */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            text-decoration: none;
            background: rgba(10, 5, 20, 0.7);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--glow-purple);
            box-shadow: 0 0 15px rgba(138, 79, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .back-button:active {
            transform: scale(0.92);
            box-shadow: 0 0 25px rgba(138, 79, 255, 0.6);
        }
        
        .custom-back-icon {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 4px #8a4fff);
        }
        
        /* Основной контейнер */
        .game-container {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            padding: 20px 15px 15px 15px;
        }
        
        /* Верхняя панель - стилизованная */
        .stats-panel {
            background: rgba(5, 5, 20, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glow-purple);
            border-radius: 16px;
            padding: 12px 24px;
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(138, 79, 255, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
        }
        
        .stats-panel::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--glow-purple), var(--glow-cyan), var(--glow-red));
            border-radius: 18px;
            z-index: -1;
            opacity: 0.3;
            filter: blur(4px);
        }
        
        .stat-card {
            text-align: center;
            position: relative;
        }
        
        .stat-label {
            font-size: 9px;
            color: var(--glow-cyan);
            text-shadow: 0 0 5px #2affb6;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, var(--glow-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(138, 79, 255, 0.5);
        }
        
        .right-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .pause-btn {
            background: none;
            border: 1px solid var(--glow-cyan);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--glow-cyan);
            font-size: 20px;
            background: rgba(0,0,0,0.5);
        }
        
        .pause-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 20px var(--glow-cyan);
        }
        
        .pause-label {
            font-size: 7px;
            margin-top: 2px;
            color: #888;
        }
        
        .next-box {
            text-align: center;
        }
        
        .next-box .stat-label {
            font-size: 8px;
        }
        
        #next-piece-canvas {
            border: 2px solid var(--glow-purple);
            background: #050510;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(138, 79, 255, 0.4);
            margin-top: 5px;
        }
        
        /* ИГРОВАЯ ОБЛАСТЬ - МАКСИМАЛЬНОЕ МЕСТО */
        .game-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 0;
            margin: 5px 0;
        }
        
        #tetris-canvas {
            display: block;
            max-width: 95vw;
            max-height: 65vh;
            width: auto;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(138, 79, 255, 0.4), inset 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid;
            border-image: linear-gradient(135deg, var(--glow-purple), var(--glow-cyan)) 1;
            animation: borderPulse 2s ease-in-out infinite;
        }
        
        @keyframes borderPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(138, 79, 255, 0.3); }
            50% { box-shadow: 0 0 50px rgba(138, 79, 255, 0.8); }
        }
        
        /* Нижние кнопки - пиксельный готический стиль */
        .control-bar {
            background: rgba(5, 5, 20, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 12px 25px;
            margin-top: 12px;
            display: flex;
            gap: 20px;
            border: 1px solid var(--glow-purple);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .control-btn {
            background: linear-gradient(135deg, #1a0a2a, #0a0520);
            border: none;
            padding: 0;
            cursor: pointer;
            transition: all 0.1s ease;
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 #3a1a5a;
        }
        
        .control-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #3a1a5a;
        }
        
        .control-btn img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 6px var(--glow-purple));
        }
        
        /* Адаптация */
        @media (max-width: 700px) {
            .stats-panel { padding: 8px 16px; gap: 20px; }
            .stat-value { font-size: 16px; }
            .stat-label { font-size: 7px; }
            .control-btn { width: 60px; height: 60px; }
            .control-bar { gap: 15px; padding: 10px 20px; }
            .pause-btn { width: 40px; height: 40px; font-size: 18px; }
            #next-piece-canvas { width: 35px; height: 35px; }
        }
        
        @media (max-width: 550px) {
            .control-btn { width: 55px; height: 55px; }
            .control-bar { gap: 12px; padding: 8px 15px; }
            .stat-value { font-size: 14px; }
            .stats-panel { gap: 15px; padding: 6px 12px; }
            .back-button { top: 12px; right: 12px; padding: 7px; }
            .custom-back-icon { width: 22px; height: 22px; }
        }
        
        @media (max-width: 450px) {
            .control-btn { width: 50px; height: 50px; }
            .control-bar { gap: 10px; }
            .right-stats { gap: 12px; }
        }
        
        /* Анимация для частиц */
        .glow-particle {
            position: fixed;
            pointer-events: none;
            width: 4px;
            height: 4px;
            background: var(--glow-purple);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 3s infinite;
        }
        
        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            20% { opacity: 0.6; transform: translateY(-20px) scale(1); }
            80% { opacity: 0.3; transform: translateY(-80px) scale(0.8); }
            100% { opacity: 0; transform: translateY(-120px) scale(0); }
        }
    </style>
</head>
<body>

<div class="pixel-dust"></div>
<div class="crt-overlay"></div>

<!-- КРЕСТИК ВИДЕН -->
<a href="index.html" class="back-button">
    <img src="close.jpg" alt="X" class="custom-back-icon">
</a>

<div class="game-container">
    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label">⚔️ SCORE</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">📜 LINES</div>
            <div id="lines" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🌀 LEVEL</div>
            <div id="level" class="stat-value">1</div>
        </div>
        
        <div class="right-stats">
            <div class="next-box">
                <div class="stat-label">✦ NEXT</div>
                <canvas id="next-piece-canvas" width="45" height="45"></canvas>
            </div>
            <button id="pause-btn" class="pause-btn">
                ⏸
                <span class="pause-label">PAUSE</span>
            </button>
        </div>
    </div>

    <div class="game-area">
        <canvas id="tetris-canvas"></canvas>
    </div>

    <div class="control-bar">
        <button id="left-btn" class="control-btn">
            <img src="1.png" alt="←" loading="lazy">
        </button>
        <button id="rotate-btn" class="control-btn">
            <img src="2.png" alt="↻" loading="lazy">
        </button>
        <button id="right-btn" class="control-btn">
            <img src="3.png" alt="→" loading="lazy">
        </button>
        <button id="down-btn" class="control-btn">
            <img src="4.png" alt="↓" loading="lazy">
        </button>
    </div>
</div>

<script>
    // Динамические частицы для атмосферы
    (function createParticles() {
        for(let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'glow-particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = 2 + Math.random() * 3 + 's';
            particle.style.background = `hsl(${260 + Math.random() * 60}, 100%, 65%)`;
            document.body.appendChild(particle);
        }
    })();
</script>

<script src="drafts.js"></script>
</body>
</html>
