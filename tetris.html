<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>MORSTRIX | TETRIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tetris.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Дополнительные стили для тетриса - ПОЛНОСТЬЮ АДАПТИВНО */
        * {
            box-sizing: border-box;
        }
        
        body {
            padding: 10px;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .game-container {
            border: 2px solid #b97272 !important;
            background: #a27791 !important;
            width: auto;
            max-width: 98vw;
            margin: 0 auto;
            padding: 8px;
        }
        
        #tetris-canvas {
            border: 2px solid #b97272 !important;
            background: #0a0a0a !important;
            display: block;
            margin: 0 auto;
        }
        
        .game-area {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        
        .stats-panel {
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .control-bar {
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            width: 50px;
            height: 40px;
        }
        
        /* Адаптация под все экраны */
        @media (max-width: 700px) {
            .control-btn {
                width: 45px;
                height: 35px;
            }
            .stat-card {
                padding: 4px 10px;
            }
            .stat-value {
                font-size: 14px;
            }
            .pause-btn {
                font-size: 8px;
                padding: 4px 8px;
            }
        }
        
        @media (max-width: 550px) {
            .control-btn {
                width: 40px;
                height: 32px;
            }
            .arrow-left, .arrow-right {
                border-width: 8px;
            }
            .arrow-down {
                border-width: 8px;
            }
        }
        
        @media (max-width: 450px) {
            .control-btn {
                width: 35px;
                height: 28px;
            }
            .stat-card {
                padding: 3px 6px;
            }
            .stat-label {
                font-size: 6px;
            }
            .stat-value {
                font-size: 10px;
            }
        }
        
        /* Крестик */
        .back-button-wrapper {
            text-align: right;
            padding: 10px;
        }
        
        .page-support {
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body class="page-support">

<!-- Крестик справа вверху -->
<div class="back-button-wrapper">
    <a href="index.html" class="back-button">
        <img src="assets/close.png" alt="Back" style="width: 30px; height: 30px;">
    </a>
</div>

<div class="game-container">
    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label">SCORE</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="right-stats">
            <div class="next-box">
                <div class="stat-label">NEXT</div>
                <canvas id="next-piece-canvas" width="50" height="50"></canvas>
            </div>
            <button id="pause-btn" class="pause-btn">
                ⏸<span class="pause-label">PAUSE</span>
            </button>
        </div>
    </div>

    <div class="game-area">
        <canvas id="tetris-canvas"></canvas>
    </div>

    <div class="control-bar">
        <button id="left-btn" class="control-btn">
            <div class="arrow-left"><i class="pixel-arrow"></i></div>
        </button>
        <button id="rotate-btn" class="control-btn">
            <div class="rotate-icon"></div>
        </button>
        <button id="right-btn" class="control-btn">
            <div class="arrow-right"><i class="pixel-arrow"></i></div>
        </button>
        <button id="down-btn" class="control-btn">
            <div class="arrow-down"><i class="pixel-arrow"></i></div>
        </button>
    </div>
</div>

<script src="background.js"></script>
<script src="tetris.js"></script>
</body>
</html>
