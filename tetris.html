<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | TETRIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tetris.css">
</head>
<body>

<div class="back-button-wrapper">
    <a href="index.html" class="back-button">
        <img src="assets/close.png" alt="Back">
    </a>
</div>

<div class="game-container">
    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label">SCORE</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="right-stats">
            <div class="next-box">
                <div class="stat-label">NEXT</div>
                <canvas id="next-piece-canvas" width="60" height="60"></canvas>
            </div>
        </div>
    </div>

    <div class="game-area">
        <canvas id="tetris-canvas"></canvas>
    </div>

    <div class="control-bar">
        <button id="left-btn" class="control-btn"><img src="assets/arrow-left.png" alt="←"></button>
        <button id="rotate-btn" class="control-btn"><img src="assets/rotate.png" alt="↻"></button>
        <button id="right-btn" class="control-btn"><img src="assets/arrow-right.png" alt="→"></button>
        <button id="down-btn" class="control-btn"><img src="assets/arrow-down.png" alt="↓"></button>
    </div>
</div>

<script src="background.js"></script>
<script type="module" src="tetris.js"></script>
</body>
</html>
