<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | TETRIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tetris.css">
</head>
<body>

<div class="game-container">
    <!-- Всё в одном ряду: крестик, SCORE, NEXT -->
    <div class="top-bar">
        <button class="close-btn" onclick="location.href='index.html'">
            <img src="assets/close.png" alt="Close">
        </button>
        <div class="score-box">
            <div class="score-label">SCORE</div>
            <div id="score" class="score-value">0</div>
        </div>
        <div class="next-box">
            <div class="next-label">NEXT</div>
            <canvas id="next-piece-canvas" width="60" height="60"></canvas>
        </div>
    </div>

    <div class="game-area">
        <canvas id="tetris-canvas"></canvas>
    </div>

    <div class="control-bar">
        <button id="left-btn" class="control-btn"><img src="assets/arrow-left.png" alt="←"></button>
        <button id="rotate-btn" class="control-btn"><img src="assets/rotate.png" alt="↻"></button>
        <button id="right-btn" class="control-btn"><img src="assets/arrow-right.png" alt="→"></button>
        <button id="down-btn" class="control-btn"><img src="assets/arrow-down.png" alt="↓"></button>
    </div>
</div>

<script src="background.js"></script>
<script type="module" src="tetris.js"></script>
</body>
</html>
