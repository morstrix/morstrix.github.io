<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | GRIM EX FRAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Tiny5&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #000; }
        #cosmicCanvas { display: none !important; }

        .profile-shell {
            padding: calc(var(--top-panel-h) + 20px) 16px 28px;
        }
        .profile-layout {
            width: min(100%, 860px);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .linkedin-badge-wrap,
        .github-wrap,
        .video-wrap,
        .text-synth-block {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .badge-base {
            min-width: min(100%, 320px);
        }
        .icon-strip {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 14px;
            flex-wrap: wrap;
            width: 100%;
        }
        .icon-action {
            border: 0;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            padding: 0;
            appearance: none;
            -webkit-appearance: none;
            font: inherit;
        }
        .icon-action img,
        .icon-action svg {
            width: 42px;
            height: 42px;
            object-fit: contain;
            image-rendering: pixelated;
            fill: #d7d7d7;
        }
        .icon-action-label {
            font-family: 'Tiny5', monospace;
            font-size: 18px;
            color: var(--text-secondary);
            text-transform: lowercase;
            letter-spacing: 1px;
            line-height: 1;
        }
        .video-frame {
            width: min(100%, 560px);
            aspect-ratio: 16 / 9;
            border: 2px solid transparent;
            border-image: linear-gradient(90deg, #4a1515, #8B3A3A, #a84d6b, #8B3A3A, #4a1515) 1;
            background: #000;
        }
        .video-frame iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: 0;
        }
        .text-synth-block {
            width: min(100%, 420px);
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .tts-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: var(--text-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .text-synth-block .styler-input {
            width: 100%;
        }
        .modal-inner-centered {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @media (max-width: 768px) {
            :root { --top-panel-h: 50px; }
            .profile-shell {
                padding-top: calc(var(--top-panel-h) + 16px);
                padding-left: 12px;
                padding-right: 12px;
            }
            .icon-strip {
                gap: 10px;
            }
            .icon-action img,
            .icon-action svg {
                width: 36px;
                height: 36px;
            }
            .icon-action-label {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<canvas id="cosmicCanvas"></canvas>

<div class="top-panel">
    <div></div>
    <a href="index.html" class="panel-close">
        <img src="assets/close.png" alt="Close">
        <span class="panel-close-label text-primary">back</span>
    </a>
</div>

<main class="profile-shell">
    <div class="profile-layout">
        <div class="linkedin-badge-wrap">
            <div class="badge-base LI-profile-badge"
                 data-locale="en_US"
                 data-size="large"
                 data-theme="dark"
                 data-type="VERTICAL"
                 data-vanity="grimexframe"
                 data-version="v1">
                <a class="badge-base__link LI-simple-link" href="https://www.linkedin.com/in/grimexframe/"></a>
            </div>
        </div>

        <div class="github-wrap">
            <button class="icon-action" type="button" data-modal-trigger="githubModal">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.5 0-.24-.01-1.03-.01-1.86-2.78.62-3.37-1.2-3.37-1.2-.46-1.2-1.11-1.52-1.11-1.52-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.58 2.35 1.12 2.92.86.09-.67.35-1.12.63-1.37-2.22-.26-4.56-1.14-4.56-5.1 0-1.13.4-2.05 1.03-2.77-.11-.27-.45-1.31.1-2.73 0 0 .85-.28 2.78 1.06A9.42 9.42 0 0 1 12 6.84c.85 0 1.71.12 2.51.35 1.93-1.34 2.78-1.06 2.78-1.06.55 1.42.21 2.46.1 2.73.64.72 1.03 1.64 1.03 2.77 0 3.97-2.34 4.83-4.57 5.09.36.32.68.95.68 1.91 0 1.38-.01 2.49-.01 2.83 0 .28.18.6.69.5A10.25 10.25 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z"></path>
                </svg>
                <span class="icon-action-label">github</span>
            </button>
        </div>

        <div class="icon-strip">
            <button class="icon-action" type="button" data-modal-trigger="threadsModal">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M16.24 10.39c-.18-3.29-2.13-5.11-5.45-5.11-3.47 0-5.79 2.29-5.79 5.69 0 3.42 2.28 5.72 5.67 5.72 2.84 0 4.87-1.5 5.37-3.95h-2.14c-.4 1.31-1.5 2.02-3.15 2.02-2.06 0-3.45-1.36-3.45-3.4s1.38-3.4 3.44-3.4c1.8 0 2.95.87 3.18 2.42-.9-.27-1.89-.4-2.9-.4-2.72 0-4.44 1.18-4.44 3.06 0 1.82 1.56 3 3.98 3 1.82 0 3.22-.54 4.16-1.61.81-.92 1.2-2.23 1.12-4.04Zm-4.9 4.1c-1.16 0-1.9-.46-1.9-1.19 0-.78.84-1.27 2.16-1.27.79 0 1.58.13 2.26.38-.1 1.37-.94 2.08-2.52 2.08Z"></path>
                </svg>
                <span class="icon-action-label">threads</span>
            </button>

            <button class="icon-action" id="instaBtn" type="button">
                <img src="assets/insta.png" alt="Instagram">
                <span class="icon-action-label">insta</span>
            </button>

            <button class="icon-action" type="button" data-modal-trigger="tiktokModal">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14.65 3c.36 2.09 1.6 3.45 3.52 4.08v2.42a7.04 7.04 0 0 1-3.5-1.06v5.1c0 3.38-2.34 5.67-5.61 5.67-3.17 0-5.55-2.31-5.55-5.39 0-3.35 2.58-5.66 6.2-5.66.24 0 .46.01.7.05v2.55a3.38 3.38 0 0 0-.73-.08c-1.89 0-3.3 1.24-3.3 3.03 0 1.75 1.26 3 2.96 3 1.86 0 3.03-1.2 3.03-3.39V3h2.28Z"></path>
                </svg>
                <span class="icon-action-label">tiktok</span>
            </button>
        </div>

        <div class="video-wrap">
            <div class="video-frame">
                <iframe src="https://www.youtube.com/embed/videoseries?si=A-jIrilOdUQ6vjh5&amp;list=PLi1Z1_6srFOvdJ5HrgSMoGpMnpoTrx56_"
                        title="YouTube video player"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen></iframe>
            </div>
        </div>

        <div class="text-synth-block">
            <div class="tts-title">Text Synth</div>
            <input type="text" id="ttsTextInput" class="styler-input" placeholder="TYPE TEXT">
            <select id="ttsVoiceSelect" class="styler-input"></select>
            <button class="universal-btn" id="ttsSpeakBtn" type="button">
                <span class="btn-inner"><span>SPEAK</span></span>
            </button>
            <div id="ttsStatus" style="font-family:'Tiny5',monospace;color:var(--text-secondary);font-size:14px;min-height:18px;"></div>
        </div>
    </div>
</main>

<div id="githubModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">GITHUB</span>
            <button class="modal-close-btn" data-modal="githubModal">✜</button>
        </div>
        <div class="modal-inner modal-inner-centered">
            <p class="text-secondary" style="margin-bottom:20px;">open?</p>
            <button class="universal-btn" data-href="https://github.com/grimexframe">
                <span class="btn-inner"><span>ENTER</span></span>
            </button>
        </div>
    </div>
</div>

<div id="instaModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">INSTAGRAM</span>
            <button class="modal-close-btn" data-modal="instaModal">✜</button>
        </div>
        <div class="modal-inner modal-inner-centered">
            <p class="text-secondary" style="margin-bottom:20px;">open?</p>
            <button class="universal-btn" data-href="https://www.instagram.com/grimexframe/">
                <span class="btn-inner"><span>ENTER</span></span>
            </button>
        </div>
    </div>
</div>

<div id="threadsModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">THREADS</span>
            <button class="modal-close-btn" data-modal="threadsModal">✜</button>
        </div>
        <div class="modal-inner modal-inner-centered">
            <p class="text-secondary" style="margin-bottom:20px;">open?</p>
            <button class="universal-btn" data-href="https://www.threads.com/@grimexframe">
                <span class="btn-inner"><span>ENTER</span></span>
            </button>
        </div>
    </div>
</div>

<div id="tiktokModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">TIKTOK</span>
            <button class="modal-close-btn" data-modal="tiktokModal">✜</button>
        </div>
        <div class="modal-inner modal-inner-centered">
            <p class="text-secondary" style="margin-bottom:20px;">open?</p>
            <button class="universal-btn" data-href="https://www.tiktok.com/@grimexframe">
                <span class="btn-inner"><span>ENTER</span></span>
            </button>
        </div>
    </div>
</div>

<script src="https://platform.linkedin.com/badges/js/profile.js" async defer></script>
<script>
(function() {
    function openModal(id, withSound = true) {
        document.getElementById(id)?.classList.add('active');
        if (withSound) playDisclaimerBlip();
    }
    function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }
    const uiBlipAudio = new Audio('assets/blip.mp3');
    uiBlipAudio.preload = 'auto';
    uiBlipAudio.playsInline = true;
    uiBlipAudio.load();

    function warmUpUiBlip() {
        const playAttempt = uiBlipAudio.play();
        if (playAttempt && typeof playAttempt.then === 'function') {
            playAttempt.then(() => {
                uiBlipAudio.pause();
                uiBlipAudio.currentTime = 0;
            }).catch(() => {});
        }
    }

    document.addEventListener('pointerdown', warmUpUiBlip, { once: true });
    document.addEventListener('touchstart', warmUpUiBlip, { once: true });
    document.addEventListener('keydown', warmUpUiBlip, { once: true });

    function playDisclaimerBlip() {
        uiBlipAudio.pause();
        uiBlipAudio.currentTime = 0;
        const playAttempt = uiBlipAudio.play();
        if (playAttempt && typeof playAttempt.catch === 'function') {
            playAttempt.catch(error => console.warn('UI blip failed', error));
        }
    }

    document.querySelectorAll('[data-modal-trigger]').forEach(button => {
        button.addEventListener('click', () => {
            openModal(button.dataset.modalTrigger);
        });
    });
    document.getElementById('instaBtn')?.addEventListener('click', () => {
        openModal('instaModal');
    });

    document.querySelectorAll('[data-href]').forEach(btn => {
        btn.addEventListener('click', function() {
            window.open(this.dataset.href, '_blank');
            const modalId = this.closest('.modal-overlay')?.id;
            if (modalId) closeModal(modalId);
        });
    });

    document.querySelectorAll('.modal-close-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = btn.dataset.modal;
            if (id) closeModal(id);
        });
    });

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', event => {
            if (event.target === overlay) overlay.classList.remove('active');
        });
    });

    document.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
            document.querySelectorAll('.modal-overlay.active').forEach(modal => modal.classList.remove('active'));
        }
    });

    let voices = [];
    const ttsVoiceSelect = document.getElementById('ttsVoiceSelect');
    const ttsTextInput = document.getElementById('ttsTextInput');
    const ttsSpeakBtn = document.getElementById('ttsSpeakBtn');
    const ttsStatus = document.getElementById('ttsStatus');

    function loadVoices() {
        voices = speechSynthesis.getVoices();
        if (!ttsVoiceSelect) return;
        ttsVoiceSelect.innerHTML = '';
        voices.forEach(voice => {
            const option = document.createElement('option');
            option.value = voice.name;
            option.textContent = `${voice.lang} - ${voice.name}`;
            ttsVoiceSelect.appendChild(option);
        });
        const uk = voices.find(voice => voice.lang.startsWith('uk'));
        const ru = voices.find(voice => voice.lang.startsWith('ru'));
        if (uk) ttsVoiceSelect.value = uk.name;
        else if (ru) ttsVoiceSelect.value = ru.name;
    }

    if (typeof speechSynthesis !== 'undefined') {
        speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();
    }

    function speak(text) {
        if (!text.trim()) {
            if (ttsStatus) ttsStatus.textContent = 'Введите текст';
            return;
        }
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const selectedVoice = ttsVoiceSelect?.value;
        if (selectedVoice) {
            const voice = voices.find(item => item.name === selectedVoice);
            if (voice) utterance.voice = voice;
        }
        utterance.onstart = () => { if (ttsStatus) ttsStatus.textContent = '▶ Воспроизведение'; };
        utterance.onend = () => { if (ttsStatus) ttsStatus.textContent = ''; };
        utterance.onerror = event => { if (ttsStatus) ttsStatus.textContent = 'Ошибка: ' + event.error; };
        speechSynthesis.speak(utterance);
    }

    ttsSpeakBtn?.addEventListener('click', () => speak(ttsTextInput?.value || ''));
    ttsTextInput?.addEventListener('keypress', event => {
        if (event.key === 'Enter') speak(ttsTextInput.value);
    });
})();
</script>
</body>
</html>
