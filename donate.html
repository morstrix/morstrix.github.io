<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DONATE | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            padding: 20px;
            position: relative;
        }
        
        /* Звёздный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ff99cc, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 80px 120px, #88aaff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 200px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 250px 80px, #ffcc99, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 350px 400px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 450px 250px, #99ff99, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 550px 180px, #ff99cc, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 650px 500px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 750px 90px, #88aaff, rgba(0,0,0,0));
            background-size: 800px 600px;
            background-repeat: no-repeat;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }
        
        .donate-widget {
            max-width: 550px;
            width: 100%;
            background: linear-gradient(135deg, #0a0a0a, #050505);
            border: 2px solid #29abe0;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(41, 171, 224, 0.4);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(2px);
        }
        
        .widget-header {
            background: linear-gradient(135deg, #29abe0, #1e6f8f);
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .widget-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .widget-header h1 {
            font-size: 18px;
            color: #fff;
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        .widget-header p {
            font-size: 8px;
            color: rgba(255,255,255,0.9);
            margin-top: 12px;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }
        
        .amount-section {
            padding: 35px 25px;
        }
        
        .amount-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .amount-btn {
            background: #111;
            border: 1.5px solid #29abe0;
            padding: 14px 8px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            color: #29abe0;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 12px;
            text-align: center;
        }
        
        .amount-btn:hover {
            background: #29abe0;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(41, 171, 224, 0.3);
        }
        
        .amount-btn.active {
            background: #29abe0;
            color: #000;
            box-shadow: 0 0 15px rgba(41, 171, 224, 0.5);
        }
        
        .custom-amount {
            display: flex;
            gap: 12px;
            margin: 20px 0 25px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .custom-amount input {
            flex: 1;
            background: #111;
            border: 1.5px solid #29abe0;
            padding: 14px;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            transition: all 0.2s;
        }
        
        .custom-amount input:focus {
            outline: none;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(41, 171, 224, 0.3);
        }
        
        .custom-amount input::placeholder {
            color: #666;
            font-size: 8px;
        }
        
        .donate-btn {
            width: 100%;
            background: linear-gradient(135deg, #29abe0, #1e6f8f);
            border: none;
            padding: 18px;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #fff;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.2s;
            margin-top: 10px;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .donate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .donate-btn:hover::before {
            left: 100%;
        }
        
        .donate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(41, 171, 224, 0.4);
        }
        
        .donate-btn:active {
            transform: scale(0.98);
        }
        
        .payment-methods {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
        
        .payment-methods span {
            font-size: 24px;
            opacity: 0.7;
            transition: all 0.2s;
            cursor: default;
        }
        
        .payment-methods span:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 7px;
            color: #666;
            letter-spacing: 0.5px;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #29abe0;
            text-decoration: none;
            font-size: 10px;
            padding: 14px 20px;
            border: 1.5px solid #29abe0;
            border-radius: 50px;
            transition: all 0.2s;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .back-link:hover {
            background: #29abe0;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(41, 171, 224, 0.3);
        }
        
        @media (max-width: 550px) {
            .amount-buttons { gap: 8px; }
            .amount-btn { font-size: 9px; padding: 12px 6px; }
            .widget-header h1 { font-size: 13px; }
            .widget-header p { font-size: 7px; }
            .donate-btn { font-size: 9px; padding: 15px; }
            .amount-section { padding: 25px 20px; }
            .payment-methods span { font-size: 20px; }
        }
        
        @media (max-width: 400px) {
            .amount-btn { font-size: 7px; padding: 10px 4px; }
            .custom-amount input { font-size: 8px; padding: 12px; }
        }
    </style>
</head>
<body>
    <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="donate-widget">
            <div class="widget-header">
                <h1>⚡ SYSTEM FUNDING ⚡</h1>
                <p>support the project / choose your amount</p>
            </div>
            
            <div class="amount-section">
                <div class="amount-buttons">
                    <button class="amount-btn" data-amount="5">$5</button>
                    <button class="amount-btn" data-amount="10">$10</button>
                    <button class="amount-btn" data-amount="20">$20</button>
                    <button class="amount-btn" data-amount="50">$50</button>
                    <button class="amount-btn" data-amount="100">$100</button>
                    <button class="amount-btn" data-amount="custom">CUSTOM</button>
                </div>
                
                <div class="custom-amount" id="customAmountDiv" style="display: none;">
                    <input type="number" id="customAmount" placeholder="ENTER AMOUNT $" min="1" step="1">
                </div>
                
                <button class="donate-btn" id="donateBtn">
                    ☕ DONATE WITH KO-FI ☕
                </button>
                
                <div class="payment-methods">
                    <span>💳</span>
                    <span>💙💛</span>
                    <span>⚡</span>
                    <span>☕</span>
                </div>
                
                <div class="info-text">
                    * after clicking you will be redirected to Ko-fi<br>
                    * all funds go to project development
                </div>
            </div>
        </div>
        
        <a href="index.html" class="back-link">◀ RETURN TO HUB</a>
    </div>

    <script>
        let selectedAmount = null;
        const donateBtn = document.getElementById('donateBtn');
        const customAmountDiv = document.getElementById('customAmountDiv');
        const customAmountInput = document.getElementById('customAmount');
        
        // ЗАМЕНИ morstrix НА СВОЙ ЛОГИН KO-FI!
        const KOFI_USERNAME = 'morstrix';
        
        document.querySelectorAll('.amount-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (btn.dataset.amount === 'custom') {
                    customAmountDiv.style.display = 'flex';
                    selectedAmount = null;
                    customAmountInput.focus();
                } else {
                    customAmountDiv.style.display = 'none';
                    selectedAmount = btn.dataset.amount;
                }
            });
        });
        
        donateBtn.addEventListener('click', () => {
            let amount = selectedAmount;
            
            if (customAmountDiv.style.display === 'flex') {
                amount = customAmountInput.value;
                if (!amount || amount < 1) {
                    alert('❌ Please enter a valid amount (minimum $1)');
                    customAmountInput.style.borderColor = '#ff3366';
                    setTimeout(() => {
                        customAmountInput.style.borderColor = '#29abe0';
                    }, 1000);
                    return;
                }
            }
            
            if (!amount) {
                alert('❌ Please select an amount or enter custom value');
                return;
            }
            
            // Вібрація на мобільних
            if (navigator.vibrate) navigator.vibrate(50);
            
            // Відкриваємо Ko-fi з вибраною сумою
            const koFiUrl = `https://ko-fi.com/${morstrix}?amount=${amount}`;
            window.open(koFiUrl, '_blank');
        });
        
        // Enter на custom amount
        customAmountInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                donateBtn.click();
            }
        });
    </script>
</body>
</html>
