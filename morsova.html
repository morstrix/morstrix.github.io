<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | ADA MORSOVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Tiny5&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px 16px;
        }
        .profile-name {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: var(--text-primary);
            letter-spacing: 3px;
            text-align: center;
            margin-top: 8px;
        }
        .profile-role {
            font-family: 'Tiny5', monospace;
            font-size: 18px;
            color: var(--text-secondary);
            letter-spacing: 2px;
        }
        .profile-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
            align-items: center;
        }
        .profile-btns .universal-btn { width: 100%; text-align: center; }
        .profile-btns .btn-inner { text-align: center; }
        /* Pinterest widget container */
        .pinterest-widget-container {
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
<canvas id="cosmicCanvas"></canvas>

<div class="top-panel">
    <div></div>
    <span class="text-primary" style="font-size:12px;font-family:'Press Start 2P',monospace;letter-spacing:2px;">✦ ADA MORSOVA ✦</span>
    <a href="index.html" class="panel-close">
        <img src="assets/close.png" alt="Close">
        <span class="panel-close-label text-primary">back</span>
    </a>
</div>

<div style="padding-top: 80px;">
    <div class="profile-layout">
        <div class="profile-name">ADA MORSOVA</div>
        <div class="profile-role">DESIGNER / ART DIRECTOR</div>

        <div class="profile-btns">
            <a href="https://www.linkedin.com/in/morsova" target="_blank" class="universal-btn" style="text-decoration:none;">
                <span class="btn-inner"><span>🔗 LINKEDIN</span></span>
            </a>

            <button class="universal-btn" id="moodBtn">
                <span class="btn-inner"><span>🎨 MOOD BOARD</span></span>
            </button>

            <button class="universal-btn" id="instaBtn">
                <span class="btn-inner"><span>📷 INSTAGRAM</span></span>
            </button>

            <button class="universal-btn" id="constructorBtn">
                <span class="btn-inner"><span>👕 CONSTRUCTOR</span></span>
            </button>
        </div>
    </div>
</div>

<!-- Mood modal (Pinterest) -->
<div id="moodModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">MOOD BOARD</span>
            <button class="modal-close-btn" data-modal="moodModal">✜</button>
        </div>
        <div class="modal-inner" style="padding:10px;">
            <div class="pinterest-widget-container">
                <a data-pin-do="embedBoard"
                   href="https://www.pinterest.com/morstrix/re-f-erences/"
                   data-pin-scale-width="400"
                   data-pin-scale-height="400"
                   data-pin-board-width="400"></a>
            </div>
        </div>
    </div>
</div>

<!-- Instagram disclaimer -->
<div id="instaModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">INSTAGRAM</span>
            <button class="modal-close-btn" data-modal="instaModal">✜</button>
        </div>
        <div class="modal-inner" style="display:flex;flex-direction:column;align-items:center;">
            <p class="text-secondary" style="margin-bottom:20px;">Переход на Instagram. Продолжить?</p>
            <button class="universal-btn" data-href="https://www.instagram.com/morstrix">
                <span class="btn-inner"><span>ПЕРЕЙТИ</span></span>
            </button>
        </div>
    </div>
</div>

<!-- Constructor modal -->
<div id="constructorModal" class="modal-overlay">
    <div class="modal-content" style="max-width:400px;">
        <div class="modal-header">
            <span class="modal-title-text">CONSTRUCTOR</span>
            <button class="modal-close-btn" data-modal="constructorModal">✜</button>
        </div>
        <div class="modal-inner">
            <div class="merch-constructor" style="text-align:center;">
                <div class="tshirt-preview" style="position:relative;width:200px;margin:0 auto 15px;">
                    <img src="assets/tshirt.jpeg" style="width:100%;display:block;" alt="T-shirt">
                    <canvas id="printCanvas" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;"></canvas>
                </div>
                <div style="margin-top:10px;display:flex;flex-direction:column;align-items:center;gap:10px;">
                    <label for="imageUpload" style="display:inline-block;padding:10px 18px;background:#000;border:2px dashed #888;cursor:pointer;">
                        <span style="font-family:'Tiny5',monospace;color:#888;font-size:16px;text-transform:uppercase;">choose file</span>
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" style="display:none;">
                    <button class="universal-btn" id="resetPrint">
                        <span class="btn-inner"><span>CLEAR</span></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/cosmic-bg.js"></script>
<script async defer src="https://assets.pinterest.com/js/pinit.js"></script>
<script>
(function() {
    function openModal(id) { document.getElementById(id)?.classList.add('active'); }
    function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }

    document.getElementById('moodBtn')?.addEventListener('click', () => {
        openModal('moodModal');
        if (window.PinUtils) window.PinUtils.build();
    });
    document.getElementById('instaBtn')?.addEventListener('click', () => openModal('instaModal'));
    document.getElementById('constructorBtn')?.addEventListener('click', () => {
        openModal('constructorModal');
        initConstructor();
    });

    document.querySelectorAll('[data-href]').forEach(btn => {
        btn.addEventListener('click', function() {
            window.open(this.dataset.href, '_blank');
            const mc = this.dataset.modalClose;
            if (mc) closeModal(mc);
        });
    });

    document.querySelectorAll('.modal-close-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = btn.dataset.modal;
            if (id) closeModal(id);
        });
    });
    document.querySelectorAll('.modal-overlay').forEach(o => {
        o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
    });

    let constructorInited = false;
    function initConstructor() {
        if (constructorInited) return;
        constructorInited = true;
        const canvas = document.getElementById('printCanvas');
        const upload = document.getElementById('imageUpload');
        if (!canvas || !upload) return;
        const ctx = canvas.getContext('2d');
        canvas.width = 80; canvas.height = 80;
        upload.addEventListener('change', e => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => { ctx.clearRect(0,0,80,80); ctx.drawImage(img,0,0,80,80); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });
        document.getElementById('resetPrint')?.addEventListener('click', () => { ctx.clearRect(0,0,80,80); upload.value=''; });
    }
})();
</script>
</body>
</html>
