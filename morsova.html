<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | ADA MORSOVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Tiny5&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #000; }
        #cosmicCanvas { display: none !important; }

        .profile-shell {
            padding: calc(var(--top-panel-h) + 20px) 16px 28px;
        }
        .profile-layout {
            width: min(100%, 860px);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
        }
        .widget-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .linkedin-badge-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .badge-base {
            min-width: min(100%, 320px);
        }
        .profile-links-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            width: 100%;
        }
        .pixel-action {
            border: 0;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            padding: 0;
            text-decoration: none;
            appearance: none;
            -webkit-appearance: none;
            font: inherit;
        }
        .pixel-action img {
            width: 86px;
            height: 86px;
            object-fit: contain;
            image-rendering: pixelated;
            display: block;
        }
        .pixel-action-label {
            font-family: 'Tiny5', monospace;
            font-size: 18px;
            color: var(--text-secondary);
            text-transform: lowercase;
            letter-spacing: 1px;
            line-height: 1;
        }
        #moodModal .modal-content {
            width: fit-content;
            max-width: min(92vw, 430px);
        }
        #moodModal .modal-inner {
            padding: 8px;
        }
        #moodModal .pinterest-widget-container {
            width: fit-content;
            max-width: 100%;
            margin: 0 auto;
        }
        .constructor-panel {
            width: min(100%, 420px);
            border: 2px solid transparent;
            border-image: linear-gradient(90deg, #4a1515, #8B3A3A, #a84d6b, #8B3A3A, #4a1515) 1;
            background: #000;
            padding: 18px 16px 20px;
        }
        .constructor-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .merch-constructor {
            text-align: center;
        }
        .tshirt-preview {
            position: relative;
            width: min(200px, 60vw);
            margin: 0 auto 16px;
        }
        .tshirt-preview img {
            width: 100%;
            display: block;
        }
        #printCanvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
        }
        .constructor-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .upload-label {
            display: inline-block;
            padding: 10px 18px;
            background: #000;
            border: 2px dashed #888;
            cursor: pointer;
        }
        .upload-label span {
            font-family: 'Tiny5', monospace;
            color: #888;
            font-size: 16px;
            text-transform: uppercase;
        }
        .modal-inner-centered {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @media (max-width: 768px) {
            :root { --top-panel-h: 50px; }
            .profile-shell {
                padding-top: calc(var(--top-panel-h) + 16px);
                padding-left: 12px;
                padding-right: 12px;
            }
            .profile-layout {
                gap: 18px;
            }
            .profile-links-row {
                gap: 12px;
            }
            .pixel-action img {
                width: 72px;
                height: 72px;
            }
            .pixel-action-label {
                font-size: 16px;
            }
            .constructor-panel {
                padding: 16px 12px 18px;
            }
        }
    </style>
</head>
<body>
<canvas id="cosmicCanvas"></canvas>

<div class="top-panel">
    <div></div>
    <a href="index.html" class="panel-close">
        <img src="assets/close.png" alt="Close">
        <span class="panel-close-label text-primary">back</span>
    </a>
</div>

<main class="profile-shell">
    <div class="profile-layout">
        <div class="widget-stack">
            <div class="linkedin-badge-wrap">
                <div class="badge-base LI-profile-badge"
                     data-locale="en_US"
                     data-size="large"
                     data-theme="dark"
                     data-type="VERTICAL"
                     data-vanity="morsova"
                     data-version="v1">
                    <a class="badge-base__link LI-simple-link" href="https://www.linkedin.com/in/morsova/"></a>
                </div>
            </div>

            <div class="profile-links-row">
                <button class="pixel-action" id="moodBtn" type="button">
                    <img src="assets/mood.png" alt="Mood board">
                    <span class="pixel-action-label">mood</span>
                </button>

                <button class="pixel-action" id="instaBtn" type="button">
                    <img src="assets/insta.png" alt="Instagram">
                    <span class="pixel-action-label">insta</span>
                </button>
            </div>

            <section class="constructor-panel">
                <h2 class="constructor-title">Constructor</h2>
                <div class="merch-constructor">
                    <div class="tshirt-preview">
                        <img src="assets/tshirt.jpeg" alt="T-shirt">
                        <canvas id="printCanvas"></canvas>
                    </div>
                    <div class="constructor-controls">
                        <label for="imageUpload" class="upload-label">
                            <span>choose file</span>
                        </label>
                        <input type="file" id="imageUpload" accept="image/*" style="display:none;">
                        <button class="universal-btn" id="resetPrint" type="button">
                            <span class="btn-inner"><span>CLEAR</span></span>
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="moodModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">MOOD</span>
            <button class="modal-close-btn" data-modal="moodModal">✜</button>
        </div>
        <div class="modal-inner" style="padding:10px;">
            <div class="pinterest-widget-container">
                <a data-pin-do="embedBoard"
                   href="https://ru.pinterest.com/morsovaada/reference/"
                   data-pin-scale-width="400"
                   data-pin-scale-height="400"
                   data-pin-board-width="400"></a>
            </div>
        </div>
    </div>
</div>

<div id="instaModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">INSTAGRAM</span>
            <button class="modal-close-btn" data-modal="instaModal">✜</button>
        </div>
        <div class="modal-inner modal-inner-centered">
            <p class="text-secondary" style="margin-bottom:20px;">open?</p>
            <button class="universal-btn" data-href="https://www.instagram.com/morstrix">
                <span class="btn-inner"><span>ENTER</span></span>
            </button>
        </div>
    </div>
</div>

<script src="https://platform.linkedin.com/badges/js/profile.js" async defer></script>
<script async defer src="https://assets.pinterest.com/js/pinit.js"></script>
<script>
(function() {
    function openModal(id, withSound = true) {
        document.getElementById(id)?.classList.add('active');
        if (withSound) playDisclaimerBlip();
    }
    function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }
    const uiBlipAudio = new Audio('assets/blip.mp3');
    uiBlipAudio.preload = 'auto';
    uiBlipAudio.playsInline = true;
    uiBlipAudio.load();

    function warmUpUiBlip() {
        const playAttempt = uiBlipAudio.play();
        if (playAttempt && typeof playAttempt.then === 'function') {
            playAttempt.then(() => {
                uiBlipAudio.pause();
                uiBlipAudio.currentTime = 0;
            }).catch(() => {});
        }
    }

    document.addEventListener('pointerdown', warmUpUiBlip, { once: true });
    document.addEventListener('touchstart', warmUpUiBlip, { once: true });
    document.addEventListener('keydown', warmUpUiBlip, { once: true });

    function playDisclaimerBlip() {
        uiBlipAudio.pause();
        uiBlipAudio.currentTime = 0;
        const playAttempt = uiBlipAudio.play();
        if (playAttempt && typeof playAttempt.catch === 'function') {
            playAttempt.catch(error => console.warn('UI blip failed', error));
        }
    }

    document.getElementById('moodBtn')?.addEventListener('click', () => {
        openModal('moodModal');
        if (window.PinUtils) window.PinUtils.build();
    });

    document.getElementById('instaBtn')?.addEventListener('click', () => {
        openModal('instaModal');
    });

    document.querySelectorAll('[data-href]').forEach(btn => {
        btn.addEventListener('click', function() {
            window.open(this.dataset.href, '_blank');
            const modalId = this.closest('.modal-overlay')?.id;
            if (modalId) closeModal(modalId);
        });
    });

    document.querySelectorAll('.modal-close-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = btn.dataset.modal;
            if (id) closeModal(id);
        });
    });

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', event => {
            if (event.target === overlay) overlay.classList.remove('active');
        });
    });

    document.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
            document.querySelectorAll('.modal-overlay.active').forEach(modal => modal.classList.remove('active'));
        }
    });

    const canvas = document.getElementById('printCanvas');
    const upload = document.getElementById('imageUpload');
    const reset = document.getElementById('resetPrint');
    if (canvas && upload) {
        const ctx = canvas.getContext('2d');
        canvas.width = 80;
        canvas.height = 80;

        upload.addEventListener('change', event => {
            const file = event.target.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = loadEvent => {
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, 80, 80);
                    ctx.drawImage(img, 0, 0, 80, 80);
                };
                img.src = loadEvent.target?.result;
            };
            reader.readAsDataURL(file);
        });

        reset?.addEventListener('click', () => {
            ctx.clearRect(0, 0, 80, 80);
            upload.value = '';
        });
    }
})();
</script>
</body>
</html>
