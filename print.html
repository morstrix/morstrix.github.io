<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PAINT STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="paint.css">
</head>
<body class="paint-body">

    <a href="index.html" class="paint-exit-btn">
        <img src="assets/close.png" alt="Exit">
    </a>

    <div class="paint-window">
        <div class="paint-header">
            <span class="program-title">MS_PAINT.EXE</span>
            <div class="header-controls">
                <span class="win-btn">_</span>
                <span class="win-btn">□</span>
                <span class="win-btn">X</span>
            </div>
        </div>

        <div class="paint-toolbar top-bar">
            <div class="history-group">
                <button class="btn-retro" id="pUndo" disabled> &lt; </button>
                <button class="btn-retro" id="pRedo" disabled> &gt; </button>
            </div>
            <button class="btn-retro" id="btnLayersOpen">CHANNELS</button>
        </div>

        <div class="canvas-area" id="canvasContainer">
            <canvas id="layer1"></canvas> <canvas id="layer2"></canvas> </div>

        <div class="paint-toolbar bottom-bar">
            <div class="tool-group">
                <input type="color" id="pColor" value="#ffb7c7">
                <div class="brush-info">SIZE: 4PX</div>
            </div>
            <button class="btn-retro" id="pClear">CLEAR_ALL</button>
        </div>
    </div>

    <div id="layersPopup" class="modal-overlay-paint">
        <div class="layers-window">
            <div class="layers-header">
                <span>SELECT_LAYER</span>
                <button id="btnLayersClose">X</button>
            </div>
            <div id="layerList">
                <div class="layer-item active" data-id="2">
                    <span class="status-dot"></span> LAYER_02 (TOP)
                </div>
                <div class="layer-item" data-id="1">
                    <span class="status-dot"></span> LAYER_01 (BACK)
                </div>
            </div>
        </div>
    </div>

    <script src="paint.js"></script>
</body>
</html>
