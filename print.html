<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JOURNAL | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050508;
            color: #f0f0f0;
            font-family: 'Press Start 2P', monospace;
            /* Увеличиваем отступы по бокам, чтобы контент дышал */
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* КНОПКА ЗАКРЫТИЯ - Фиксированная, с фоном для видимости */
        .close-site {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            transition: 0.2s;
            background: rgba(5, 5, 8, 0.8);
            border-radius: 5px;
            padding: 5px;
        }
        .close-site img { width: 35px; height: 35px; display: block; image-rendering: pixelated; }

        .container {
            max-width: 600px;
            width: 100%;
            /* Отступ сверху больше, чтобы контент не нырял под крестик сразу */
            margin-top: 80px; 
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section { width: 100%; text-align: center; }

        /* КАРУСЕЛЬ - ФИКСИРОВАННЫЙ РАЗМЕР БЕЗ ОБРЕЗКИ */
        .carousel {
            width: 100%;
            aspect-ratio: 16 / 9; /* Задает пропорции блока */
            position: relative;
            overflow: hidden;
            border: 1px solid #332233;
            background: #000;
        }
        .carousel img {
            width: 100%;
            height: 100%;
            /* 'contain' гарантирует, что картинка видна на 100% без обрезки */
            object-fit: contain; 
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }
        .carousel img.active { opacity: 1; }

        /* RSS СТРОКА */
        .ticker-wrapper {
            border-top: 1px solid #332233;
            border-bottom: 1px solid #332233;
            padding: 15px 0;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker {
            display: inline-block;
            font-size: 8px;
            color: #ffd9e6;
            animation: scrollTicker 40s linear infinite;
        }
        .ticker span { margin-right: 50px; }

        @keyframes scrollTicker {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }

        /* КНОПКИ-ИКОНКИ */
        .img-nav {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .nav-icon {
            cursor: pointer;
            transition: 0.2s;
            width: 100px; /* Фиксированная ширина для иконок */
            height: auto;
        }
        .nav-icon:hover { transform: scale(1.1); filter: brightness(1.3); }

        /* РЕТРО КНОПКИ И БЛОКИ */
        .retro-btn {
            background: transparent;
            border: 1px solid #a84d6b;
            color: #ffb7c7;
            padding: 12px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .font-styler-box {
            padding: 20px;
            border: 1px dashed #444;
            color: #555;
            font-size: 7px;
            line-height: 1.5;
        }

        /* МОДАЛКИ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            width: 90%;
            max-width: 500px;
            background: #000;
            padding: 40px 20px;
            border: 1px solid #a84d6b;
            position: relative;
        }

        .leaderboard { background: rgba(10,10,15,0.8); padding: 25px; border: 1px solid #222; }
    </style>
</head>
<body>

    <a href="index.html" class="close-site">
        <img src="assets/close.png" alt="Close">
    </a>

    <div class="container">
        
        <div class="section carousel" id="mainCarousel">
            <img src="assets/mx1.jpg" class="active">
            <img src="assets/mx2.jpg">
        </div>

        <div class="ticker-wrapper">
            <div class="ticker" id="rssTicker">✦ LOADING... ✦</div>
        </div>

        <div class="section img-nav">
            <img src="assets/forum.png" class="nav-icon" onclick="openModal('forumModal')">
            <img src="assets/support.png" class="nav-icon" onclick="openModal('supportModal')">
            <img src="assets/mood.png" class="nav-icon" onclick="openModal('moodModal')">
        </div>

        <div class="section" style="position: relative; overflow: hidden; border: 1px solid #332233; padding: 40px 0;">
             <div style="background: url('assets/mx1.jpg') center/cover; opacity: 0.15; position: absolute; inset:0; filter: grayscale(1);"></div>
             <button class="retro-btn" style="position: relative;" onclick="openModal('artModal')">🎨 ART STUDIO // PAINT</button>
        </div>

        <div class="section">
            <div class="font-styler-box">
                [ FONT_STYLER_V.1.0 ]<br><br>
                _STATUS: ENCRYPTED / OFFLINE
            </div>
        </div>

        <div class="section leaderboard">
            <h4 style="font-size: 8px; color: #ffb7c7; margin-bottom: 20px;">🏆 HALL OF FAME</h4>
            <div style="font-size: 8px; color: #888; text-align: left; display: inline-block; line-height: 2.5;">
                1. MORPHINE_DRIP — 12450<br>
                2. GL1TCH_WITCH — 9820<br>
                3. VHS_GHOST — 7650
            </div>
            <div style="margin-top: 25px;">
                <a href="tetris.html" class="retro-btn">🎮 PLAY TETRIS</a>
            </div>
        </div>

    </div>

    <div id="forumModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <p style="font-size: 8px; margin-bottom: 30px;">REDIRECTING TO TELEGRAM...</p>
            <a href="https://t.me/morstrix" target="_blank" class="retro-btn">PROCEED</a>
        </div>
    </div>

    <div id="supportModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <p style="font-size: 8px; line-height: 1.6;">SUPPORT CENTER<br><br>CONTACT@MORSTRIX.COM</p>
        </div>
    </div>

    <div id="moodModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" style="max-width: 550px; height: 80vh; overflow-y: auto;">
            <p style="font-size: 8px; margin-bottom: 20px;">📌 MOODBOARD</p>
            <a data-pin-do="embedBoard" data-pin-board-width="450" data-pin-scale-height="400" data-pin-scale-width="80" href="https://ru.pinterest.com/morstrix/re-f-erences/"></a>
        </div>
    </div>

    <div id="artModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <p style="font-size: 8px;">🎨 STUDIO<br><br>UNDER CONSTRUCTION</p>
        </div>
    </div>

    <script async defer src="https://assets.pinterest.com/js/pinit.js"></script>
    <script>
        // Карусель
        const slides = document.querySelectorAll('#mainCarousel img');
        let currentSlide = 0;
        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, 3500);

        // Модалки
        function openModal(id) {
            document.getElementById(id).classList.add('active');
            if(id === 'moodModal' && window.PinUtils) window.PinUtils.build();
        }
        function closeModal(e) {
            if (e.target.classList.contains('modal-overlay')) {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
            }
        }

        // RSS текст
        const ticker = document.getElementById('rssTicker');
        const items = ["HYPERALLERGIC", "ARTNEWS", "RHIZOME", "ARTFORUM", "E-FLUX"];
        ticker.innerHTML = `<span>✦ ${items.join('</span><span>✦ ')}</span>`.repeat(6);
    </script>
</body>
</html>
