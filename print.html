<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JOURNAL | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050508;
            color: #f0f0f0;
            font-family: 'Press Start 2P', monospace;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* КНОПКА ЗАКРЫТИЯ (УХОДИТ ВВЕРХ) */
        .close-site {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 999;
        }
        .close-site img { width: 30px; height: 30px; image-rendering: pixelated; }

        .container {
            max-width: 600px;
            width: 100%;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section { width: 100%; text-align: center; }

        /* КАРУСЕЛЬ */
        .carousel { width: 100%; position: relative; line-height: 0; }
        .carousel img {
            width: 100%; height: auto; opacity: 0;
            transition: opacity 0.8s ease-in-out; display: block;
        }
        .carousel img.active { opacity: 1; position: relative; }
        .carousel img:not(.active) { position: absolute; top: 0; left: 0; }

        /* RSS СТРОКА */
        .ticker-wrapper {
            padding: 15px 0; overflow: hidden; white-space: nowrap;
            border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a;
        }
        .ticker { display: inline-block; font-size: 8px; color: #ffd9e6; animation: scrollTicker 40s linear infinite; }
        .ticker span { margin-right: 50px; }
        @keyframes scrollTicker { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }

        /* КНОПКИ-ИКОНКИ (ФОРУМ, САППОРТ, МУД) */
        .img-nav { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .nav-icon { cursor: pointer; width: 100px; transition: 0.2s; }
        .nav-icon:hover { transform: scale(1.05); }

        /* АРТ БЛОК (КВАДРАТ + PAINT) */
        .art-block-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .art-square-frame {
            width: 100%;
            max-width: 300px; /* Квадратная рамка */
            aspect-ratio: 1 / 1;
            border: 1px solid #332233;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            overflow: hidden;
        }
        .art-square-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .paint-btn-img {
            cursor: pointer;
            width: 140px; /* Размер кнопки paint.png */
            transition: 0.2s;
        }
        .paint-btn-img:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* ФОНТ СТАЙЛЕР */
        .font-styler-box { padding: 25px; color: #444; font-size: 7px; border: 1px dashed #222; }

        /* РЕТРО КНОПКА (ДЛЯ ТЕТРИСА И МОДАЛОК) */
        .retro-btn {
            background: transparent; border: 1px solid #a84d6b; color: #ffb7c7;
            padding: 10px 18px; font-family: 'Press Start 2P', monospace;
            font-size: 8px; cursor: pointer; text-decoration: none;
        }

        /* МОДАЛКИ */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.98);
            z-index: 10000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content { width: 100%; max-width: 500px; text-align: center; }
    </style>
</head>
<body>

    <a href="index.html" class="close-site">
        <img src="assets/close.png" alt="Close">
    </a>

    <div class="container">
        
        <div class="section carousel" id="mainCarousel">
            <img src="assets/mx1.jpg" class="active">
            <img src="assets/mx2.jpg">
        </div>

        <div class="ticker-wrapper">
            <div class="ticker" id="rssTicker">✦ LOADING... ✦</div>
        </div>

        <div class="section img-nav">
            <img src="assets/forum.png" class="nav-icon" onclick="openModal('forumModal')">
            <img src="assets/support.png" class="nav-icon" onclick="openModal('supportModal')">
            <img src="assets/mood.png" class="nav-icon" onclick="openModal('moodModal')">
        </div>

        <hr style="border: 0; border-top: 1px solid #1a1a1a;">

        <div class="section art-block-container">
            <div class="art-square-frame">
                <img src="assets/mx1.jpg" alt="Art Preview" style="opacity: 0.5;">
            </div>
            <img src="assets/paint.png" class="paint-btn-img" onclick="openModal('artModal')" alt="Paint Button">
        </div>

        <div class="section">
            <div class="font-styler-box">
                [ FONT_STYLER_V.1.0 ]<br><br>
                STATUS: ENCRYPTED
            </div>
        </div>

        <div class="section" style="padding-bottom: 50px;">
            <h4 style="font-size: 8px; color: #a84d6b; margin-bottom: 20px;">🏆 HALL OF FAME</h4>
            <div style="font-size: 8px; color: #666; line-height: 2.5;">
                MORPHINE_DRIP — 12450<br>
                GL1TCH_WITCH — 9820<br>
                VHS_GHOST — 7650
            </div>
            <div style="margin-top: 30px;">
                <a href="tetris.html" class="retro-btn">🎮 PLAY TETRIS</a>
            </div>
        </div>

    </div>

    <div id="forumModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <p style="font-size: 8px; margin-bottom: 20px;">GO TO TELEGRAM?</p>
            <a href="https://t.me/morstrix" target="_blank" class="retro-btn">YES</a>
        </div>
    </div>

    <div id="supportModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <p style="font-size: 8px;">EMAIL: support@morstrix.com</p>
        </div>
    </div>

    <div id="moodModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <p style="font-size: 8px; margin-bottom: 20px;">📌 PINTEREST MOOD</p>
            <a data-pin-do="embedBoard" data-pin-board-width="400" data-pin-scale-height="350" href="https://ru.pinterest.com/morstrix/re-f-erences/"></a>
        </div>
    </div>

    <div id="artModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <p style="font-size: 8px;">[ ART STUDIO ]<br><br>🚧 UNDER DEVELOPMENT 🚧</p>
        </div>
    </div>

    <script async defer src="https://assets.pinterest.com/js/pinit.js"></script>
    <script>
        // Карусель
        const slides = document.querySelectorAll('#mainCarousel img');
        let currentSlide = 0;
        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, 3500);

        // Модалки
        function openModal(id) {
            document.getElementById(id).classList.add('active');
            if(id === 'moodModal' && window.PinUtils) window.PinUtils.build();
        }
        function closeModal(e) {
            if (e.target.classList.contains('modal-overlay')) {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
            }
        }

        // RSS текст
        const ticker = document.getElementById('rssTicker');
        const items = ["HYPERALLERGIC", "ARTNEWS", "RHIZOME", "ARTFORUM", "E-FLUX"];
        ticker.innerHTML = `<span>✦ ${items.join('</span><span>✦ ')}</span>`.repeat(6);
    </script>
</body>
</html>
