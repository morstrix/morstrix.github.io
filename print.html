<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ᴘʀɪɴᴛ ᴅᴇꜱɪɢɴ</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .print-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }

        /* Рамка для главной картинки */
        .print-image-box {
            background: #000;
            border: 4px double #004400; /* Темно-зеленая ретро-рамка */
            padding: 10px;
            box-shadow: 0 0 15px rgba(0, 50, 0, 0.4);
            margin-bottom: 30px;
        }

        .print-image-box img {
            width: 100%;
            max-width: 320px; /* Размер картинки */
            height: auto;
            display: block;
            image-rendering: pixelated;
        }

        /* Стили для подписи */
        .print-caption {
            font-family: 'Press Start 2P', cursive;
            color: #004400; /* Темно-зеленый текст */
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; /* Расстояние между текстом и баксами */
            line-height: 1.5;
        }

        /* Крутящиеся доллары */
        .spinning-dollar {
            display: inline-block;
            font-size: 28px;
            /* Делаем эмодзи темно-зеленым с помощью фильтров */
            filter: sepia(1) hue-rotate(70deg) saturate(5) brightness(0.4);
            /* Анимация вращения по оси Y */
            animation: spin-y 2s linear infinite;
        }

        @keyframes spin-y {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="neuro-bg"></canvas>

    <a href="index.html" class="back-button">
        <img src="close.jpg" alt="X" class="custom-back-icon">
    </a>

    <section class="site-section print-container">
        
        <div class="print-image-box">
            <img src="printicon.jpg" alt="Print Design Promo">
        </div>
        
        <div class="print-caption">
            <span class="spinning-dollar">💵</span>
        </div>

    </section>

    <script src="script-bg.js"></script>
</body>
</html>
