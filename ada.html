<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ADA MORSOVA | DESIGNER</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            font-family: 'Press Start 2P', monospace;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        #neuro-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .close-site {
            position: fixed;
            top: 15px;
            right: 15px;
            background: transparent;
            z-index: 1000;
        }
        .close-site img {
            width: 30px;
            height: 30px;
            image-rendering: pixelated;
        }
        .container {
            max-width: 500px;
            width: 100%;
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            position: relative;
            z-index: 10;
        }
        /* LinkedIn бейдж — по центру */
        .linkedin-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .badge-base {
            margin: 0 auto;
        }
        /* Behance виджет */
        .behance-wrapper {
            width: 100%;
            background: #000;
            padding: 10px;
        }
        .behance-wrapper iframe {
            width: 100%;
            max-width: 100%;
            display: block;
        }
        /* Instagram виджет */
        .insta-widget {
            width: 100%;
        }
        /* Модалка (если понадобится) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(3px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #a27791;
            position: relative;
            min-width: 280px;
            max-width: 90vw;
            border: 4px solid #b97272;
            box-shadow: inset 0 0 0 2px #000, 0 0 0 2px #000;
        }
        .modal-header {
            background: #79434a;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #000;
        }
        .modal-title-text {
            font-size: 10px;
            color: #ffffff;
            text-shadow: 2px 2px 0 #000;
            font-family: 'Press Start 2P', monospace;
        }
        .modal-close-btn {
            background: #000000;
            color: #ffffff;
            border: 2px solid #b97272;
            width: 32px;
            height: 32px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .modal-inner {
            padding: 20px;
            text-align: center;
            background: #a27791;
        }
        .modal-inner p {
            font-size: 10px;
            color: #000;
            margin-bottom: 20px;
            text-shadow: 1px 1px 0 #aaa;
        }
        .popup-enter-btn {
            background: #000000;
            color: #a27791;
            border: 2px solid #b97272;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }
        .small-note {
            font-size: 6px;
            color: #555;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <canvas id="neuro-bg"></canvas>

    <a href="journal.html" class="close-site">
        <img src="assets/close.png" alt="Close">
    </a>

    <div class="container">
        <!-- LinkedIn Badge (по центру) -->
        <div class="linkedin-wrapper">
            <div class="badge-base LI-profile-badge" 
                 data-locale="ru_RU" 
                 data-size="medium" 
                 data-theme="dark" 
                 data-type="VERTICAL" 
                 data-vanity="ada-morsova" 
                 data-version="v1">
            </div>
        </div>

        <!-- Behance виджет -->
        <div class="behance-wrapper">
            <iframe src="https://www.behance.net/embed/project/246943027?ilo0=1" height="316" width="100%" allowfullscreen lazyload frameborder="0"></iframe>
        </div>

        <!-- Instagram виджет -->
        <div class="insta-widget">
            <behold-widget feed-id="UBHqIRXRQc286kYl07UN"></behold-widget>
        </div>
    </div>

    <script src="background.js"></script>
    <script type="module" src="https://w.behold.so/widget.js"></script>
    <script src="https://platform.linkedin.com/badges/js/profile.js" async defer type="text/javascript"></script>
</body>
</html>
