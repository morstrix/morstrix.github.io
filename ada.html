<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ADA MORSOVA | DESIGNER</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            font-family: 'Press Start 2P', monospace;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        #neuro-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .close-site {
            position: fixed;
            top: 15px;
            right: 15px;
            background: transparent;
            z-index: 1000;
        }
        .close-site img {
            width: 30px;
            height: 30px;
            image-rendering: pixelated;
        }
        .container {
            max-width: 550px;
            width: 100%;
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            gap: 35px;
            position: relative;
            z-index: 10;
        }
        .section {
            width: 100%;
            background: #0a0a0f;
            border: 2px solid #79434a;
            padding: 20px;
            box-shadow: 4px 4px 0 #3d2a2f;
        }
        .section-title {
            font-size: 8px;
            color: #a84d6b;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #000;
        }
        .avatar {
            width: 100px;
            image-rendering: pixelated;
            border: 1px solid #a84d6b;
            padding: 5px;
            background: #000;
        }
        .social-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }
        .social-icon {
            font-size: 28px;
            color: #a27791;
            transition: 0.2s;
            text-decoration: none;
        }
        .social-icon:hover {
            color: #ffb7c7;
            transform: scale(1.1);
        }
        .retro-btn {
            background: #010101;
            border: 2px solid #79434a;
            color: #a27791;
            padding: 8px 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
        }
        .retro-btn:hover {
            background: #79434a;
            color: #010101;
        }
        /* LinkedIn Badge стили */
        .badge-base {
            display: flex;
            justify-content: center;
        }
        .small-note {
            font-size: 6px;
            color: #555;
            text-align: center;
            margin-top: 12px;
        }
        iframe {
            max-width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="neuro-bg"></canvas>

    <a href="journal.html" class="close-site">
        <img src="assets/close.png" alt="Close">
    </a>

    <div class="container">
        <!-- Аватар + имя -->
        <div style="text-align: center;">
            <img src="assets/ada.png" class="avatar">
            <h2 style="font-size: 12px; color: #fff; margin: 20px 0 5px;">ADA MORSOVA</h2>
            <p style="font-size: 8px; color: #a84d6b;">VISUAL DESIGNER & ARTIST</p>
        </div>

        <!-- LinkedIn Badge -->
        <div class="section">
            <div class="section-title">✦ LINKEDIN ✦</div>
            <!-- Замени ВАШ_VANITY на свой username из ссылки LinkedIn -->
            <div class="badge-base LI-profile-badge" data-locale="ru_RU" data-size="medium" data-theme="dark" data-type="VERTICAL" data-vanity="ВАШ_VANITY" data-version="v1"></div>
            <div class="small-note">[ linkedin profile badge ]</div>
        </div>

        <!-- Behance Widget -->
        <div class="section">
            <div class="section-title">✦ BEHANCE ✦</div>
            <div style="background:#000; padding:10px;">
                <iframe src="https://www.behance.net/embed/project/246943027?ilo0=1" height="316" width="100%" allowfullscreen lazyload frameborder="0"></iframe>
            </div>
        </div>

        <!-- Instagram + Соцсети -->
        <div class="section">
            <div class="section-title">✦ INSTAGRAM & SOCIAL ✦</div>
            
            <!-- Instagram виджет Behold -->
            <div class="insta-widget" style="margin-bottom: 20px;">
                <behold-widget feed-id="UBHqIRXRQc286kYl07UN"></behold-widget>
            </div>
            
            <!-- Иконки соцсетей -->
            <div class="social-row">
                <a href="https://www.instagram.com/ВАШ_USERNAME/" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
                <a href="https://www.threads.net/@ВАШ_USERNAME/" target="_blank" class="social-icon"><i class="fab fa-threads"></i></a>
                <a href="https://www.tiktok.com/@ВАШ_USERNAME" target="_blank" class="social-icon"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.linkedin.com/in/ВАШ_VANITY/" target="_blank" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <div class="small-note">[ instagram • threads • tiktok • linkedin ]</div>
        </div>
    </div>

    <script src="background.js"></script>
    <script type="module" src="https://w.behold.so/widget.js"></script>
    <script src="https://platform.linkedin.com/badges/js/profile.js" async defer type="text/javascript"></script>
</body>
</html>
