<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | MULTILAYER PAINT</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="paint.css">
</head>
<body>

<a href="index.html" class="back-button"><span>×</span></a>

<div class="paint-container">
    <div class="paint-history">
        <button class="btn-retro" id="pUndo" disabled> &lt; </button>
        <button class="btn-retro" id="pRedo" disabled style="margin-left:5px;"> &gt; </button>
        <button class="btn-retro" id="btnLayersOpen" style="margin-left:20px;">[ LAYERS ]</button>
    </div>
    <div class="canvas-area">
        <canvas id="layer1"></canvas>
        <canvas id="layer2"></canvas>
    </div>
    <div class="paint-controls">
        <input type="color" id="pColor" value="#ffffff">
        <button class="btn-retro" id="pClear">CLEAR ACTIVE</button>
    </div>
</div>

<div id="layersPopup" class="layers-popup">
    <div class="layers-window">
        <div class="layers-header">
            <span>CHANNELS</span>
            <button id="btnLayersClose" style="border:none;background:none;cursor:pointer;font-family:'Press Start 2P';font-size:8px;">X</button>
        </div>
        <div id="layerList">
            <div class="layer-item active" data-id="2">LAYER_02 (TOP)</div>
            <div class="layer-item" data-id="1">LAYER_01 (BG)</div>
        </div>
    </div>
</div>

<script src="paint.js"></script>
</body>
</html>
