<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HELPER | PAINT</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Специфические стили для рисовалки */
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Press Start 2P', monospace;
        }

        .paint-container {
            width: 90vw;
            max-width: 400px;
            background: #000;
            border: 4px solid #fff; /* Белая рамка в стиле ретро */
            position: relative;
            z-index: 10;
            touch-action: none;
        }

        #drawCanvas {
            width: 100%;
            height: 350px;
            display: block;
            background: #000;
            cursor: crosshair;
        }

        .paint-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #111;
            border-top: 4px solid #fff;
        }

        .btn-retro {
            background: #000;
            border: 2px solid #fff;
            color: #fff;
            padding: 8px 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
        }

        .btn-retro:active {
            background: #fff;
            color: #000;
        }

        input[type="color"] {
            width: 40px;
            height: 35px;
            border: 2px solid #fff;
            background: #000;
            cursor: pointer;
            padding: 0;
        }

        /* Контейнер для кнопок под рисовалкой */
        .helper-actions {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        /* Фон */
        #neuro-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="neuro-bg"></canvas>

    <a href="index.html" class="back-button">
        <span>×</span>
    </a>

    <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="paint-container">
            <canvas id="drawCanvas"></canvas>
            <div class="paint-controls">
                <input type="color" id="pColor" value="#ffffff">
                <button class="btn-retro" id="pClear">CLEAR</button>
            </div>
        </div>

        <div class="helper-actions">
            <a href="https://t.me/MORSTRIXBOT" target="_blank" class="retro-button" style="text-decoration: none;">
                TELEGRAM
            </a>
        </div>
    </div>

    <script src="script-bg.js"></script>
    
    <script>
        (function() {
            const dCanvas = document.getElementById('drawCanvas');
            const dCtx = dCanvas.getContext('2d');
            const dColor = document.getElementById('pColor');
            const dClear = document.getElementById('pClear');
            
            let isDrawing = false;

            function setupCanvas() {
                const rect = dCanvas.getBoundingClientRect();
                // Учитываем разрешение экрана для четкости
                dCanvas.width = rect.width;
                dCanvas.height = rect.height;
                dCtx.fillStyle = "#000";
                dCtx.fillRect(0, 0, dCanvas.width, dCanvas.height);
                dCtx.lineCap = 'round';
                dCtx.lineJoin = 'round';
                dCtx.lineWidth = 5;
            }

            // Инициализация при загрузке
            window.addEventListener('load', setupCanvas);
            
            // Чтобы при повороте экрана всё не удалялось, 
            // resize лучше использовать аккуратно, но пока оставим так:
            window.addEventListener('resize', setupCanvas);

            function getMousePos(e) {
                const rect = dCanvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            function start(e) {
                isDrawing = true;
                const pos = getMousePos(e);
                dCtx.beginPath();
                dCtx.moveTo(pos.x, pos.y);
            }

            function draw(e) {
                if (!isDrawing) return;
                if (e.cancelable) e.preventDefault();
                const pos = getMousePos(e);
                dCtx.strokeStyle = dColor.value;
                dCtx.lineTo(pos.x, pos.y);
                dCtx.stroke();
            }

            function stop() {
                isDrawing = false;
                dCtx.closePath();
            }

            // Мышь
            dCanvas.addEventListener('mousedown', start);
            window.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stop);
            
            // Тач (телефоны)
            dCanvas.addEventListener('touchstart', start, {passive: false});
            dCanvas.addEventListener('touchmove', draw, {passive: false});
            dCanvas.addEventListener('touchend', stop);

            // Очистка
            dClear.onclick = () => {
                dCtx.fillStyle = "#000";
                dCtx.fillRect(0, 0, dCanvas.width, dCanvas.height);
            };
        })();
    </script>
</body>
</html>
