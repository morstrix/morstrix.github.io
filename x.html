<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INSTAGRAM | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            min-height: 100vh;
            display: block;
            color: #fff;
        }

        .ig-header {
            text-align: center;
            padding: 80px 20px 30px;
        }

        .ig-title {
            font-size: 1.2rem;
            color: #a84d6b;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .ig-subtitle {
            font-size: 0.55rem;
            color: #a1a1a1;
            letter-spacing: 1px;
        }

        .instagram-feed {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px 50px;
        }

        behold-widget { display: block; min-height: 400px; }

        @media (max-width: 600px) {
            .ig-header { padding: 70px 15px 20px; }
            .ig-title { font-size: 1rem; }
        }
    </style>
</head>
<body class="page-x">

<a href="index.html" class="back-button"><span>✜</span></a>

<div class="ig-header">
    <div class="ig-title">@GRIMEXFRAME</div>
    <div class="ig-subtitle">актуальне з Instagram</div>
</div>

<div class="instagram-feed">
    <behold-widget feed-id="Ew8dq23tImFHuva5wjDT"></behold-widget>
</div>

<div class="diary-section">
    <div class="diary-header">> SYSTEM_LOG: DIARY_ENTRIES</div>
    <div id="diary-content">Загрузка протоколов...</div>
</div>

<script>
    async function loadDiary() {
        try {
            // Добавляем ?v= к ссылке, чтобы браузер не кешировал старые посты
            const response = await fetch('diary.json?v=' + Date.now());
            const posts = await response.json();
            const container = document.getElementById('diary-content');
            container.innerHTML = '';

            posts.forEach(post => {
                container.innerHTML += `
                    <div class="diary-entry" style="margin-bottom: 20px; border-left: 2px solid var(--x-accent); padding-left: 15px;">
                        <div style="font-size: 8px; color: var(--x-accent); margin-bottom: 5px;">[ ${post.date} ]</div>
                        <div style="font-size: 10px; line-height: 1.4;">${post.text}</div>
                    </div>
                `;
            });
        } catch (e) {
            document.getElementById('diary-content').innerText = 'Ошибка доступа к логам.';
        }
    }
    loadDiary();
</script>

<script src="background.js"></script>
<script type="module" src="https://w.behold.so/widget.js"></script>
</body>
</html>
