<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THREADS | GRIMEXFRAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">

    <style>
        /* Принудительные стили, чтобы точно было видно */
        body {
            background-color: #000 !important;
            color: #fff !important;
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', cursive, sans-serif;
            min-height: 100vh;
        }

        #neuro-bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }

        .content-container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px;
            text-align: center;
        }

        .ig-header { margin-bottom: 50px; }
        .ig-title { color: #a84d6b; font-size: 14px; margin-bottom: 10px; }
        .ig-subtitle { color: #555; font-size: 8px; }

        .instagram-feed { 
            width: 100%; 
            min-height: 200px; 
            margin-bottom: 60px;
            background: rgba(255,255,255,0.02); /* Чтобы видеть блок, если виджет тупит */
        }

        .diary-section {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }

        .diary-entry {
            border-left: 2px solid #a84d6b;
            padding-left: 15px;
            margin-bottom: 30px;
        }

        .entry-date { font-size: 7px; color: #a84d6b; margin-bottom: 5px; }
        .entry-text { font-size: 9px; line-height: 1.6; color: #ccc; text-transform: uppercase; }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            border: 1px solid #333;
            padding: 10px;
            background: #000;
        }
    </style>
</head>
<body class="page-x">

    <canvas id="neuro-bg"></canvas>
    <a href="index.html" class="back-button">✜</a>

    <div class="content-container">
        <div class="ig-header">
            <div class="ig-title">@GRIMEXFRAME</div>
            <div class="ig-subtitle">FEED_STATUS: ONLINE</div>
        </div>

        <div class="instagram-feed">
            <behold-widget feed-id="Ew8dq23tImFHuva5wjDT"></behold-widget>
        </div>

        <div id="diary-content" class="diary-section">
            <div style="font-size: 8px; color: #444;">INITIALIZING_DATABASE...</div>
        </div>
    </div>

    <script src="background.js"></script>
    <script type="module" src="https://w.behold.so/widget.js"></script>

    <script>
        async function loadDiary() {
            const container = document.getElementById('diary-content');
            try {
                // Пытаемся загрузить файл
                const response = await fetch('diary.json?v=' + Date.now());
                if (!response.ok) throw new Error('NO_FILE');
                
                const posts = await response.json();
                container.innerHTML = ''; 

                posts.forEach(post => {
                    container.innerHTML += `
                        <div class="diary-entry">
                            <div class="entry-date">[ ${post.date} ]</div>
                            <div class="entry-text">${post.text}</div>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = '<div style="font-size: 8px; color: #444;">WAITING_FOR_DATA_STREAM...</div>';
                console.error("Diary error:", e);
            }
        }
        loadDiary();
    </script>
</body>
</html>
