<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THREADS | GRIMEXFRAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* База: прозрачность для просвечивания background.js */
        body { 
            margin: 0; padding: 0; 
            background: transparent; 
            overflow-x: hidden; 
            color: white; 
            font-family: 'Press Start 2P', cursive, sans-serif;
        }

        #neuro-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* Самый нижний слой */
        }

        .content-container {
            position: relative;
            z-index: 10;
            max-width: 700px;
            margin: 0 auto;
            padding: 100px 20px;
            text-align: center;
            min-height: 100vh;
            /* Полупрозрачный черный фон для читаемости */
            background: rgba(0, 0, 0, 0.5); 
        }

        /* ТВОЙ ЗОЛОТОЙ КРЕСТИК ✜ (Кнопка назад) */
        .back-button {
            position: fixed;
            top: 25px;
            right: 25px; /* Справа, как ты просил */
            z-index: 1000;
            color: #ffffff; 
            text-decoration: none;
            font-size: 24px;
            cursor: pointer;
        }

        .ig-header { margin-bottom: 40px; }
        .ig-title { color: #a84d6b; font-size: 14px; margin-bottom: 10px; }
        .ig-subtitle { color: #555; font-size: 8px; }

        /* ИНСТА ВИДЖЕТ (BEHOLD) */
        .instagram-feed { 
            width: 100%; 
            min-height: 300px; 
            margin-bottom: 60px;
            display: block;
        }

        /* ТЕКСТОВЫЙ ДНЕВНИК (THREADS) */
        .diary-section {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
            border-top: 1px solid #222;
            padding-top: 40px;
        }

        .diary-entry {
            border-left: 2px solid #a84d6b;
            padding-left: 15px;
            margin-bottom: 30px;
        }

        .entry-date { font-size: 7px; color: #a84d6b; margin-bottom: 8px; }
        .entry-text { font-size: 9px; line-height: 1.6; color: #ccc; text-transform: uppercase; }

        /* Убираем возможный белый фон у виджета */
        behold-widget { background: transparent !important; }
    </style>
</head>
<body class="page-x">

    <canvas id="neuro-bg"></canvas>
    
    <a href="index.html" class="back-button">✜</a>

    <div class="content-container">
        <div class="ig-header">
            <div class="ig-title">@GRIMEXFRAME</div>
            <div class="ig-subtitle">FEED_STATUS: ONLINE</div>
        </div>

        <div class="instagram-feed">
            <behold-widget feed-id="Ew8dq23tImFHuva5wjDT"></behold-widget>
        </div>

        <div id="diary-content" class="diary-section">
            <div style="font-size: 8px; color: #444;">INITIALIZING_THREADS_LOG...</div>
        </div>
    </div>

    <script src="background.js"></script>
    <script type="module" src="https://w.behold.so/widget.js"></script>

    <script>
        async function loadDiary() {
            const container = document.getElementById('diary-content');
            try {
                // Загружаем наш обновляемый JSON
                const response = await fetch('diary.json?v=' + Date.now());
                if (!response.ok) throw new Error();
                
                const posts = await response.json();
                container.innerHTML = '<div style="font-size: 10px; color: #a84d6b; margin-bottom: 25px;">> THREADS_LOG:</div>'; 

                posts.forEach(post => {
                    container.innerHTML += `
                        <div class="diary-entry">
                            <div class="entry-date">[ ${post.date} ]</div>
                            <div class="entry-text">${post.text}</div>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = '<div style="font-size: 8px; color: #444;">SYNCING_STREAMS...</div>';
            }
        }
        loadDiary();
    </script>
</body>
</html>
