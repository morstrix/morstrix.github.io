<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        /* Переопределение для главной страницы — только JOURNAL и STORE по центру */
        .index-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 0 20px;
        }
        .index-grid {
            display: flex;
            gap: 120px;
            justify-content: center;
            align-items: center;
        }
        .index-card img {
            width: 160px !important;
            height: 160px !important;
        }
        @media (max-width: 600px) {
            .index-grid { gap: 60px; }
            .index-card img { width: 120px !important; height: 120px !important; }
        }
        @media (max-width: 450px) {
            .index-grid { gap: 40px; }
            .index-card img { width: 100px !important; height: 100px !important; }
        }
    </style>
</head>
<body>
    <canvas id="neuro-bg"></canvas>

    <div class="index-container">
    <div class="index-grid">
        <a href="journal.html" class="index-card">
            <img src="assets/journal.png" alt="Journal">
            <span>JOURNAL</span>
        </a>
        <div class="store-wrapper">
            <a href="store.html" class="index-card">
                <img src="assets/space.png" alt="Store">
                <span>STORE</span>
            </a>
            <div class="rotate-coin">
                <img src="assets/dollar.png" alt="$">
            </div>
        </div>
    </div>
</div>

    <script src="background.js"></script>
</body>
</html>
