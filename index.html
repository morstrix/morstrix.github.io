<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUB | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        /* ========== НОВАЯ РАССТАНОВКА ========== */
        
        .grid-container {
            padding: 20px 20px 60px 20px;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        
        /* Радио */
        .radio-corner {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 40px;
        }
        
        .radio-corner .radio-status {
            border: 2px solid #fff;
            padding: 8px 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            width: fit-content;
        }
        
        .radio-corner .float-icon {
            width: 25px;
            height: auto;
        }
        
        .radio-corner .float-label {
            font-size: 6px;
        }
        
        /* Сетка 2x2 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px 30px;
            margin-bottom: 50px;
        }
        
        .double-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px 30px;
            margin-top: 60px;
            margin-bottom: 50px;
        }
        
        /* Донаты */
        .donate-center {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        
        .donate-item {
            background: #2a1a1a;
            border: 1px solid #5a3a3a;
            padding: 15px 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
        }
        
        .donate-item:active {
            transform: scale(0.95);
            background: #3a2525;
        }
        
        .donate-label {
            font-size: 9px;
            color: #d4a0a0;
            letter-spacing: 1px;
        }
        
        .donate-sub {
            font-size: 6px;
            color: #8a6a6a;
            margin-top: 8px;
        }
        
        /* Кнопки */
        .grid-item {
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }
        
        .grid-item:active {
            transform: scale(0.9);
        }
        
        .grid-icon {
            width: 55px;
            height: auto;
            image-rendering: pixelated;
            margin-bottom: 12px;
        }
        
        /* Основная подпись */
        .label-main {
            display: block;
            font-size: 8px;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 4px #000;
        }
        
        /* Серая подпись */
        .label-sub {
            display: block;
            font-size: 6px;
            letter-spacing: 0.5px;
            color: #888;
            text-transform: none;
            margin-top: 4px;
        }
        
        /* Динамический тег для FORUM */
        .dynamic-tag {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: #970000;
            color: #fff;
            padding: 3px 7px;
            font-size: 6px;
            white-space: nowrap;
            z-index: 5;
        }
        
        /* Вращающаяся купюра для STORE */
        .money-wrap {
            position: absolute;
            top: -18px;
            right: -10px;
            z-index: 5;
        }
        
        .money-rotating {
            width: 22px;
            color: #4ade80;
            animation: coinSpin 3s linear infinite;
        }
        
        @keyframes coinSpin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        
        /* Модальные окна */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 5000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            background: #000;
            border: 2px solid #fff;
            position: relative;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
        }
        
        .modal-title {
            font-size: 10px;
            color: #a84d6b;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .widget-container {
            margin: 15px 0;
        }
        
        .insta-widget {
            margin: 20px 0;
        }
        
        @media (max-width: 550px) {
            .main-grid, .double-grid {
                gap: 30px 20px;
            }
            .grid-icon {
                width: 45px;
            }
            .label-main {
                font-size: 7px;
            }
            .label-sub {
                font-size: 5px;
            }
            .dynamic-tag {
                font-size: 5px;
                top: -20px;
                padding: 2px 5px;
            }
            .money-wrap {
                top: -15px;
                right: -8px;
            }
            .money-rotating {
                width: 18px;
            }
        }
    </style>
</head>
<body>

    <canvas id="neuro-bg"></canvas>

    <div class="grid-container">
        
        <!-- РАДИО -->
        <div class="radio-corner">
            <div id="radioBtn" class="radio-status">
                <img src="assets/radio.png" alt="Radio" id="radio-icon-img" class="float-icon">
                <span class="float-label" id="p-label">RADIO OFF</span>
            </div>
        </div>

        <!-- ОСНОВНАЯ СЕТКА 2x2 -->
        <div class="main-grid">
            
            <!-- PRINT -->
            <a href="x.html" class="grid-item">
                <img src="assets/print.png" alt="Print" class="grid-icon">
                <div>
                    <span class="label-sub">PRINT</span>
                    <span class="label-main">JOURNAL</span>
                </div>
            </a>

            <!-- STORE / DIY GEAR -->
            <a href="shop.html" class="grid-item">
                <div class="money-wrap">
                    <svg class="money-rotating" viewBox="0 0 32 20">
                        <rect x="1" y="1" width="30" height="18" rx="1" stroke="#4ade80" stroke-width="2" fill="none"/>
                        <circle cx="16" cy="10" r="4" stroke="#4ade80" stroke-width="2" fill="none"/>
                    </svg>
                </div>
                <img src="assets/shop.png" alt="Store" class="grid-icon">
                <div>
                    <span class="label-main">STORE</span>
                                        <span class="label-sub">DIY GEAR</span>

                </div>
            </a>

            <!-- PAINT -->
            <a href="helper.html" class="grid-item">
                <img src="assets/paint.png" alt="Paint" class="grid-icon">
                <div>
                    <span class="label-main">PAINT</span>
                    <span class="label-sub">GALERY</span>
                </div>
            </a>

            <!-- TETRIS -->
            <a href="support.html" class="grid-item">
                <img src="assets/tetris.png" alt="Tetris" class="grid-icon">
                <div>
                    <span class="label-main">TETRIS</span>
                </div>
            </a>

            <!-- MOOD -->
            <div class="grid-item" id="moodBtn" style="cursor: pointer;">
                <img src="assets/mood.png" alt="Mood" class="grid-icon">
                <div>
                                        <span class="label-sub">pinterest</span>
                    <span class="label-main">MOOD</span>
                </div>
            </div>

            <!-- FORUM -->
            <a href="forum.html" class="grid-item">
                <div class="dynamic-tag" id="dynamicWord">CONNECTING</div>
                <img src="assets/forum.png" alt="Forum" class="grid-icon">
                <div>
                    <span class="label-main">FORUM</span>
                    <span class="label-sub">HELP/ARCHIVE</span>
                </div>
            </a>
        </div>

        <!-- DESIGNER & DEVELOPER -->
        <div class="double-grid">
            
            <!-- DESIGNER -->
            <div class="grid-item" id="designerBtn" style="cursor: pointer;">
                <img src="assets/a.png" alt="Designer" class="grid-icon">
                <div>
                    <span class="label-main">ADA MORSOVA</span>
                </div>
            </div>

            <!-- DEVELOPER -->
            <div class="grid-item" id="developerBtn" style="cursor: pointer;">
                <img src="assets/x.png" alt="Developer" class="grid-icon">
                <div>
                    <span class="label-main">GRIM EX FRAME</span>
                </div>
            </div>
        </div>

        <!-- ДОНАТЫ -->
        <div class="donate-center">
            <a href="https://send.monobank.ua/jar/8q9Kk2hkDV" target="_blank" class="donate-item">
                <span class="donate-label">ПІДТРИМАТИ ПРОЄКТ</span>
                <span class="donate-sub">MONOBANK.EXE</span>
            </a>
        </div>
    </div>

    <!-- МОДАЛКА MOOD (Pinterest) -->
    <div id="moodModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeMoodModal">✜</button>
            <div class="modal-title">BOARD</div>
            <div class="widget-container">
                <a data-pin-do="embedBoard" href="https://www.pinterest.com/ada.morsova/" data-pin-scale-width="80" data-pin-scale-height="200" data-pin-board-width="300"></a>
                <script async defer src="https://assets.pinterest.com/js/pinit.js"></script>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА DESIGNER -->
    <div id="designerModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <button class="modal-close" id="closeDesignerModal">✜</button>
            <div class="modal-title">DESIGNER</div>
            <div class="widget-container">
                <h4 style="font-size: 8px; color: #a84d6b;">BEHANCE</h4>
                <iframe src="https://www.behance.net/embed/project/your_project_id?ilo0=1" height="300" width="100%" frameborder="0" allowfullscreen style="margin-bottom: 20px;"></iframe>
                <h4 style="font-size: 8px; color: #a84d6b;">INSTAGRAM</h4>
                <div class="insta-widget">
                    <behold-widget feed-id="UBHqIRXRQc286kYl07UN"></behold-widget>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА DEVELOPER -->
    <div id="developerModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <button class="modal-close" id="closeDeveloperModal">✜</button>
            <div class="modal-title">DEVELOPER</div>
 </div>
                <h4 style="font-size: 8px; color: #a84d6b; margin-top: 20px;">THREADS / RSS</h4>
                <div id="threadsContent" style="font-size: 7px; color: #ccc; line-height: 1.6; max-height: 200px; overflow-y: auto; border: 1px solid #333; padding: 10px;">Loading threads...</div>
            </div>
            <div class="widget-container">
                <h4 style="font-size: 8px; color: #a84d6b;">INSTAGRAM</h4>
                <div class="insta-widget">
                    <behold-widget feed-id="Ew8dq23tImFHuva5wjDT"></behold-widget>
        </div>
    </div>

    <script src="background.js"></script>
    <script type="module" src="https://w.behold.so/widget.js"></script>
    <script>
        // РАДИО
        const radioBtn = document.getElementById('radioBtn');
        let isPlaying = false;
        if(radioBtn) {
            radioBtn.onclick = () => {
                isPlaying = !isPlaying;
                document.getElementById('p-label').innerText = isPlaying ? "RADIO ON" : "RADIO OFF";
            };
        }

        // МОДАЛКИ
        const moodModal = document.getElementById('moodModal');
        const designerModal = document.getElementById('designerModal');
        const developerModal = document.getElementById('developerModal');
        
        document.getElementById('moodBtn').onclick = () => moodModal.classList.add('active');
        document.getElementById('closeMoodModal').onclick = () => moodModal.classList.remove('active');
        document.getElementById('designerBtn').onclick = () => designerModal.classList.add('active');
        document.getElementById('closeDesignerModal').onclick = () => designerModal.classList.remove('active');
        document.getElementById('developerBtn').onclick = () => developerModal.classList.add('active');
        document.getElementById('closeDeveloperModal').onclick = () => developerModal.classList.remove('active');
        
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
        });
        
        // THREADS
        async function loadThreads() {
            const container = document.getElementById('threadsContent');
            if (!container) return;
            try {
                const response = await fetch('diary.json?v=' + Date.now());
                if (!response.ok) throw new Error();
                const posts = await response.json();
                container.innerHTML = posts.map(post => `
                    <div style="margin-bottom: 15px; border-left: 2px solid #a84d6b; padding-left: 10px;">
                        <div style="color: #a84d6b; font-size: 6px; margin-bottom: 5px;">[ ${post.date} ]</div>
                        <div style="font-size: 7px; color: #ccc;">${post.text}</div>
                    </div>
                `).join('');
            } catch(e) {
                container.innerHTML = '<div style="color: #666;">SYNCING THREADS...</div>';
            }
        }
        loadThreads();
        
        // ДИНАМИЧЕСКОЕ СЛОВО
        const words = ["wellness", "travel", "english", "money", "radio"];
        const wordElement = document.getElementById('dynamicWord');
        if (wordElement) {
            let i = 0;
            setInterval(() => {
                i = (i + 1) % words.length;
                wordElement.textContent = words[i];
            }, 2000);
        }
        
        // ПЛАВНЫЙ ПЕРЕХОД
        document.querySelectorAll('a[href]').forEach(link => {
            if (!link.hasAttribute('target') && link.getAttribute('href') !== 'index.html') {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('#')) {
                        e.preventDefault();
                        document.body.style.opacity = '0';
                        document.body.style.transition = 'opacity 0.2s';
                        setTimeout(() => window.location.href = href, 200);
                    }
                });
            }
        });
    </script>
</body>
</html>
