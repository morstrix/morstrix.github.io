<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .grid-index {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 90px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .room-btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: none;
            border: none;
            transition: transform 0.1s;
            cursor: pointer;
        }
        
        .room-btn:active { transform: scale(0.95); }

        /* Квадраты без рамок */
        .room-btn.clean-square { grid-column: span 1; aspect-ratio: 1 / 1; }

        /* Широкие блоки с рамками (Тетрис, Паинт) */
        .room-btn.wide-bar {
            grid-column: span 2;
            height: 85px;
            background: rgba(15, 15, 15, 0.6);
            border: 2px solid var(--border-dark);
        }

        .wide-label {
            font-size: 14px;
            color: var(--primary);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .room-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Анимация пульсации для Радио */
        .playing .svg-icon {
            animation: pulse 1s infinite alternate;
            color: #fff;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .forum-header {
            font-size: 6px;
            color: var(--text-dim);
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            padding: 2px 6px;
            border-left: 1px solid var(--primary);
            white-space: nowrap;
        }

        .money-rotating {
            position: absolute;
            top: 5px;
            right: 20%;
            width: 30px;
            animation: spinMoney 4s linear infinite;
            color: #4ade80;
        }

        @keyframes spinMoney {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* Donatello Widget */
        .donate-widget-area {
            grid-column: span 2;
            border: 2px solid var(--primary);
            background: #000;
            margin-top: 20px;
            overflow: hidden;
        }

        .donate-widget-area iframe {
            width: 100%;
            height: 500px;
            border: none;
            background: #fff;
        }

        .widget-head {
            background: var(--primary);
            color: #000;
            font-size: 9px;
            padding: 8px;
            text-align: center;
        }

        .room-icon { max-width: 80px; height: auto; image-rendering: pixelated; }
        .svg-icon { width: 55px; height: 55px; color: var(--primary); }
        .room-label { font-size: 8px; color: var(--primary); margin-top: 15px; text-align: center; line-height: 1.4; letter-spacing: 1px; }

        .rec-box {
            grid-column: span 2;
            border: 1px dashed var(--primary);
            padding: 15px;
            font-size: 8px;
            color: var(--primary);
            margin-top: 10px;
            text-align: center;
        }

        /* Скрытый плеер YouTube */
        #yt-player-hidden {
            position: absolute;
            top: -999px;
            visibility: hidden;
        }
    </style>
</head>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // Логика Радио
        var player;
        var isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player-hidden', {
                height: '0',
                width: '0',
                videoId: 'WB7LS3p7Tb4', // Твой трек
                playerVars: {
                    'listType': 'playlist',
                    'list': 'PLi1Z1_6srFOvdJ5HrgSMoGpMnpoTrx56_', // Твой плейлист
                    'autoplay': 0,
                    'controls': 0
                },
                events: {
                    'onReady': function(event) {
                        event.target.setVolume(100); // Громкость на максимум при загрузке
                    }
                }
            });
        }

        function toggleMusic() {
            if (!player || typeof player.playVideo !== 'function') return;
            
            const btn = document.getElementById('radioBtn');
            const label = document.getElementById('radioLabel');

            if (!isPlaying) {
                player.unMute();
                player.setVolume(100);
                player.playVideo();
                btn.classList.add('playing');
                label.innerText = 'RADIO [ON]';
                isPlaying = true;
            } else {
                player.pauseVideo();
                btn.classList.remove('playing');
                label.innerText = 'RADIO [OFF]';
                isPlaying = false;
            }
        }

        // Логика Попапа Инстаграм
        function openInstaPopup() {
            document.getElementById('instaModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Убираем скролл
        }
        function closeInstaPopup() {
            document.getElementById('instaModal').style.display = 'none';
            document.body.style.overflow = 'auto'; // Возвращаем скролл
        }
        window.onclick = function(event) {
            let modal = document.getElementById('instaModal');
            if (event.target == modal) { closeInstaPopup(); }
        }
    </script>
