<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1e1e;  /* графитовый фон */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Контейнер кнопок */
        .index-container {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 120px;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .index-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            animation: fadeInUp 1.4s ease-out forwards;
            opacity: 0;
        }

        .index-card:nth-child(1) { animation-delay: 0.1s; }
        .index-card:nth-child(2) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .index-card img {
            width: 150px;
            height: 150px;
            image-rendering: pixelated;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 6px rgba(168, 77, 107, 0.3));
            transition: filter 0.3s ease;
        }

        .index-card:hover img {
            filter: drop-shadow(0 0 15px rgba(168, 77, 107, 0.7));
        }

        .index-card span {
            display: inline-block;
            font-size: 13px;
            color: #b0b0b0;
            text-transform: uppercase;
            letter-spacing: 5px;
            padding: 12px 24px;
            border: 2px solid #4a4a5a;
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(2px);
            box-shadow: 
                inset 0 0 8px rgba(0,0,0,0.5),
                0 0 0 1px rgba(168, 77, 107, 0.2);
            position: relative;
            transition: all 0.3s ease;
        }

        .index-card span::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 1px solid transparent;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 3px, 
                rgba(255,255,255,0.02) 3px, 
                rgba(0,0,0,0.1) 6px);
            pointer-events: none;
            opacity: 0.5;
        }

        .index-card:hover span {
            color: #ffffff;
            border-color: #a84d6b;
            background: rgba(20, 15, 25, 0.8);
            box-shadow: 
                inset 0 0 12px rgba(168, 77, 107, 0.3),
                0 0 20px rgba(168, 77, 107, 0.5),
                0 0 0 1px #a84d6b;
            text-shadow: 0 0 8px rgba(255, 180, 200, 0.8);
            animation: glitchFrame 0.4s steps(2) infinite;
        }

        @keyframes glitchFrame {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, 2px); }
            80% { transform: translate(1px, -2px); }
            100% { transform: translate(0, 0); }
        }

        /* БИТМАП-ТЕКСТУРА ПОВЕРХ ГРАФИТА */
        #bitmap-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0.4;
            mix-blend-mode: overlay;
        }

        /* Лёгкие скайнлайны */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 6;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, 
                rgba(0,0,0,0.15) 0px, 
                rgba(255,255,255,0.01) 1px, 
                transparent 2px, 
                transparent 3px);
            opacity: 0.25;
            animation: scanMove 10s linear infinite;
        }

        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(5px); }
        }

        /* Адаптация */
        @media (max-width: 700px) {
            .index-container { gap: 60px; }
            .index-card img { width: 110px; height: 110px; }
            .index-card span { font-size: 10px; padding: 8px 16px; letter-spacing: 3px; }
        }

        @media (max-width: 450px) {
            .index-container { gap: 30px; }
            .index-card img { width: 80px; height: 80px; }
            .index-card span { font-size: 8px; padding: 6px 10px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="index-container">
        <a href="journal.html" class="index-card">
            <img src="assets/journal.png" alt="Journal">
            <span>JOURNAL</span>
        </a>
        <a href="store.html" class="index-card">
            <img src="assets/space.png" alt="Store">
            <span>STORE</span>
        </a>
    </div>

    <!-- Битмап-текстура (Canvas) -->
    <canvas id="bitmap-texture"></canvas>
    <div class="scanlines"></div>

    <script>
        (function() {
            const canvas = document.getElementById('bitmap-texture');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                drawTexture();
            }
            
            function drawTexture() {
                if (!width || !height) return;
                
                // Очищаем
                ctx.clearRect(0, 0, width, height);
                
                // 1. Пиксельная сетка (4x4)
                ctx.fillStyle = '#000';
                ctx.globalAlpha = 0.06;
                for (let x = 0; x < width; x += 4) {
                    ctx.fillRect(x, 0, 1, height);
                }
                for (let y = 0; y < height; y += 4) {
                    ctx.fillRect(0, y, width, 1);
                }
                
                // 2. Микро-шум (псевдослучайные точки)
                ctx.globalAlpha = 0.08;
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    if (Math.random() < 0.02) {
                        data[i] = 255;
                        data[i+1] = 255;
                        data[i+2] = 255;
                    }
                }
                ctx.putImageData(imageData, 0, 0);
                
                // 3. Небольшие «артефакты» — горизонтальные полосы
                ctx.globalAlpha = 0.04;
                ctx.fillStyle = '#fff';
                for (let i = 0; i < height; i += 40) {
                    if (Math.random() < 0.3) {
                        ctx.fillRect(0, i, width, 1);
                    }
                }
                
                ctx.globalAlpha = 1.0;
            }
            
            window.addEventListener('resize', () => {
                resize();
            });
            
            resize();
        })();
    </script>

</body>
</html>
