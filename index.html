<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        html { height: 100%; overflow: hidden; }
        body {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }
        
        .top-row {
            display: flex;
            gap: 100px;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding-top: 10vh;
        }
        .index-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .index-card:hover {
            transform: translateY(-4px);
        }
        .index-card img {
            width: min(140px, 25vw);
            height: min(140px, 25vw);
            image-rendering: pixelated;
            margin-bottom: 8px;
            border: 2px solid var(--border-color);
            box-shadow: 4px 4px 0 var(--shadow-color);
        }
        .index-card video {
            width: 140px;
            height: 140px;
            image-rendering: pixelated;
            margin-bottom: 8px;
            object-fit: cover;
            pointer-events: none;
            border: 2px solid var(--border-color);
            box-shadow: 4px 4px 0 var(--shadow-color);
        }
        .index-card span {
            font-family: var(--font-heading);
            font-size: clamp(12px, 3vw, 16px);
            color: var(--text-heading);
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        
        .bottom-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            gap: clamp(15px, 4vh, 30px);
            flex-shrink: 0;
        }
        
        .team-btn {
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s ease;
        }
        .team-btn:hover {
            transform: scale(1.05);
        }
        .team-btn span {
            font-family: var(--font-body);
            font-size: clamp(10px, 3vw, 12px);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 6px;
        }
        .team-btn:hover span { 
            color: var(--accent-primary); 
        }
        
        .donate-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .donate-line {
            width: min(80%, 500px);
            height: 2px;
            background: linear-gradient(90deg, 
                var(--bg-surface), 
                var(--accent-primary), 
                var(--accent-secondary), 
                var(--accent-primary), 
                var(--bg-surface)
            );
        }
        .donate-label {
            font-family: var(--font-heading);
            font-size: clamp(12px, 3vw, 16px);
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .donate-label:hover { 
            color: var(--text-heading); 
        }
        .donate-sub {
            font-family: var(--font-body);
            font-size: clamp(8px, 2vw, 10px);
            color: var(--text-muted);
        }
        
        @media (max-width: 700px) {
            .top-row { gap: 50px; padding-top: 5vh; }
            .index-card img { width: 100px; height: 100px; }
            .index-card video { width: 100px; height: 100px; }
            .index-card span { font-size: 12px; }
        }
        @media (max-width: 450px) {
            .top-row { gap: 30px; padding-top: 0; }
            .index-card img { width: 80px; height: 80px; }
            .index-card video { width: 80px; height: 80px; }
            .index-card span { font-size: 10px; letter-spacing: 2px; }
            .team-btn span { letter-spacing: 4px; }
            .donate-label { letter-spacing: 3px; }
            .donate-section { gap: 5px; }
        }

        /* Модалки */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 20, 0.95); 
            backdrop-filter: blur(3px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--bg-secondary); 
            border: 3px solid var(--border-color);
            box-shadow: 
                inset 0 0 0 1px var(--bg-elevated),
                6px 6px 0 var(--shadow-color);
            max-width: 500px; 
            width: 95%; 
            max-height: 85vh; 
            overflow-y: auto;
        }
        .modal-header {
            background: var(--bg-surface); 
            padding: 12px 16px; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid var(--border-color);
        }
        .modal-title-text {
            font-family: var(--font-heading);
            font-size: 14px; 
            color: var(--text-heading);
        }
        .modal-close-btn {
            background: var(--bg-elevated); 
            color: var(--text-heading); 
            border: 2px solid var(--border-color);
            width: 32px; height: 32px; 
            font-size: 18px; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: var(--font-heading);
            transition: all 0.15s ease;
        }
        .modal-close-btn:hover {
            background: var(--accent-primary);
            border-color: var(--border-active);
        }
        .modal-inner {
            padding: 24px; 
            background: var(--bg-secondary); 
            text-align: center;
        }

        .team-choice-container {
            display: flex; 
            gap: 30px; 
            justify-content: center; 
            padding: 10px 0;
        }
        .team-choice {
            cursor: pointer; 
            text-align: center;
            transition: transform 0.15s ease;
        }
        .team-choice:hover {
            transform: translateY(-4px);
        }
        .team-choice img {
            width: 100px; height: 100px; 
            image-rendering: pixelated;
            border: 2px solid var(--border-color); 
            background: var(--bg-surface);
            object-fit: cover;
            box-shadow: 3px 3px 0 var(--shadow-color);
        }
        .team-choice:hover img {
            border-color: var(--accent-primary);
        }
        .team-choice span {
            display: block; 
            margin-top: 10px; 
            font-family: var(--font-body);
            font-size: 10px; 
            color: var(--text-body);
        }

        .social-icons {
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin: 15px 0;
        }
        .social-icons a {
            font-size: 28px; 
            text-decoration: none; 
            color: var(--text-body);
            transition: all 0.15s ease;
        }
        .social-icons a:hover { 
            transform: scale(1.1); 
            color: var(--text-heading); 
        }

        .linkedin-container { margin: 15px 0; min-height: 200px; }
        .behance-embed { margin: 15px 0; }
        .instagram-widget { margin: 20px 0; }
        
        /* Donate modal specific */
        .donate-card-number {
            font-family: var(--font-body);
            font-size: 10px; 
            color: var(--text-heading); 
            background: var(--bg-surface); 
            padding: 16px; 
            word-break: break-all;
            border: 2px solid var(--border-color);
        }
        .donate-hint {
            font-family: var(--font-body);
            font-size: 8px; 
            color: var(--text-muted); 
            margin-top: 15px; 
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .donate-hint:hover {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>

<div class="top-row">
    <a href="journal.html" class="index-card">
        <video src="assets/journal.mp4" 
               autoplay 
               loop 
               muted 
               playsinline 
               disablepictureinpicture 
               disableremoteplayback>
        </video>
        <span>Journal</span>
    </a>
    <a href="store.html" class="index-card">
        <img src="assets/space.png" alt="Store">
        <span>Store</span>
    </a>
</div>

<div class="bottom-section">
    <div class="team-btn" id="teamBtn">
        <span>команда</span>
    </div>
    <div class="donate-section">
        <div class="donate-line"></div>
        <div class="donate-label" id="donateBtn">Donate</div>
        <div class="donate-sub">monobank</div>
    </div>
</div>

<!-- Модалки -->
<div id="teamModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">Select</span>
            <button class="modal-close-btn" data-modal="teamModal">X</button>
        </div>
        <div class="modal-inner">
            <div class="team-choice-container">
                <div class="team-choice" data-member="ada">
                    <img src="assets/des.jpg" alt="DESIGNER">
                    <span>Designer</span>
                </div>
                <div class="team-choice" data-member="ex">
                    <img src="assets/dev.jpg" alt="DEVELOPER">
                    <span>Developer</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="adaModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">Ada Morsova</span>
            <button class="modal-close-btn" data-modal="adaModal">X</button>
        </div>
        <div class="modal-inner">
            <div class="badge-base LI-profile-badge" data-locale="ru_RU" data-size="medium" data-theme="dark" data-type="VERTICAL" data-vanity="morsova" data-version="v1"></div>
            <div class="behance-embed">
                <iframe src="https://www.behance.net/embed/project/246943027?ilo0=1" height="200" width="100%" style="border:none;"></iframe>
            </div>
            <div class="instagram-widget">
                <behold-widget feed-id="UBHqIRXRQc286kYl07UN"></behold-widget>
            </div>
        </div>
    </div>
</div>

<div id="exModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">Grim Ex Frame</span>
            <button class="modal-close-btn" data-modal="exModal">X</button>
        </div>
        <div class="modal-inner">
            <div class="badge-base LI-profile-badge" data-locale="ru_RU" data-size="medium" data-theme="dark" data-type="VERTICAL" data-vanity="grimexframe" data-version="v1"></div>
            <div class="social-icons">
                <a href="https://github.com/grimexframe" target="_blank" title="GitHub">GH</a>
            </div>
            <div class="instagram-widget">
                <behold-widget feed-id="Ew8dq23tImFHuva5wjDT"></behold-widget>
            </div>
            <div class="social-icons">
                <a href="https://www.threads.net/@grimexframe" target="_blank" title="Threads">TH</a>
                <a href="https://www.tiktok.com/@grimexframe" target="_blank" title="TikTok">TT</a>
            </div>
        </div>
    </div>
</div>

<div id="donateModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">Donate</span>
            <button class="modal-close-btn" data-modal="donateModal">X</button>
        </div>
        <div class="modal-inner">
            <p style="font-family: var(--font-body); font-size: 10px; color: var(--text-body); margin-bottom: 20px;">monobank</p>
            <p id="cardNumber" class="donate-card-number">5375 4141 0000 0000</p>
            <p id="copyHint" class="donate-hint">* tap to copy</p>
        </div>
    </div>
</div>

<script src="https://platform.linkedin.com/badges/js/profile.js" async defer></script>
<script type="module" src="https://w.behold.so/widget.js"></script>
<script>
    (function() {
        const teamModal = document.getElementById('teamModal');
        const adaModal = document.getElementById('adaModal');
        const exModal = document.getElementById('exModal');
        const donateModal = document.getElementById('donateModal');
        
        function openModal(id) { document.getElementById(id)?.classList.add('active'); }
        function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }
        
        document.getElementById('teamBtn').addEventListener('click', () => openModal('teamModal'));
        document.getElementById('donateBtn').addEventListener('click', () => openModal('donateModal'));
        
        document.querySelectorAll('.modal-close-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const modalId = btn.dataset.modal;
                if (modalId) closeModal(modalId);
            });
        });
        
        document.querySelectorAll('.team-choice').forEach(el => {
            el.addEventListener('click', () => {
                const member = el.dataset.member;
                closeModal('teamModal');
                if (member === 'ada') openModal('adaModal');
                else if (member === 'ex') openModal('exModal');
            });
        });
        
        const cardNumber = document.getElementById('cardNumber');
        const copyHint = document.getElementById('copyHint');
        if (cardNumber && copyHint) {
            copyHint.addEventListener('click', () => {
                navigator.clipboard.writeText(cardNumber.textContent.trim()).then(() => {
                    copyHint.textContent = 'COPIED!';
                    setTimeout(() => copyHint.textContent = '* tap to copy', 1500);
                });
            });
        }
        
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
            }
        });
    })();
</script>
</body>
</html>
