<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; overflow: hidden; }
        body {
            background: #000000;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            overflow: hidden;
            padding: 20px;
        }
        
        .top-row {
            display: flex;
            gap: 100px;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding-top: 10vh;
        }
        .index-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }
        .index-card img {
            width: min(140px, 25vw);
            height: min(140px, 25vw);
            image-rendering: pixelated;
            margin-bottom: 0px;
        }
                .index-card video {
            width: 140px;
            height: 140px;
            image-rendering: pixelated;
            margin-bottom: 0px;
            object-fit: cover;
            pointer-events: none;
        }
        .index-card span {
            font-size: clamp(10px, 3vw, 14px);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        
        .bottom-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            gap: clamp(15px, 4vh, 30px);
            flex-shrink: 0;
        }
        
        .team-btn {
            cursor: pointer;
            text-align: center;
        }
        .team-btn span {
            font-size: clamp(12px, 3.5vw, 16px);
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 2px 2px 0 #3d2a2f;
        }
        .team-btn:hover span { color: #a84d6b; }
        
        .donate-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .donate-line {
            width: min(80%, 500px);
            height: 2px;
            background: linear-gradient(90deg, #4a1515, #8B3A3A, #a84d6b, #8B3A3A, #4a1515);
        }
        .donate-label {
            font-size: clamp(10px, 3vw, 14px);
            color: #a27791;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
        }
        .donate-label:hover { color: #ffb7c7; }
        .donate-sub {
            font-size: clamp(7px, 2vw, 9px);
            color: #a27791;
        }
        
        @media (max-width: 700px) {
    .top-row { gap: 50px; padding-top: 5vh; }
    .index-card img { width: 100px; height: 100px; }
    .index-card video { width: 100px; height: 100px; }
    .index-card span { font-size: 11px; }
}
@media (max-width: 450px) {
    .top-row { gap: 30px; padding-top: 0; }
    .index-card img { width: 80px; height: 80px; }
    .index-card video { width: 80px; height: 80px; }
    .index-card span { font-size: 9px; letter-spacing: 2px; }
    .team-btn span { letter-spacing: 4px; }
    .donate-label { letter-spacing: 3px; }
    .donate-section { gap: 5px; }
}

        /* Модалки */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(3px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #a27791; border: 4px solid #b97272;
            box-shadow: inset 0 0 0 2px #000, 0 0 0 2px #000;
            max-width: 500px; width: 95%; max-height: 85vh; overflow-y: auto;
        }
        .modal-header {
            background: #79434a; padding: 12px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #000;
        }
        .modal-title-text {
            font-size: 11px; color: #fff; text-shadow: 2px 2px 0 #000;
        }
        .modal-close-btn {
            background: #000; color: #fff; border: 2px solid #b97272;
            width: 32px; height: 32px; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-inner {
            padding: 20px; background: #a27791; text-align: center;
        }

        .team-choice-container {
            display: flex; gap: 30px; justify-content: center; padding: 10px 0;
        }
        .team-choice {
            cursor: pointer; text-align: center;
        }
        .team-choice img {
            width: 100px; height: 100px; image-rendering: pixelated;
            border: 2px solid #b97272; background: #000;
            object-fit: cover;
        }
        .team-choice span {
            display: block; margin-top: 8px; font-size: 9px; color: #000;
            text-shadow: 1px 1px 0 #aaa;
        }

        .social-icons {
            display: flex; justify-content: center; gap: 20px; margin: 15px 0;
        }
        .social-icons a {
            font-size: 28px; text-decoration: none; color: #000;
            transition: transform 0.1s;
        }
        .social-icons a:hover { transform: scale(1.1); color: #fff; }

        .linkedin-container { margin: 15px 0; min-height: 200px; }
        .behance-embed { margin: 15px 0; }
        .instagram-widget { margin: 20px 0; }
    </style>
</head>
<body>

<div class="top-row">
    <a href="journal.html" class="index-card">
    <video src="assets/journal.mp4" 
           autoplay 
           loop 
           muted 
           playsinline 
           disablepictureinpicture 
           disableremoteplayback
           style="width: 120px; height: 120px; object-fit: cover; image-rendering: pixelated; pointer-events: none;">
    </video>
    <span>JOURNAL</span>
</a>
    <a href="store.html" class="index-card">
        <img src="assets/space.png" alt="Store">
        <span>STORE</span>
    </a>
</div>

<div class="bottom-section">
    <div class="team-btn" id="teamBtn">
        <span>TEAM</span>
    </div>
    <div class="donate-section">
        <div class="donate-line"></div>
        <div class="donate-label" id="donateBtn">DONATE</div>
        <div class="donate-sub">monobank</div>
    </div>
</div>

<!-- Модалки без изменений -->
<div id="teamModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">✦ SELECT ✦</span>
            <button class="modal-close-btn" data-modal="teamModal">✜</button>
        </div>
        <div class="modal-inner">
            <div class="team-choice-container">
                <div class="team-choice" data-member="ada">
                    <img src="assets/des.jpg" alt="DESIGNER">
                    <span>DESIGNER</span>
                </div>
                <div class="team-choice" data-member="ex">
                    <img src="assets/dev.jpg" alt="DEVELOPER">
                    <span>DEVELOPER</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="adaModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">✦ ADA MORSOVA ✦</span>
            <button class="modal-close-btn" data-modal="adaModal">✜</button>
        </div>
        <div class="modal-inner">
            <div class="badge-base LI-profile-badge" data-locale="ru_RU" data-size="medium" data-theme="dark" data-type="VERTICAL" data-vanity="morsova" data-version="v1"></div>
            <div class="behance-embed">
                <iframe src="https://www.behance.net/embed/project/246943027?ilo0=1" height="200" width="100%" style="border:none;"></iframe>
            </div>
            <div class="instagram-widget">
                <behold-widget feed-id="UBHqIRXRQc286kYl07UN"></behold-widget>
            </div>
        </div>
    </div>
</div>

<div id="exModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">✦ GRIM EX FRAME ✦</span>
            <button class="modal-close-btn" data-modal="exModal">✜</button>
        </div>
        <div class="modal-inner">
            <div class="badge-base LI-profile-badge" data-locale="ru_RU" data-size="medium" data-theme="dark" data-type="VERTICAL" data-vanity="grimexframe" data-version="v1"></div>
            <div class="social-icons">
                <a href="https://github.com/grimexframe" target="_blank" title="GitHub">🐙</a>
            </div>
            <div class="instagram-widget">
                <behold-widget feed-id="Ew8dq23tImFHuva5wjDT"></behold-widget>
            </div>
            <div class="social-icons">
                <a href="https://www.threads.net/@grimexframe" target="_blank" title="Threads">🧵</a>
                <a href="https://www.tiktok.com/@grimexframe" target="_blank" title="TikTok">🎵</a>
            </div>
        </div>
    </div>
</div>

<div id="donateModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">✦ DONATE ✦</span>
            <button class="modal-close-btn" data-modal="donateModal">✜</button>
        </div>
        <div class="modal-inner">
            <p style="font-size:10px; color:#000; margin-bottom:20px;">monobank</p>
            <p id="cardNumber" style="font-size:8px; color:#fff; background:#000; padding:15px; word-break:break-all;">5375 4141 0000 0000</p>
            <p id="copyHint" style="font-size:7px; color:#3d2a2f; margin-top:15px; cursor:pointer;">* тап для копіювання</p>
        </div>
    </div>
</div>

<script src="https://platform.linkedin.com/badges/js/profile.js" async defer></script>
<script type="module" src="https://w.behold.so/widget.js"></script>
<script>
    (function() {
        const teamModal = document.getElementById('teamModal');
        const adaModal = document.getElementById('adaModal');
        const exModal = document.getElementById('exModal');
        const donateModal = document.getElementById('donateModal');
        
        function openModal(id) { document.getElementById(id)?.classList.add('active'); }
        function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }
        
        document.getElementById('teamBtn').addEventListener('click', () => openModal('teamModal'));
        document.getElementById('donateBtn').addEventListener('click', () => openModal('donateModal'));
        
        document.querySelectorAll('.modal-close-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const modalId = btn.dataset.modal;
                if (modalId) closeModal(modalId);
            });
        });
        
        document.querySelectorAll('.team-choice').forEach(el => {
            el.addEventListener('click', () => {
                const member = el.dataset.member;
                closeModal('teamModal');
                if (member === 'ada') openModal('adaModal');
                else if (member === 'ex') openModal('exModal');
            });
        });
        
        const cardNumber = document.getElementById('cardNumber');
        const copyHint = document.getElementById('copyHint');
        if (cardNumber && copyHint) {
            copyHint.addEventListener('click', () => {
                navigator.clipboard.writeText(cardNumber.textContent.trim()).then(() => {
                    copyHint.textContent = '✓ СКОПИРОВАНО!';
                    setTimeout(() => copyHint.textContent = '* тап для копіювання', 1500);
                });
            });
        }
        
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
            }
        });
    })();
</script>
</body>
</html>
