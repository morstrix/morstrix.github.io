<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        /* Стили для анимированной кнопки TEAM */
        .index-bottom {
            flex: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px; /* Максимально близко к донату */
            margin-bottom: 40px;
        }

        .team-trigger {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #a84d6b;
            cursor: pointer;
            letter-spacing: 3px;
            padding: 10px;
            transition: all 0.3s ease;
            animation: teamBreath 3s infinite ease-in-out;
            text-transform: uppercase;
        }

        @keyframes teamBreath {
            0%, 100% { 
                opacity: 0.6; 
                transform: scale(1); 
                filter: brightness(0.8) drop-shadow(0 0 0px #a84d6b);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.05); 
                filter: brightness(1.3) drop-shadow(0 0 5px #a84d6b);
            }
        }

        .team-trigger:hover {
            color: #fff;
            animation: none;
            transform: scale(1.1);
            text-shadow: 2px 2px #a27791;
        }

        /* Контент модалки TEAM */
        .team-selection {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 30px 0;
        }
        .team-choice {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }
        .team-choice img {
            width: 130px;
            height: 130px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            border: 2px solid #1a1a1a;
            background: #050505;
        }
        .team-choice span {
            font-size: 8px;
            color: #fff;
            letter-spacing: 1px;
        }
        .team-choice:hover { 
            transform: translateY(-10px);
        }
        .team-choice:hover img {
            border-color: #a84d6b;
        }

        @media (max-width: 500px) {
            .team-selection { gap: 20px; }
            .team-choice img { width: 100px; height: 100px; }
            .team-choice span { font-size: 7px; }
        }
    </style>
</head>
<body>
    <canvas id="neuro-bg"></canvas>

    <div class="index-container">
        <div class="index-center">
            <div class="index-grid">
                <a href="journal.html" class="index-card">
                    <img src="assets/journal.png" alt="Journal">
                    <span>JOURNAL</span>
                </a>
                <a href="store.html" class="index-card">
                    <img src="assets/space.png" alt="Store">
                    <span>STORE</span>
                </a>
            </div>
        </div>

        <div class="index-bottom">
            <div class="team-trigger" id="teamBtn">✦ TEAM ✦</div>
            
            <div class="donate-block" id="donateWrapper">
                <div class="donate-line"></div>
                <div class="donate-label">DONATE</div>
                <div class="donate-sub">monobank</div>
            </div>
        </div>
    </div>

    <div id="teamModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeTeamModal">✜</button>
            <div class="modal-title">SELECT MEMBER</div>
            <div class="team-selection">
                <a href="ada.html" class="team-choice">
                    <img src="assets/ada.png" alt="Ada">
                    <span>ADA MORSOVA</span>
                </a>
                <a href="ex.html" class="team-choice">
                    <img src="assets/ex.png" alt="Ex">
                    <span>GRIM EX FRAME</span>
                </a>
            </div>
        </div>
    </div>

    <script src="background.js"></script>
    <script>
        // Донат
        document.getElementById('donateWrapper').onclick = () => window.open('https://send.monobank.ua/jar/8q9Kk2hkDV', '_blank');

        // Логика модалки TEAM
        const teamModal = document.getElementById('teamModal');
        const teamBtn = document.getElementById('teamBtn');
        const closeBtn = document.getElementById('closeTeamModal');

        teamBtn.onclick = () => teamModal.classList.add('active');
        closeBtn.onclick = () => teamModal.classList.remove('active');

        // Закрытие по клику на фон
        window.onclick = (e) => { 
            if (e.target === teamModal) {
                teamModal.classList.remove('active');
            }
        };
    </script>
</body>
</html>
