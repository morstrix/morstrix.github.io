<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
        }
        .index-container {
            display: flex;
            gap: 80px;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .index-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }
        .index-card img {
            width: 140px;
            height: 140px;
            image-rendering: pixelated;
            margin-bottom: 16px;
        }
        .index-card span {
            font-size: 14px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        /* TEAM — без картинки */
        .team-text-btn {
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 24px;
            color: #a84d6b;
            text-shadow: 2px 2px 0 #3d2a2f;
            border: 2px dashed #79434a;
            background: #0a0a0a;
        }
        #teamBtn {
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .index-container { gap: 40px; }
            .index-card img, .team-text-btn { width: 100px; height: 100px; }
            .team-text-btn { font-size: 18px; }
            .index-card span { font-size: 11px; }
        }
        @media (max-width: 450px) {
            .index-container { gap: 25px; }
            .index-card img, .team-text-btn { width: 80px; height: 80px; }
            .team-text-btn { font-size: 14px; }
            .index-card span { font-size: 9px; letter-spacing: 2px; }
        }

        /* Модалки */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(3px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #a27791; border: 4px solid #b97272;
            box-shadow: inset 0 0 0 2px #000, 0 0 0 2px #000;
            max-width: 500px; width: 95%; max-height: 85vh; overflow-y: auto;
        }
        .modal-header {
            background: #79434a; padding: 12px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #000;
        }
        .modal-title-text {
            font-size: 11px; color: #fff; text-shadow: 2px 2px 0 #000;
            font-family: 'Press Start 2P', monospace;
        }
        .modal-close-btn {
            background: #000; color: #fff; border: 2px solid #b97272;
            width: 32px; height: 32px; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-inner {
            padding: 20px; background: #a27791; text-align: center;
        }

        /* Team выбор */
        .team-choice-container {
            display: flex; gap: 40px; justify-content: center; padding: 10px 0;
        }
        .team-choice {
            cursor: pointer; padding: 15px 25px; background: #000;
            border: 2px solid #b97272; color: #a27791;
            font-size: 14px; text-transform: uppercase;
        }
        .team-choice:hover { background: #1a1a1a; }

        /* Иконки соцсетей */
        .social-icons {
            display: flex; justify-content: center; gap: 25px; margin: 15px 0;
        }
        .social-icons a {
            font-size: 28px; text-decoration: none; color: #fff;
            transition: transform 0.1s;
        }
        .social-icons a:hover { transform: scale(1.1); color: #a84d6b; }

        /* Виджеты */
        .behance-embed { margin: 15px 0; }
        .instagram-widget { margin: 20px 0; }
    </style>
</head>
<body>

<div class="index-container">
    <a href="journal.html" class="index-card">
        <img src="assets/journal.png" alt="Journal">
        <span>JOURNAL</span>
    </a>
    
    <div class="index-card" id="teamBtn">
        <div class="team-text-btn">TEAM</div>
        <span>TEAM</span>
    </div>
    
    <a href="store.html" class="index-card">
        <img src="assets/space.png" alt="Store">
        <span>STORE</span>
    </a>
</div>

<!-- Модалка выбора TEAM -->
<div id="teamModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">✦ SELECT ✦</span>
            <button class="modal-close-btn" data-modal="teamModal">✜</button>
        </div>
        <div class="modal-inner">
            <div class="team-choice-container">
                <div class="team-choice" data-member="ada">ADA</div>
                <div class="team-choice" data-member="ex">EX</div>
            </div>
        </div>
    </div>
</div>

<!-- Модалка ADA -->
<div id="adaModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">✦ ADA MORSOVA ✦</span>
            <button class="modal-close-btn" data-modal="adaModal">✜</button>
        </div>
        <div class="modal-inner">
            <!-- LinkedIn Widget -->
            <div class="badge-base LI-profile-badge" data-locale="ru_RU" data-size="medium" data-theme="dark" data-type="VERTICAL" data-vanity="morsova"></div>
            
            <!-- Behance Embed -->
            <div class="behance-embed">
                <iframe src="https://www.behance.net/embed/project/246943027?ilo0=1" height="200" width="100%" style="border:none;"></iframe>
            </div>
            
            <!-- Instagram Widget -->
            <div class="instagram-widget">
                <behold-widget feed-id="UBHqIRXRQc286kYl07UN"></behold-widget>
            </div>
        </div>
    </div>
</div>

<!-- Модалка EX -->
<div id="exModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title-text">✦ GRIM EX FRAME ✦</span>
            <button class="modal-close-btn" data-modal="exModal">✜</button>
        </div>
        <div class="modal-inner">
            <!-- LinkedIn Widget -->
            <div class="badge-base LI-profile-badge" data-locale="ru_RU" data-size="medium" data-theme="dark" data-type="VERTICAL" data-vanity="grimexframe"></div>
            
            <!-- GitHub иконка (эмодзи/символ) -->
            <div class="social-icons">
                <a href="https://github.com/grimexframe" target="_blank" title="GitHub">🐙</a>
            </div>
            
            <!-- Instagram Widget -->
            <div class="instagram-widget">
                <behold-widget feed-id="Ew8dq23tImFHuva5wjDT"></behold-widget>
            </div>
            
            <!-- Threads + TikTok иконки -->
            <div class="social-icons">
                <a href="https://www.threads.net/@grimexframe" target="_blank" title="Threads">🧵</a>
                <a href="https://www.tiktok.com/@grimexframe" target="_blank" title="TikTok">🎵</a>
            </div>
        </div>
    </div>
</div>

<script src="https://platform.linkedin.com/badges/js/profile.js" async defer></script>
<script type="module" src="https://w.behold.so/widget.js"></script>
<script>
    (function() {
        const teamModal = document.getElementById('teamModal');
        const adaModal = document.getElementById('adaModal');
        const exModal = document.getElementById('exModal');
        
        function openModal(id) {
            document.getElementById(id)?.classList.add('active');
        }
        function closeModal(id) {
            document.getElementById(id)?.classList.remove('active');
        }
        
        // Открытие TEAM
        document.getElementById('teamBtn').addEventListener('click', () => openModal('teamModal'));
        
        // Закрытие по кнопкам
        document.querySelectorAll('.modal-close-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const modalId = btn.dataset.modal;
                if (modalId) closeModal(modalId);
            });
        });
        
        // Клик по выбору ADA / EX
        document.querySelectorAll('.team-choice').forEach(el => {
            el.addEventListener('click', () => {
                const member = el.dataset.member;
                closeModal('teamModal');
                if (member === 'ada') openModal('adaModal');
                else if (member === 'ex') openModal('exModal');
            });
        });
        
        // Закрытие по клику на оверлей
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });
        
        // Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
            }
        });
    })();
</script>
</body>
</html>
