<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #181818;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Битмап-текстура */
        #bitmap-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.35;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .index-container {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 100px;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .index-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            animation: fadeInUp 1.2s ease-out forwards;
            opacity: 0;
        }

        .index-card:nth-child(1) { animation-delay: 0.1s; }
        .index-card:nth-child(2) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .index-card img {
            width: 150px;
            height: 150px;
            image-rendering: pixelated;
            margin-bottom: 20px;
        }

        .index-card span {
            display: inline-block;
            font-size: 13px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 4px;
            padding: 10px 20px;
            border: 2px solid #555;
            background: transparent;
            transition: all 0.2s ease;
        }

        .index-card:hover span {
            color: #fff;
            border-color: #a84d6b;
            background: rgba(168, 77, 107, 0.1);
            box-shadow: 0 0 15px rgba(168, 77, 107, 0.3);
            animation: shake 0.6s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-3px, -2px); }
            20% { transform: translate(3px, 2px); }
            30% { transform: translate(-4px, -1px); }
            40% { transform: translate(4px, 3px); }
            50% { transform: translate(-2px, -3px); }
            60% { transform: translate(2px, 1px); }
            70% { transform: translate(-1px, -2px); }
            80% { transform: translate(1px, 1px); }
            90% { transform: translate(-1px, -1px); }
        }

        @media (max-width: 700px) {
            .index-container { gap: 50px; }
            .index-card img { width: 110px; height: 110px; }
            .index-card span { font-size: 10px; padding: 8px 16px; }
        }

        @media (max-width: 450px) {
            .index-container { gap: 30px; }
            .index-card img { width: 80px; height: 80px; }
            .index-card span { font-size: 8px; padding: 6px 10px; }
        }
    </style>
</head>
<body>

    <canvas id="bitmap-bg"></canvas>

    <div class="index-container">
        <a href="journal.html" class="index-card">
            <img src="assets/journal.png" alt="Journal">
            <span>JOURNAL</span>
        </a>
        <a href="store.html" class="index-card">
            <img src="assets/space.png" alt="Store">
            <span>STORE</span>
        </a>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('bitmap-bg');
            const ctx = canvas.getContext('2d');
            
            // Bayer matrix 8x8 для дизеринга
            const bayer8x8 = [
                [ 1, 49, 13, 61,  4, 52, 16, 64],
                [33, 17, 45, 29, 36, 20, 48, 32],
                [ 9, 57,  5, 53, 12, 60,  8, 56],
                [41, 25, 37, 21, 44, 28, 40, 24],
                [ 3, 51, 15, 63,  2, 50, 14, 62],
                [35, 19, 47, 31, 34, 18, 46, 30],
                [11, 59,  7, 55, 10, 58,  6, 54],
                [43, 27, 39, 23, 42, 26, 38, 22]
            ];
            
            // Нормализуем значения (0-255)
            const maxVal = 64;
            const normalizedBayer = bayer8x8.map(row => 
                row.map(v => Math.floor((v / maxVal) * 255))
            );
            
            let width, height;
            
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                drawBitmap();
            }
            
            function drawBitmap() {
                if (!width || !height) return;
                
                const imageData = ctx.createImageData(width, height);
                const data = imageData.data;
                
                // Проходим по каждому пикселю
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const i = (y * width + x) * 4;
                        
                        // Получаем значение из матрицы Байера
                        const bx = x % 8;
                        const by = y % 8;
                        const bayerVal = normalizedBayer[by][bx];
                        
                        // Базовый серый тон + дизеринг
                        const baseGray = 40; // тёмный графит
                        const dithered = baseGray + (bayerVal / 255) * 20; // вариация ±10
                        
                        // Добавляем пиксельные кластеры (полосы/блоки)
                        const blockX = Math.floor(x / 16) % 2;
                        const blockY = Math.floor(y / 16) % 2;
                        const blockPattern = (blockX ^ blockY) ? 1 : -1;
                        
                        let finalGray = dithered + blockPattern * 8;
                        
                        // Добавляем горизонтальные линии (как на старых мониторах)
                        if (y % 3 === 0) {
                            finalGray += 6;
                        }
                        
                        // Случайные пиксельные артефакты
                        if ((x * y) % 97 === 0) {
                            finalGray = Math.min(80, finalGray + 25);
                        }
                        
                        // Ограничиваем диапазон
                        finalGray = Math.max(20, Math.min(90, finalGray));
                        
                        data[i] = finalGray;
                        data[i + 1] = finalGray;
                        data[i + 2] = finalGray;
                        data[i + 3] = 255;
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
            }
            
            window.addEventListener('resize', resize);
            resize();
        })();
    </script>
</body>
</html>
