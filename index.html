<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUB | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="neuro-bg"></canvas>

    <main class="floating-hub">
        
        <a href="support.html" class="float-item wide">
            <span class="glitch-text">[ TETRIS_SYSTEM ]</span>
        </a>

        <a href="forum.html" class="float-item">
            <div class="dynamic-tag" id="dynamicWord">CONNECTING</div>
            <img src="forum.png" class="float-icon">
            <span class="float-label">FORUM</span>
        </a>

        <a href="shop.html" class="float-item">
            <div class="money-wrap">
                <svg class="money-rotating" viewBox="0 0 32 20"><rect x="1" y="1" width="30" height="18" rx="1" stroke="currentColor" stroke-width="2"/><circle cx="16" cy="10" r="4" stroke="currentColor" stroke-width="2"/></svg>
            </div>
            <img src="space.png" class="float-icon">
            <span class="float-label">SHOP</span>
        </a>

        <a href="helper.html" class="float-item wide">
            <div class="wide-inner">
                <span class="icon-big">✎</span>
                <span class="float-label">NEURO_PAINT</span>
            </div>
        </a>

        <a href="moodboard.html" class="float-item">
            <span class="icon-big">🖼</span>
            <span class="float-label">MOODBOARD</span>
        </a>
        <a href="journal.html" class="float-item">
            <span class="icon-big">📖</span>
            <span class="float-label">JOURNAL</span>
        </a>

        <a href="diary.html" class="float-item">
            <span class="icon-big">📓</span>
            <span class="float-label">DIARY</span>
        </a>
        <div class="float-item" onclick="openModal('instaModal')">
            <span class="icon-big">▣</span>
            <span class="float-label">INSTAGRAM</span>
        </div>

        <a href="https://tiktok.com/@morstrix" target="_blank" class="float-item">
            <span class="icon-big">♪</span>
            <span class="float-label">TIKTOK</span>
        </a>
        <div id="radioBtn" class="float-item" onclick="toggleRadio()">
            <div class="radio-status">
                <div class="p-circle"><span id="p-icon">▶</span></div>
            </div>
            <span class="float-label" id="p-label">RADIO OFF</span>
        </div>

        <a href="https://send.monobank.ua/jar/8q9Kk2hkDV" target="_blank" class="float-item wide donate-item">
            <div class="scan-bar"></div>
            <span class="float-label">ПІДТРИМАТИ ПРОЄКТ</span>
            <span class="sub-label">MONOBANK.EXE</span>
        </a>

    </main>

    <div id="instaModal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModal('instaModal')">X</button>
            <div class="insta-links">
                <a href="a.html">ADA</a>
                <a href="x.html">GRIMEX</a>
            </div>
        </div>
    </div>

    <script src="background.js"></script>
    <script src="index.js"></script>
</body>
</html>
