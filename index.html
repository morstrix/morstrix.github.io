<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;  /* графитовый фон */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Кнопки */
        .index-container {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 100px;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .index-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.1s ease;
            animation: fadeInUp 1.2s ease-out forwards;
            opacity: 0;
        }

        .index-card:nth-child(1) { animation-delay: 0.1s; }
        .index-card:nth-child(2) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Тряска и улетание */
        .index-card:hover {
            animation: shakeAndFly 0.5s ease-in-out forwards;
        }

        @keyframes shakeAndFly {
            0% { transform: translate(0, 0) scale(1); }
            15% { transform: translate(-4px, -3px) scale(1.03); }
            30% { transform: translate(4px, 3px) scale(1.06); }
            45% { transform: translate(-5px, -2px) scale(1.09); }
            60% { transform: translate(5px, 4px) scale(1.12); }
            75% { transform: translate(-3px, -4px) scale(1.09); }
            85% { transform: translate(2px, 2px) scale(1.06); }
            95% { transform: translate(-1px, -1px) scale(1.03); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .index-card img {
            width: 160px;
            height: 160px;
            image-rendering: pixelated;
            margin-bottom: 20px;
        }

        .index-card span {
            font-size: 14px;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 4px;
            padding: 10px 20px;
            border: 2px solid #666666;
            background: transparent;
            transition: all 0.2s ease;
        }

        .index-card:hover span {
            color: #ffffff;
            border-color: #a84d6b;
        }

        /* ШУМ ПОВЕРХ ВСЕГО */
        #noise-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.15;
        }

        /* Адаптация */
        @media (max-width: 700px) {
            .index-container { gap: 50px; }
            .index-card img { width: 120px; height: 120px; }
            .index-card span { font-size: 11px; padding: 8px 16px; }
        }

        @media (max-width: 450px) {
            .index-container { gap: 30px; }
            .index-card img { width: 90px; height: 90px; }
            .index-card span { font-size: 9px; padding: 6px 12px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <!-- Кнопки -->
    <div class="index-container">
        <a href="journal.html" class="index-card">
            <img src="assets/journal.png" alt="Journal">
            <span>JOURNAL</span>
        </a>
        <a href="store.html" class="index-card">
            <img src="assets/space.png" alt="Store">
            <span>STORE</span>
        </a>
    </div>

    <!-- Шум поверх -->
    <canvas id="noise-canvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('noise-canvas');
            const ctx = canvas.getContext('2d', { alpha: true });
            
            let width, height;
            let imageData, data;
            
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                imageData = ctx.createImageData(width, height);
                data = imageData.data;
            }
            
            function generateNoise() {
                for (let i = 0; i < data.length; i += 4) {
                    const val = Math.random() * 255;
                    data[i] = val;
                    data[i+1] = val;
                    data[i+2] = val;
                    data[i+3] = 255;
                }
            }
            
            function draw() {
                if (!width || !height) return;
                generateNoise();
                ctx.putImageData(imageData, 0, 0);
                setTimeout(() => requestAnimationFrame(draw), 150); // ~6-7 fps, медленно
            }
            
            window.addEventListener('resize', () => {
                resize();
                generateNoise();
                ctx.putImageData(imageData, 0, 0);
            });
            
            resize();
            draw();
        })();
    </script>

</body>
</html>
