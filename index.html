<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | HUB</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">

    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden; /* Чтобы ничего не дергалось */
            color: var(--primary);
        }

        /* КАНВАС ВСЕГДА СНИЗУ */
        #neuro-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР - ВИСИТ ПОВЕРХ ФОНА */
        .hub-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* СЕТКА БЕЗ ФОНА */
        .grid-hud {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px; /* Больше места для фона */
            width: 100%;
            max-width: 600px;
        }

        /* КНОПКИ-ПРИЗРАКИ */
        .hud-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent; /* НИКАКИХ ПЛИТОК */
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .hud-item:active { transform: scale(0.9); }

        .hud-item.wide {
            grid-column: span 2;
            height: 60px;
        }

        /* КРАСНАЯ ПЛАШКА CONNECTING (ПРОСТО ТЕКСТ НА ФОНЕ) */
        .forum-tag {
            position: absolute;
            top: -15px;
            background: #ff0000;
            color: #fff;
            padding: 4px 8px;
            font-size: 6px;
            z-index: 20;
        }

        .hud-icon {
            max-width: 65px;
            height: auto;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 5px var(--accent-pink));
        }

        .hud-label {
            font-size: 8px;
            color: var(--primary);
            margin-top: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--accent-pink);
        }

        /* ПЛЕЕР С АНИМАЦИЕЙ (ВМЕСТО ЮТУБА) */
        .player-circle {
            width: 50px;
            height: 50px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .play-icon { font-size: 18px; color: var(--primary); }

        /* Состояние "Играет" */
        .is-playing .player-circle {
            border-color: #ff0000;
            box-shadow: 0 0 20px #ff0000;
            animation: pulse 1s infinite alternate;
        }
        .is-playing .play-icon { color: #ff0000; }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* ТЕРМИНАЛ ДОНАТА (ПРОЗРАЧНЫЙ) */
        .donate-area {
            grid-column: span 2;
            border: 1px solid var(--primary);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            margin-top: 20px;
        }

        .donate-btn {
            display: block;
            background: #ff0000;
            color: #fff;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-size: 8px;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .grid-hud { gap: 25px; }
            .hud-icon { max-width: 50px; }
        }
    </style>
</head>
<body>

    <canvas id="neuro-bg"></canvas>

    <main class="hub-layer">
        <div class="grid-hud">
            
            <a href="support.html" class="hud-item wide"><span class="hud-label" style="font-size:12px;">[ TETRIS SYSTEM ]</span></a>

            <a href="forum.html" class="hud-item">
                <div class="forum-tag">CONNECTING</div>
                <img src="forum.png" class="hud-icon">
                <div class="hud-label">FORUM</div>
            </a>

            <a href="shop.html" class="hud-item">
                <img src="space.png" class="hud-icon">
                <div class="hud-label">SHOP</div>
            </a>

            <a href="helper.html" class="hud-item wide"><span class="hud-label" style="font-size:12px;">[ PAINT HELPER ]</span></a>

            <a href="https://pinterest.com" target="_blank" class="hud-item">
                <span style="font-size:30px;">▩</span>
                <div class="hud-label">MUDBOARD</div>
            </a>

            <a href="#" class="hud-item">
                <span style="font-size:30px;">✎</span>
                <div class="hud-label">JOURNAL</div>
            </a>

            <div id="radioBtn" class="hud-item" onclick="toggleRadio()">
                <div class="player-circle">
                    <span class="play-icon" id="p-icon">▶</span>
                </div>
                <div class="hud-label" id="p-label">RADIO OFF</div>
            </div>

            <div class="hud-item" onclick="openInsta()">
                <span style="font-size:30px;">▣</span>
                <div class="hud-label">INSTAGRAM</div>
            </div>

            <div class="donate-area">
                <div style="height: 80px; overflow: hidden;">
                    <iframe src="https://donatello.to/widget/69ccdec71ba3314f9f5caf01/token/dff9f6028b506348f3084eb6e4b6ee79" style="width: 100%; height: 100%; border: none;" scrolling="no"></iframe>
                </div>
                <a href="https://donatello.to/morstrix?g=1775034053001" target="_blank" class="donate-btn">INJECT FUNDS</a>
            </div>

        </div>
    </main>

    <div id="instaModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center;">
        <div style="border: 1px solid #fff; padding: 40px; background: #000; text-align: center;">
            <div style="margin-bottom: 30px; display: flex; flex-direction: column; gap: 20px;">
                <a href="a.html" style="color:#fff; text-decoration: none; border: 1px solid #fff; padding: 10px;">ADA</a>
                <a href="x.html" style="color:#fff; text-decoration: none; border: 1px solid #fff; padding: 10px;">GRIMEX</a>
            </div>
            <button onclick="closeInsta()" style="background: none; border: none; color: #fff; font-family: 'Press Start 2P'; cursor: pointer;">[ CLOSE ]</button>
        </div>
    </div>

    <script src="background.js"></script>
    <script>
        let playing = false;
        function toggleRadio() {
            const btn = document.getElementById('radioBtn');
            const icon = document.getElementById('p-icon');
            const label = document.getElementById('p-label');
            playing = !playing;
            if(playing) {
                btn.classList.add('is-playing');
                icon.innerText = '⏸';
                label.innerText = 'RADIO ON';
            } else {
                btn.classList.remove('is-playing');
                icon.innerText = '▶';
                label.innerText = 'RADIO OFF';
            }
        }
        function openInsta() { document.getElementById('instaModal').style.display = 'flex'; }
        function closeInsta() { document.getElementById('instaModal').style.display = 'none'; }
    </script>
</body>
</html>
