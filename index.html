<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUB | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="neuro-bg"></canvas>

    <main class="grid-index">
        
        <a href="support.html" class="room-btn wide-bar">
            <span class="wide-label">[ TETRIS SYSTEM ]</span>
        </a>

        <a href="forum.html" class="room-btn clean-square">
            <div class="forum-header" id="dynamicWord">CONNECTING</div>
            <div class="room-content">
                <img src="forum.png" class="room-icon">
                <div class="room-label">FORUM</div>
            </div>
        </a>

        <a href="shop.html" class="room-btn clean-square">
            <svg class="money-rotating" viewBox="0 0 32 20" fill="none">
                <rect x="1" y="1" width="30" height="18" rx="1" stroke="currentColor" stroke-width="2"/>
                <circle cx="16" cy="10" r="4" stroke="currentColor" stroke-width="2"/>
            </svg>
            <div class="room-content">
                <img src="space.png" class="room-icon">
                <div class="room-label">SHOP</div>
            </div>
        </a>

        <a href="helper.html" class="room-btn wide-bar">
            <span class="wide-label">[ PAINT HELPER ]</span>
        </a>

        <a href="https://pinterest.com" target="_blank" class="room-btn clean-square">
            <div class="room-content">
                <span style="font-size:30px;">▩</span>
                <div class="room-label">MUDBOARD</div>
            </div>
        </a>

        <a href="#" class="room-btn clean-square">
            <div class="room-content">
                <span style="font-size:30px;">◈</span>
                <div class="room-label">THREADS</div>
            </div>
        </a>

        <a href="#" class="room-btn clean-square">
            <div class="room-content">
                <span style="font-size:30px;">✎</span>
                <div class="room-label">JOURNAL</div>
            </div>
        </a>

        <a href="https://tiktok.com/@grimexframe" target="_blank" class="room-btn clean-square">
            <div class="room-content">
                <span style="font-size:30px;">♪</span>
                <div class="room-label">TIKTOK</div>
            </div>
        </a>

        <div id="radioBtn" class="room-btn clean-square" onclick="toggleRadio()">
            <div class="room-content">
                <div class="player-circle"><span id="p-icon">▶</span></div>
                <div class="room-label" id="p-label">RADIO OFF</div>
            </div>
        </div>

        <div class="room-btn clean-square" onclick="openModal('instaModal')">
            <div class="room-content">
                <span style="font-size:30px;">▣</span>
                <div class="room-label">INSTAGRAM</div>
            </div>
        </div>

        <!-- КНОПКА НА DONATE.HTML (виджет будет там) -->
        <a href="donate.html" class="donate-button">
            <div class="donate-button-inner">
                <span class="donate-icon">⚡</span>
                <span class="donate-text">DONATION TERMINAL</span>
                <span class="donate-icon">⚡</span>
            </div>
            <div class="donate-sub">support the system</div>
        </a>

    </main>

    <div id="instaModal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModal('instaModal')">X</button>
            <div class="insta-links">
                <a href="a.html">ADA</a>
                <a href="x.html">GRIMEX</a>
            </div>
        </div>
    </div>

    <script src="background.js"></script>
    <script>
        const words = ["CONNECTING", "DYNAMIC WORLD", "SYSTEM ACTIVE", "MORSTRIX HUB"];
        let i = 0;
        setInterval(() => {
            const el = document.getElementById('dynamicWord');
            if(el) { el.innerText = words[i]; i = (i + 1) % words.length; }
        }, 2500);

        let playing = false;
        function toggleRadio() {
            playing = !playing;
            document.getElementById('radioBtn').classList.toggle('playing', playing);
            document.getElementById('p-icon').innerText = playing ? '⏸' : '▶';
            document.getElementById('p-label').innerText = playing ? 'RADIO ON' : 'RADIO OFF';
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
