<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUB | MORSTRIX</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background: #000; font-family: 'Press Start 2P', cursive; overflow: hidden; color: var(--primary); }

        #neuro-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .hub-layer { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .grid-hud { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
            width: 100%; 
            max-width: 600px; 
        }

        .hud-item { 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: transparent; 
            position: relative; /* Важно для позиционирования плашки и монеты */
        }

        /* КРАСНАЯ ПЛАШКА (ФОРУМ) */
        .forum-tag { 
            position: absolute; 
            top: -20px; 
            left: -10px; 
            background: #ff0000 !important; 
            color: #fff !important; 
            padding: 5px 10px; 
            font-size: 7px; 
            z-index: 100;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
        }

        /* МОНЕТКА (МАГАЗИН) */
        .money-rotating { 
            position: absolute; 
            top: -15px; 
            right: -15px; 
            width: 30px; 
            z-index: 100;
            color: #4ade80;
            filter: drop-shadow(0 0 5px #4ade80);
            animation: coinSpin 3s linear infinite;
        }

        @keyframes coinSpin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .hud-icon { max-width: 65px; image-rendering: pixelated; filter: drop-shadow(0 0 5px var(--accent-pink)); }
        .hud-label { font-size: 7px; color: var(--primary); margin-top: 15px; text-transform: uppercase; text-align: center; }

        .hud-item.wide { grid-column: span 2; height: 40px; }

        /* ДОНАТ */
        .donate-area { grid-column: span 2; border: 1px solid var(--primary); background: rgba(0,0,0,0.5); margin-top: 20px; }
        .donate-btn { display: block; background: #ff0000; color: #fff; text-align: center; padding: 12px; text-decoration: none; font-size: 8px; }

        /* МОДАЛКА И КРЕСТИК */
        #instaModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.9); z-index: 2000; 
            align-items: center; justify-content: center; 
        }
        .modal-box { 
            position: relative; 
            border: 2px solid var(--primary); 
            padding: 60px 40px 40px; 
            background: #000; 
            width: 320px; 
        }

        /* КРЕСТИК СПРАВА ВВЕРХУ */
        .close-btn { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            background: none; 
            border: none; 
            color: #ff0000; 
            font-family: 'Press Start 2P'; 
            font-size: 16px; 
            cursor: pointer;
            padding: 5px;
        }

        .insta-links { display: flex; flex-direction: column; gap: 20px; }
        .insta-links a { 
            color: var(--primary); text-decoration: none; border: 1px solid var(--primary); 
            padding: 15px; text-align: center; font-size: 12px; 
        }

        .player-circle { width: 50px; height: 50px; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .playing .player-circle { border-color: #ff0000; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <canvas id="neuro-bg"></canvas>

    <main class="hub-layer">
        <div class="grid-hud">
            
            <a href="support.html" class="hud-item wide"><span class="hud-label">[ TETRIS SYSTEM ]</span></a>

            <a href="forum.html" class="hud-item">
                <div class="forum-tag" id="dynamicWord">CONNECTING</div>
                <img src="forum.png" class="hud-icon">
                <div class="hud-label">FORUM</div>
            </a>

            <a href="shop.html" class="hud-item">
                <svg class="money-rotating" viewBox="0 0 32 20" fill="none">
                    <rect x="1" y="1" width="30" height="18" rx="1" stroke="currentColor" stroke-width="2"/>
                    <circle cx="16" cy="10" r="4" stroke="currentColor" stroke-width="2"/>
                </svg>
                <img src="space.png" class="hud-icon">
                <div class="hud-label">SHOP</div>
            </a>

            <a href="helper.html" class="hud-item wide"><span class="hud-label">[ PAINT HELPER ]</span></a>

            <a href="https://pinterest.com" target="_blank" class="hud-item">
                <span style="font-size:30px;">▩</span>
                <div class="hud-label">MUDBOARD</div>
            </a>

            <a href="#" class="hud-item">
                <span style="font-size:30px;">◈</span>
                <div class="hud-label">THREADS</div>
            </a>

            <a href="#" class="hud-item">
                <span style="font-size:30px;">✎</span>
                <div class="hud-label">JOURNAL</div>
            </a>

            <a href="https://tiktok.com/@grimexframe" target="_blank" class="hud-item">
                <span style="font-size:30px;">♪</span>
                <div class="hud-label">TIKTOK</div>
            </a>

            <div id="radioBtn" class="hud-item" onclick="toggleRadio()">
                <div class="player-circle"><span id="p-icon">▶</span></div>
                <div class="hud-label" id="p-label">RADIO OFF</div>
            </div>

            <div class="hud-item" onclick="openInsta()">
                <span style="font-size:30px;">▣</span>
                <div class="hud-label">INSTAGRAM</div>
            </div>

            <div class="donate-area">
                <div style="height: 100px;">
                    <iframe src="https://donatello.to/widget/69cce53c853ffcbd14d8b8e7/token/dff9f6028b506348f3084eb6e4b6ee79" style="width: 100%; height: 100%; border: none;" scrolling="no"></iframe>
                </div>
                <a href="https://donatello.to/morstrix?g=1775034053001" target="_blank" class="donate-btn">INJECT FUNDS</a>
            </div>

        </div>
    </main>

    <div id="instaModal">
        <div class="modal-box">
            <button class="close-btn" onclick="closeInsta()">X</button>
            <div class="insta-links">
                <a href="a.html">ADA</a>
                <a href="x.html">GRIMEX</a>
            </div>
        </div>
    </div>

    <script src="background.js"></script>
    <script>
        // Динамический текст
        const words = ["CONNECTING", "DYNAMIC WORLD", "SYSTEM ACTIVE", "MORSTRIX HUB"];
        let i = 0;
        setInterval(() => {
            document.getElementById('dynamicWord').innerText = words[i];
            i = (i + 1) % words.length;
        }, 2500);

        // Радио
        let playing = false;
        function toggleRadio() {
            playing = !playing;
            document.getElementById('radioBtn').classList.toggle('playing', playing);
            document.getElementById('p-icon').innerText = playing ? '⏸' : '▶';
            document.getElementById('p-label').innerText = playing ? 'RADIO ON' : 'RADIO OFF';
        }

        // Модалка
        function openInsta() { document.getElementById('instaModal').style.display = 'flex'; }
        function closeInsta() { document.getElementById('instaModal').style.display = 'none'; }
    </script>
</body>
</html>
