<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;  /* графитовый фон */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Слой 1: Кнопки */
        .index-container {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 100px;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .index-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .index-card:hover {
            transform: scale(1.05);
        }

        .index-card img {
            width: 160px;
            height: 160px;
            image-rendering: pixelated;
            margin-bottom: 20px;
        }

        .index-card span {
            font-size: 14px;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 4px;
            padding: 10px 20px;
            border: 2px solid #666666;
            background: transparent;
            transition: all 0.3s ease;
        }

        .index-card:hover span {
            color: #ffffff;
            border-color: #a84d6b;
            text-shadow: 0 0 8px rgba(168, 77, 107, 0.5);
        }

        /* Анимация появления при заходе */
        .index-card {
            animation: fadeInUp 1.2s ease-out forwards;
            opacity: 0;
        }

        .index-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .index-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Слой 2: Эффекты поверх кнопок */
        .effects-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;  /* клики проходят сквозь */
            opacity: 0.25;         /* тусклый */
        }

        /* Canvas с медленным шумом */
        #noise-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            opacity: 0.15;         /* очень тусклый */
            mix-blend-mode: screen;
        }

        /* Тонкие scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 21;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(255, 255, 255, 0.02) 1px,
                transparent 2px,
                transparent 4px
            );
            opacity: 0.4;
            animation: scanMove 8s linear infinite;
        }

        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(8px); }
        }

        /* Виньетка по краям */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 22;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.5) 100%);
        }

        /* Адаптация */
        @media (max-width: 700px) {
            .index-container { gap: 50px; }
            .index-card img { width: 120px; height: 120px; }
            .index-card span { font-size: 11px; padding: 8px 16px; }
        }

        @media (max-width: 450px) {
            .index-container { gap: 30px; }
            .index-card img { width: 90px; height: 90px; }
            .index-card span { font-size: 9px; padding: 6px 12px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <!-- Слой 1: Кнопки (z-index: 10) -->
    <div class="index-container">
        <a href="journal.html" class="index-card">
            <img src="assets/journal.png" alt="Journal">
            <span>JOURNAL</span>
        </a>
        <a href="store.html" class="index-card">
            <img src="assets/space.png" alt="Store">
            <span>STORE</span>
        </a>
    </div>

    <!-- Слой 2: Эффекты поверх (z-index: 20+) -->
    <canvas id="noise-canvas"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <script>
        (function() {
            const canvas = document.getElementById('noise-canvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let imageData;
            let data;
            
            // Очень медленное обновление — 8 fps
            const NOISE_FPS = 8;
            let lastUpdate = 0;
            const interval = 1000 / NOISE_FPS;
            
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                imageData = ctx.createImageData(width, height);
                data = imageData.data;
            }
            
            function generateNoise() {
                for (let i = 0; i < data.length; i += 4) {
                    const val = Math.floor(Math.random() * 256);
                    data[i] = val;
                    data[i + 1] = val;
                    data[i + 2] = val;
                    data[i + 3] = 255;
                }
            }
            
            function drawNoise(timestamp) {
                requestAnimationFrame(drawNoise);
                
                if (timestamp - lastUpdate < interval) return;
                lastUpdate = timestamp;
                
                if (!width || !height) return;
                
                generateNoise();
                ctx.putImageData(imageData, 0, 0);
            }
            
            window.addEventListener('resize', () => {
                resize();
                generateNoise();
                ctx.putImageData(imageData, 0, 0);
            });
            
            resize();
            generateNoise();
            ctx.putImageData(imageData, 0, 0);
            requestAnimationFrame(drawNoise);
        })();
    </script>

</body>
</html>
