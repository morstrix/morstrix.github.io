<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        /* Стили для новой кнопки TEAM */
        .team-trigger {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #a84d6b;
            cursor: pointer;
            margin-bottom: 15px;
            letter-spacing: 2px;
            transition: 0.2s;
        }
        .team-trigger:hover { transform: scale(1.1); color: #fff; }

        /* Контент модалки TEAM */
        .team-selection {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px 0;
        }
        .team-choice {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }
        .team-choice img {
            width: 120px;
            height: 120px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
        .team-choice span {
            font-size: 8px;
            color: #fff;
        }
        .team-choice:hover { transform: translateY(-5px); }
        
        @media (max-width: 450px) {
            .team-selection { gap: 20px; }
            .team-choice img { width: 90px; height: 90px; }
        }
    </style>
</head>
<body>
    <canvas id="neuro-bg"></canvas>

    <div class="index-container">
        <div class="index-center">
            <div class="index-grid">
                <a href="journal.html" class="index-card">
                    <img src="assets/journal.png" alt="Journal">
                    <span>JOURNAL</span>
                </a>
                <a href="store.html" class="index-card">
                    <img src="assets/space.png" alt="Store">
                    <span>STORE</span>
                </a>
            </div>
        </div>

        <div class="index-bottom">
            <div class="team-trigger" id="teamBtn">✦ TEAM ✦</div>
            
            <div class="donate-block" id="donateWrapper">
                <div class="donate-line"></div>
                <div class="donate-label">DONATE</div>
                <div class="donate-sub">monobank</div>
            </div>
        </div>
    </div>

    <div id="teamModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeTeamModal">✜</button>
            <div class="modal-title">SELECT MEMBER</div>
            <div class="team-selection">
                <a href="ada.html" class="team-choice">
                    <img src="assets/ada.png" alt="Ada">
                    <span>ADA MORSOVA</span>
                </a>
                <a href="ex.html" class="team-choice">
                    <img src="assets/ex.png" alt="Ex">
                    <span>GRIM EX FRAME</span>
                </a>
            </div>
        </div>
    </div>

    <script src="background.js"></script>
    <script>
        // Донат
        document.getElementById('donateWrapper').onclick = () => window.open('https://send.monobank.ua/jar/8q9Kk2hkDV', '_blank');

        // Логика TEAM модалки
        const teamModal = document.getElementById('teamModal');
        document.getElementById('teamBtn').onclick = () => teamModal.classList.add('active');
        document.getElementById('closeTeamModal').onclick = () => teamModal.classList.remove('active');

        window.onclick = (e) => { if (e.target === teamModal) teamModal.classList.remove('active'); };
    </script>
</body>
</html>
