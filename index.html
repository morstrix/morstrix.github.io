<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
        }

        .index-container {
            display: flex;
            gap: 100px;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .index-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        .index-card img {
            width: 160px;
            height: 160px;
            image-rendering: pixelated;
            margin-bottom: 20px;
        }

        .index-card span {
            font-size: 14px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        @media (max-width: 700px) {
            .index-container { gap: 50px; }
            .index-card img { width: 120px; height: 120px; }
            .index-card span { font-size: 11px; }
        }

        @media (max-width: 450px) {
            .index-container { gap: 30px; }
            .index-card img { width: 90px; height: 90px; }
            .index-card span { font-size: 9px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="index-container">
        <a href="journal.html" class="index-card">
            <img src="assets/journal.png" alt="Journal">
            <span>JOURNAL</span>
        </a>
        <a href="store.html" class="index-card">
            <img src="assets/space.png" alt="Store">
            <span>STORE</span>
        </a>
    </div>

</body>
</html>
