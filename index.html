<head>

    <style>
        .grid-index {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 90px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .room-btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: none;
            border: none;
            transition: transform 0.1s;
            cursor: pointer;
        }
        .room-btn:active { transform: scale(0.95); }

        .room-btn.clean-square { grid-column: span 1; aspect-ratio: 1 / 1; }
        .room-btn.wide-bar {
            grid-column: span 2;
            height: 85px;
            background: rgba(15, 15, 15, 0.6);
            border: 2px solid var(--border-dark);
            backdrop-filter: blur(5px);
        }

        .wide-label {
            font-size: 12px;
            color: var(--primary);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .room-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .forum-header {
            position: absolute;
            top: 0;
            left: 0;
            background: #ff0000;
            color: #ffffff;
            padding: 4px 10px;
            font-size: 7px;
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            z-index: 100;
        }

        .money-rotating {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 25px;
            animation: spinMoney 4s linear infinite;
            color: #4ade80;
        }

        @keyframes spinMoney {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .room-icon { max-width: 70px; height: auto; image-rendering: pixelated; }
        .svg-icon { width: 45px; height: 45px; color: var(--primary); }
        .room-label { font-size: 8px; color: var(--primary); margin-top: 12px; letter-spacing: 1px; text-align: center; }

        .donate-widget-area {
            grid-column: span 2;
            border: 2px solid var(--primary);
            background: #000;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
        }

        .widget-head {
            background: var(--primary);
            color: #000;
            font-size: 9px;
            padding: 8px;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
        }

        .inject-btn {
            display: block;
            background: #ff0000;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            text-decoration: none;
            font-size: 8px;
            font-family: 'Press Start 2P';
        }

        .rec-box { 
            grid-column: span 2; 
            border: 1px dashed var(--primary); 
            padding: 12px; 
            font-size: 8px; 
            color: var(--primary); 
            text-align: center; 
        }

        #neuro-bg { position: fixed; inset: 0; z-index: -1; }
        #yt-player-hidden { position: absolute; top: -999px; visibility: hidden; }
    </style>
</head>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player, isPlaying = false;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player-hidden', {
                height: '1', width: '1', videoId: 'WB7LS3p7Tb4',
                playerVars: { 'listType': 'playlist', 'list': 'PLi1Z1_6srFOvdJ5HrgSMoGpMnpoTrx56_', 'autoplay': 0 }
            });
        }
        function toggleMusic() {
            const label = document.getElementById('radioLabel');
            if (!isPlaying) { player.playVideo(); label.innerText = 'RADIO [ON]'; isPlaying = true; } 
            else { player.pauseVideo(); label.innerText = 'RADIO [OFF]'; isPlaying = false; }
        }
        function openInstaPopup() { document.getElementById('instaModal').style.display = 'flex'; }
        function closeInstaPopup() { document.getElementById('instaModal').style.display = 'none'; }
        window.onclick = function(e) { if (e.target == document.getElementById('instaModal')) closeInstaPopup(); }
    </script>
