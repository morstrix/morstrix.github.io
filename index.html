<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta property="og:title" content="➞ ᴢ☻ɴǝ">
    <meta property="og:description" content="пᴏᴘᴛᴀʌ">
    <meta property="og:image" content="https://morstrix.zone/assets/preview.jpg">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        /* ========== ОСНОВНЫЕ СТИЛИ ========== */
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow-x: hidden;
        }

        .grid-container {
            padding: 20px 20px 60px 20px;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Сетка 2x2 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px 30px;
            margin-bottom: 50px;
        }
        
        /* Вторая сетка для Ада и Х */
        .second-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px 30px;
            margin-bottom: 50px;
        }

        /* Донаты */
        .donate-center {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .donate-wrapper {
            cursor: pointer;
            text-align: center;
        }

        .donate-label {
            font-size: 8px;
            color: #d4a0a0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .donate-sub {
            display: block;
            font-size: 6px;
            color: #8a6a6a;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* Кнопки */
        .grid-item {
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }

        .grid-item:active {
            transform: scale(0.9);
        }

        .grid-icon {
            width: 55px;
            height: auto;
            image-rendering: pixelated;
            margin-bottom: 12px;
        }

        .label-main {
            display: block;
            font-size: 8px;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 4px #000;
            text-align: center;
        }

        .label-sub {
            display: block;
            font-size: 6px;
            letter-spacing: 0.5px;
            color: #888;
            text-transform: none;
            margin-top: 4px;
            text-align: center;
        }

        /* Модальные окна */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 5000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            background: #000;
            border: 2px solid #fff;
            position: relative;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
        }

        .modal-title {
            font-size: 10px;
            color: #a84d6b;
            margin-bottom: 20px;
            text-align: center;
        }

        .insta-widget {
            margin: 20px 0;
        }

        /* Стили для виджетов внутри попапов */
        .twitter-block {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #b97272;
            padding: 15px;
            margin-bottom: 20px;
        }

        .twitter-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .twitter-icon { font-size: 16px; }
        .twitter-label { font-size: 7px; color: #a27791; }
        .twitter-post { font-size: 8px; line-height: 1.5; color: #ccc; }
        .twitter-date { font-size: 5px; color: #666; margin-top: 8px; text-align: right; }

        .retro-btn {
            background: transparent;
            border: 1px solid #a84d6b;
            color: #fff;
            padding: 8px 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            text-align: center;
        }

        .retro-btn:active {
            transform: scale(0.95);
            background: #a84d6b;
            color: #000;
        }

        .coming-soon {
            font-size: 7px;
            color: #888;
            margin: 20px 0;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Адаптация под телефоны */
        @media (max-width: 550px) {
            .main-grid, .second-grid {
                gap: 30px 20px;
            }
            .grid-icon {
                width: 45px;
            }
            .label-main {
                font-size: 7px;
            }
            .label-sub {
                font-size: 5px;
            }
            .modal-content {
                width: 95%;
                padding: 15px;
            }
            .spotify-iframe {
                width: 220px;
                height: 65px;
            }
        }

        @media (max-width: 400px) {
            .main-grid, .second-grid {
                gap: 25px 15px;
            }
            .grid-icon {
                width: 38px;
            }
            .label-main {
                font-size: 6px;
            }
            .label-sub {
                font-size: 4.5px;
            }
        }
    </style>
</head>
<body>

    <canvas id="neuro-bg"></canvas>

    <div class="grid-container">
        
        <!-- ПЕРВАЯ СЕТКА: ЖУРНАЛ + СТОР -->
        <div class="main-grid">
            
            <!-- ЖУРНАЛ (print.html) -->
            <a href="print.html" class="grid-item">
                <img src="assets/print.png" alt="Journal" class="grid-icon">
                <div>
                    <span class="label-main">JOURNAL</span>
                </div>
            </a>

            <!-- СТОР (shop.html) -->
            <a href="shop.html" class="grid-item">
                <img src="assets/shop.png" alt="Store" class="grid-icon">
                <div>
                    <span class="label-main">store</span>
                </div>
            </a>
        </div>

        <!-- ВТОРАЯ СЕТКА: АДА + Х -->
        <div class="second-grid">
            
            <!-- ADA (ПОПАП) -->
            <div class="grid-item" id="adaBtn" style="cursor: pointer;">
                <img src="assets/a.png" alt="Ada" class="grid-icon">
                <div>
                    <span class="label-main">ADA MORSOVA</span>
                </div>
            </div>

            <!-- Х (ПОПАП) -->
            <div class="grid-item" id="xBtn" style="cursor: pointer;">
                <img src="assets/x.png" alt="X" class="grid-icon">
                <div>
                    <span class="label-main">GRIM EX FRAME</span>
                </div>
            </div>
        </div>

        <!-- ДОНАТЫ ПОД АДА И Х -->
        <div class="donate-center">
            <div class="donate-wrapper" id="donateWrapper">
                <div class="donate-top-line"></div>
                <div class="donate-text">
                    <span class="donate-label">DONATE</span>
                    <span class="donate-sub">monobank</span>
                </div>
                <div class="donate-bottom-line"></div>
            </div>
        </div>
    </div>

    <!-- ========== ПОПАП ADA ========== -->
    <div id="adaModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeAdaModal">✜</button>
            <div class="modal-title">designer</div>
            
            <h4 style="font-size: 8px; color: #a84d6b; margin-top: 10px;">INSTAGRAM</h4>
            <div class="insta-widget">
                <behold-widget feed-id="UBHqIRXRQc286kYl07UN"></behold-widget>
            </div>
        </div>
    </div>

    <!-- ========== ПОПАП X ========== -->
    <div id="xModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeXModal">✜</button>
            <div class="modal-title">developer</div>
            
            <div style="margin: 15px 0;">
                <a href="https://threads.net/@grimexframe" target="_blank" class="retro-btn" style="display: block; width: 100%;">🧵 THREADS</a>
            </div>
            
            <h4 style="font-size: 8px; color: #a84d6b;">INSTAGRAM</h4>
            <div class="insta-widget">
                <behold-widget feed-id="Ew8dq23tImFHuva5wjDT"></behold-widget>
            </div>
            
            <h4 style="font-size: 8px; color: #a84d6b; margin-top: 15px;">TIKTOK</h4>
            <div style="margin-bottom: 10px;">
                <a href="https://tiktok.com/@grimexframe" target="_blank" class="retro-btn" style="display: block; width: 100%;">🎵 @grimexframe</a>
            </div>
        </div>
    </div>

    <script src="background.js"></script>
    <script type="module" src="https://w.behold.so/widget.js"></script>
    <script>
        // ДОНАТЫ
        document.getElementById('donateWrapper').onclick = () => {
            window.open('https://send.monobank.ua/jar/8q9Kk2hkDV', '_blank');
        };

        // ========== ПОПАП ADA ==========
        const adaModal = document.getElementById('adaModal');
        const xModal = document.getElementById('xModal');
        
        document.getElementById('adaBtn').onclick = () => adaModal.classList.add('active');
        document.getElementById('closeAdaModal').onclick = () => adaModal.classList.remove('active');
        
        document.getElementById('xBtn').onclick = () => xModal.classList.add('active');
        document.getElementById('closeXModal').onclick = () => xModal.classList.remove('active');
        
        // Закрытие по клику на оверлей
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
        });


        // ========== X THREADS (diary.json) ==========
        async function loadThreads() {
            const container = document.getElementById('threadsContent');
            if (!container) return;
            try {
                const response = await fetch('diary.json?v=' + Date.now());
                if (!response.ok) throw new Error();
                const posts = await response.json();
                container.innerHTML = posts.map(post => `
                    <div style="margin-bottom: 15px; border-left: 2px solid #a84d6b; padding-left: 10px;">
                        <div style="color: #a84d6b; font-size: 6px; margin-bottom: 5px;">[ ${post.date} ]</div>
                        <div style="font-size: 7px; color: #ccc;">${post.text}</div>
                    </div>
                `).join('');
            } catch(e) {
                container.innerHTML = '<div style="color: #666;">SYNCING THREADS...</div>';
            }
        }
        loadThreads();
        setInterval(loadThreads, 30000);

        // ========== ЗАГЛУШКИ ==========
        const modals = {
            paint: document.getElementById('paintModal'),
            tetris: document.getElementById('tetrisModal'),
            mood: document.getElementById('moodModal'),
            forum: document.getElementById('forumModal')
        };

        function closeModal(modal) {
            modal.classList.remove('active');
        }

        document.getElementById('closePaintModal').onclick = () => closeModal(modals.paint);
        document.getElementById('paintComingSoonBtn').onclick = () => closeModal(modals.paint);
        document.getElementById('closeTetrisModal').onclick = () => closeModal(modals.tetris);
        document.getElementById('tetrisComingSoonBtn').onclick = () => closeModal(modals.tetris);
        document.getElementById('closeMoodModal').onclick = () => closeModal(modals.mood);
        document.getElementById('moodComingSoonBtn').onclick = () => closeModal(modals.mood);
        document.getElementById('closeForumModal').onclick = () => closeModal(modals.forum);
        document.getElementById('forumComingSoonBtn').onclick = () => closeModal(modals.forum);

        // Плавный переход для ссылок
        document.querySelectorAll('a[href]').forEach(link => {
            if (!link.hasAttribute('target') && link.getAttribute('href') !== 'index.html') {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('#')) {
                        e.preventDefault();
                        document.body.style.opacity = '0';
                        document.body.style.transition = 'opacity 0.2s';
                        setTimeout(() => window.location.href = href, 200);
                    }
                });
            }
        });
    </script>
</body>
</html>
