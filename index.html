<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <canvas id="neuro-bg"></canvas>

    <div class="index-container">
        <div class="radio-btn" id="radioBtn">
            <img src="assets/radio.png" alt="Radio">
        </div>

        <div class="index-center">
            <div class="index-grid">
                <a href="journal.html" class="index-card">
                    <img src="assets/journal.png" alt="Journal">
                    <span>JOURNAL</span>
                </a>
                <a href="store.html" class="index-card">
                    <img src="assets/space.png" alt="Store">
                    <span>STORE</span>
                </a>
            </div>
        </div>

        <div class="index-bottom">
            <div class="index-grid">
                <div class="index-card" id="adaBtn">
                    <img src="assets/ada.png" alt="Ada">
                    <span>ADA MORSOVA</span>
                </div>
                <div class="index-card" id="xBtn">
                    <img src="assets/ex.png" alt="X">
                    <span>GRIM EX FRAME</span>
                </div>
            </div>

            <div class="donate-block" id="donateWrapper">
                <div class="donate-line"></div>
                <div class="donate-label">DONATE</div>
                <div class="donate-sub">monobank</div>
            </div>
        </div>
    </div>

    <!-- Модалки -->
    <div id="radioModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeRadioModal">✜</button>
            <div class="modal-title">MORSTRIX RADIO</div>
            <div class="spotify-wrapper">
                <iframe src="https://open.spotify.com/embed/album/56cjl8GlCjzRYJvYOZqXUC?utm_source=generator&theme=0" width="100%" height="352" frameborder="0" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <div id="adaModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeAdaModal">✜</button>
            <div class="modal-title">DESIGNER</div>
            <h4 style="font-size:8px;color:#a84d6b;">BEHANCE</h4>
            <div class="behance-wrapper">
                <iframe src="https://www.behance.net/embed/project/246943027?ilo0=1" height="316" width="404" allowfullscreen lazyload frameborder="0" allow="clipboard-write"></iframe>
            </div>
            <h4 style="font-size:8px;color:#a84d6b;">INSTAGRAM</h4>
            <div class="insta-widget">
                <behold-widget feed-id="UBHqIRXRQc286kYl07UN"></behold-widget>
            </div>
        </div>
    </div>

    <div id="xModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeXModal">✜</button>
            <div class="modal-title">DEVELOPER</div>
            <a href="https://threads.net/@grimexframe" target="_blank" class="retro-btn" style="display:block;">THREADS</a>
            <h4 style="font-size:8px;color:#a84d6b;">INSTAGRAM</h4>
            <div class="insta-widget">
                <behold-widget feed-id="Ew8dq23tImFHuva5wjDT"></behold-widget>
            </div>
            <a href="https://tiktok.com/@grimexframe" target="_blank" class="retro-btn" style="display:block;">TIKTOK</a>
        </div>
    </div>

    <script src="background.js"></script>
    <script type="module" src="https://w.behold.so/widget.js"></script>
    <script>
        document.getElementById('donateWrapper').onclick = () => window.open('https://send.monobank.ua/jar/8q9Kk2hkDV', '_blank');
        document.getElementById('radioBtn').onclick = () => document.getElementById('radioModal').classList.add('active');
        document.getElementById('closeRadioModal').onclick = () => document.getElementById('radioModal').classList.remove('active');
        document.getElementById('adaBtn').onclick = () => document.getElementById('adaModal').classList.add('active');
        document.getElementById('closeAdaModal').onclick = () => document.getElementById('adaModal').classList.remove('active');
        document.getElementById('xBtn').onclick = () => document.getElementById('xModal').classList.add('active');
        document.getElementById('closeXModal').onclick = () => document.getElementById('xModal').classList.remove('active');
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
        });
    </script>
</body>
</html>
