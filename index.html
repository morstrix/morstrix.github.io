<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUB | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
    <style>
    /* Стиль для иконки инсты (оставляем как есть) */
    .insta-svg {
        width: 24px;
        height: 24px;
        fill: currentColor;
        display: block;
        margin: 0 auto 8px;
    }

    .social-trigger {
        text-decoration: none !important;
        outline: none !important;
        border: none !important;
    }
    
    /* ИНСТАГРАМ — БЕЗ ФИЛЬТРА, КАК БЫЛА */
    .social-trigger .float-icon {
        filter: none !important;
        -webkit-filter: none !important;
    }
    
    .social-trigger:hover .insta-svg {
        filter: drop-shadow(0 0 5px #a84d6b);
    }
    
    /* ========== ФИКС ДЛЯ ВСЕХ ОСТАЛЬНЫХ ИКОНОК ========== */
    /* Превращаем в белый цвет только: tetris, forum, shop, paint, print, tiktok, radio */
    .float-icon {
        filter: brightness(0) invert(1);
        -webkit-filter: brightness(0) invert(1);
        image-rendering: crisp-edges;
    }
    
    /* Широкие элементы (тетрис, донат) */
    .float-item.wide .float-icon {
        filter: brightness(0) invert(1);
        -webkit-filter: brightness(0) invert(1);
    }
    
    /* Радио-иконка */
    #radio-icon-img {
        filter: brightness(0) invert(1);
        -webkit-filter: brightness(0) invert(1);
    }
    
    /* Эффект при нажатии */
    .float-item:active .float-icon {
        filter: brightness(0) invert(1) drop-shadow(0 0 4px #a84d6b);
        -webkit-filter: brightness(0) invert(1) drop-shadow(0 0 4px #a84d6b);
    }
    
    /* Instagram-иконка при нажатии — без фильтра, только свечение */
    .social-trigger:active .float-icon {
        filter: drop-shadow(0 0 4px #a84d6b) !important;
        -webkit-filter: drop-shadow(0 0 4px #a84d6b) !important;
    }
    
    /* Текст всегда читаемый */
    .float-label {
        text-shadow: 0 0 4px #000000;
        color: #ffffff;
    }
    
    /* Донат-блок */
    .donate-item .float-label {
        color: #ffffff;
    }
    
    .sub-label {
        color: rgba(255, 255, 255, 0.5);
    }
</style>
</head>
<body>

    <canvas id="neuro-bg"></canvas>

    <main class="floating-hub">
        
        <a href="support.html" class="float-item wide">
    <img src="assets/tetris.png" alt="Tetris" class="float-icon">
    <span class="float-label">TETRIS</span>
</a>

        <a href="forum.html" class="float-item">
            <div class="dynamic-tag" id="dynamicWord">CONNECTING</div>
            <img src="assets/forum.png" alt="Forum" class="float-icon">
            <span class="float-label">FORUM</span>
        </a>

        <a href="shop.html" class="float-item">
            <div class="money-wrap">
                <svg class="money-rotating" viewBox="0 0 32 20">
                    <rect x="1" y="1" width="30" height="18" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
                    <circle cx="16" cy="10" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <img src="assets/shop.png" alt="Shop" class="float-icon"> 
            <span class="float-label">SHOP</span>
        </a>

        <a href="helper.html" class="float-item">
        <img src="assets/paint.png" alt="Paint" class="float-icon">
        <span class="float-label">PAINT</span>
    </a>

        <a href="x.html" class="float-item">
        <img src="assets/print.png" alt="Print" class="float-icon">
        <span class="float-label">PRINT</span>
    </a>

        <div class="float-item social-trigger" data-type="instagram" style="cursor: pointer;">
        <img src="assets/insta.png" alt="Instagram" class="float-icon">
        <span class="float-label">INSTAGRAM</span>
    </div>

        <a href="https://tiktok.com/@morstrix" target="_blank" class="float-item">
            <span class="icon-big">♪</span>
            <span class="float-label">TIKTOK</span>
        </a>

        <div id="radioBtn" class="float-item" style="cursor: pointer;">
    <div class="radio-status">
        <img src="assets/radio.png" alt="Radio" id="radio-icon-img" class="float-icon">
    </div>
    <span class="float-label" id="p-label">RADIO OFF</span>
</div>

        <a href="https://send.monobank.ua/jar/8q9Kk2hkDV" target="_blank" class="float-item wide donate-item">            
            <span class="float-label">ПІДТРИМАТИ ПРОЄКТ</span>
            <span class="sub-label">MONOBANK.EXE</span>
        </a>

    </main>

    <div id="instaModal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" id="finalClosePopup">✜</button>
            <div id="finalPopupTitle" class="popup-title"></div>
            <div id="finalPopupIcons" class="insta-links"></div>
        </div>
    </div>

    <script src="background.js"></script>
    <script src="index.js"></script>
    
    <script>
        const radioBtn = document.getElementById('radioBtn');
        let isPlaying = false;
        if(radioBtn) {
            radioBtn.onclick = () => {
                isPlaying = !isPlaying;
                document.getElementById('p-label').innerText = isPlaying ? "RADIO ON" : "RADIO OFF";
                document.getElementById('p-icon').innerText = isPlaying ? "■" : "▶";
            };
        }
    </script>

</body>
</html>
