<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORSTRIX | PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f12;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Текстурный фон — графит + микро-шум */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, transparent 2px),
                radial-gradient(circle at 30% 40%, rgba(60,60,80,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        /* Контейнер кнопок */
        .index-container {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 120px;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .index-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            animation: fadeInUp 1.4s cubic-bezier(0.2, 0.9, 0.1, 1) forwards;
            opacity: 0;
        }

        .index-card:nth-child(1) { animation-delay: 0.1s; }
        .index-card:nth-child(2) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px); filter: blur(2px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* Пиксельные иконки */
        .index-card img {
            width: 150px;
            height: 150px;
            image-rendering: pixelated;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 6px rgba(168, 77, 107, 0.3));
            transition: filter 0.3s ease;
        }

        .index-card:hover img {
            filter: drop-shadow(0 0 15px rgba(168, 77, 107, 0.7));
        }

        /* Подпись — сайфайная рамка с гранжем */
        .index-card span {
            display: inline-block;
            font-size: 13px;
            color: #b0b0b0;
            text-transform: uppercase;
            letter-spacing: 5px;
            padding: 12px 24px;
            border: 2px solid #4a4a5a;
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(2px);
            box-shadow: 
                inset 0 0 8px rgba(0,0,0,0.5),
                0 0 0 1px rgba(168, 77, 107, 0.2);
            position: relative;
            transition: all 0.3s ease;
        }

        /* Гранжевые потёртости на рамке */
        .index-card span::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 1px solid transparent;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 3px, 
                rgba(255,255,255,0.02) 3px, 
                rgba(0,0,0,0.1) 6px);
            pointer-events: none;
            opacity: 0.5;
        }

        /* Неон при наведении */
        .index-card:hover span {
            color: #ffffff;
            border-color: #a84d6b;
            background: rgba(20, 15, 25, 0.8);
            box-shadow: 
                inset 0 0 12px rgba(168, 77, 107, 0.3),
                0 0 20px rgba(168, 77, 107, 0.5),
                0 0 0 1px #a84d6b;
            text-shadow: 0 0 8px rgba(255, 180, 200, 0.8);
            animation: glitchFrame 0.4s steps(2) infinite;
        }

        /* Глитч-тряска рамки */
        @keyframes glitchFrame {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, 2px); }
            80% { transform: translate(1px, -2px); }
            100% { transform: translate(0, 0); }
        }

        /* === ЭФФЕКТЫ ПОВЕРХ === */

        /* Шум (помехи) */
        #noise-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0.12;
            mix-blend-mode: screen;
        }

        /* Скайнлайны (очень тонкие) */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 101;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, 
                rgba(0,0,0,0.2) 0px, 
                rgba(255,255,255,0.01) 1px, 
                transparent 2px, 
                transparent 3px);
            opacity: 0.3;
            animation: scanMove 12s linear infinite;
        }

        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(6px); }
        }

        /* Пыль / царапины (редкие) */
        .dust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 102;
            pointer-events: none;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.02) 0%, transparent 5%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.01) 0%, transparent 8%),
                repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.005) 40px, transparent 80px);
            opacity: 0.6;
        }

        /* Виньетка (тёмные края) */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 103;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 100%);
        }

        /* Адаптация */
        @media (max-width: 700px) {
            .index-container { gap: 60px; }
            .index-card img { width: 110px; height: 110px; }
            .index-card span { font-size: 10px; padding: 8px 16px; letter-spacing: 3px; }
        }

        @media (max-width: 450px) {
            .index-container { gap: 30px; }
            .index-card img { width: 80px; height: 80px; }
            .index-card span { font-size: 8px; padding: 6px 10px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="index-container">
        <a href="journal.html" class="index-card">
            <img src="assets/journal.png" alt="Journal">
            <span>JOURNAL</span>
        </a>
        <a href="store.html" class="index-card">
            <img src="assets/space.png" alt="Store">
            <span>STORE</span>
        </a>
    </div>

    <!-- Слои эффектов -->
    <canvas id="noise-canvas"></canvas>
    <div class="scanlines"></div>
    <div class="dust"></div>
    <div class="vignette"></div>

    <script>
        (function() {
            const canvas = document.getElementById('noise-canvas');
            const ctx = canvas.getContext('2d', { alpha: true });
            
            let width, height;
            let imageData, data;
            
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                imageData = ctx.createImageData(width, height);
                data = imageData.data;
            }
            
            function generateNoise() {
                for (let i = 0; i < data.length; i += 4) {
                    const val = Math.random() * 255;
                    data[i] = val;
                    data[i+1] = val;
                    data[i+2] = val;
                    data[i+3] = 255;
                }
            }
            
            function draw() {
                if (!width || !height) return;
                generateNoise();
                ctx.putImageData(imageData, 0, 0);
                setTimeout(() => requestAnimationFrame(draw), 180); // ~5.5 fps, медленно
            }
            
            window.addEventListener('resize', () => {
                resize();
                generateNoise();
                ctx.putImageData(imageData, 0, 0);
            });
            
            resize();
            draw();
        })();
    </script>

</body>
</html>
