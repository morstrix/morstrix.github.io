<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ADA | MORSTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Убираем черное полотно, делаем прозрачным для background.js */
        body {
            background: transparent !important;
            min-height: 100vh;
            display: block;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        /* ТВОЙ КРЕСТИК СПРАВА И БЕЛЫЙ */
        .back-button {
            position: fixed;
            top: 30px;
            right: 30px; /* ПЕРЕНЕС НАПРАВО */
            left: auto;  /* Сброс левого позиционирования */
            z-index: 1000;
            color: #ffffff !important; /* БЕЛЫЙ ЦВЕТ */
            text-decoration: none;
            font-size: 24px;
        }

        .back-button span {
            color: #ffffff !important;
        }

        .ig-header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 80px 20px 30px;
            background: rgba(0, 0, 0, 0.4); /* Легкая подложка для читаемости текста */
        }

        .ig-title {
            font-size: 1.2rem;
            color: #a84d6b;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .ig-subtitle {
            font-size: 0.55rem;
            color: #a1a1a1;
            line-height: 1.4;
        }

        .instagram-feed {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px 50px;
            background: rgba(0, 0, 0, 0.4); /* Прозрачный фон виджета */
        }

        /* ПРИНУДИТЕЛЬНАЯ ПРОЗРАЧНОСТЬ ДЛЯ BEHOLD */
        behold-widget { 
            display: block; 
            min-height: 400px; 
            background: transparent !important; 
        }

        behold-widget * {
            background: transparent !important;
        }
    </style>
</head>
<body class="page-a">

<a href="index.html" class="back-button"><span>✜</span></a>

<div class="ig-header">
    <div class="ig-title">ADA MORSOVA</div>
    <div class="ig-subtitle">INSTAGRAM FEED</div>
</div>

<div class="instagram-feed">
    <behold-widget feed-id="UBHqIRXRQc286kYl07UN"></behold-widget>
</div>

<script src="background.js"></script>
<script type="module" src="https://w.behold.so/widget.js"></script>
</body>
</html>
